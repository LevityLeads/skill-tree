n, South Africa (remote, UK/US timezone friendly)\"\n5. **Note to the Client** [ref varies] - textbox - THE COVER LETTER (generated via /api/cover-letter)\n6. **Full-time job?** - radio - Select \"Yes\" (Rees has the Thingiverse CMO role)\n7. **Compensation match?** - radio - Select \"Yes\" (unless rate is below floor)\n\n### Optional (but recommended):\n8. **Other Links** - textbox - \"https://reescalder.com/for/{pitch_slug} | https://reescalder.com/cv/{flavour}\"\n9. **Resume** - file upload - SKIP (use CV link instead)\n10. **How did you hear?** - combobox - Select appropriate option or leave blank\n\n### Submit button at bottom.\n\n## Automation Steps\n\n1. Navigate to the job listing page: `https://www.fractionaljobs.io/jobs/{job_id}`\n2. Take snapshot, extract the \"Request Intro\" link URL (contains Fillout form URL with params)\n3. Also extract the full job description text for cover letter generation\n4. Generate cover letter via: POST https://reescalder.com/api/cover-letter\n   - Headers: x-api-key: rck_1ec8050d2aa3e62ce09af191fe9da5b6e6a30e5ce3c5527412369fa46993d14f\n   - Body: { jobTitle, company, jobDescription, identity: \"rees\", cvFlavour }\n5. **Generate pitch_slug** from job title (lowercase, hyphenated, no special chars)\n6. **Update Supabase** with pitch_slug and cover_letter so the pitch page has data to render\n7. Navigate to the Fillout form URL\n8. Fill form using browser_fill_form:\n   - Full Name: \"Rees Calder\"\n   - Email: \"rees.calder@levityleads.com\"\n   - LinkedIn: \"https://linkedin.com/in/reescalder\"\n   - Location: \"Cape Town, South Africa (remote, UK/US timezone friendly)\"\n   - Note to Client: {generated cover letter}\n9. Select radio buttons:\n   - Full-time job: \"Yes\"\n   - Compensation match: \"Yes\" (or \"No\" if below 500/day)\n10. Fill optional fields:\n    - Other Links: \"https://reescalder.com/for/{pitch_slug} | https://reescalder.com/cv/{suggested_flavour}\"\n11. Click Submit\n12. Wait for confirmation, take snapshot to verify\n13. Update gig_applications row: status = \"applied\", applied_at = now()\n\n## Important Notes\n- The form uses dynamic refs, so always take a fresh snapshot before interacting\n- The \"Note to Client\" field is the most important, tailor it to the specific job\n- If compensation question shows specific amount, check against floor (500/day / 100/hr)\n- After submitting, fractionaljobs guarantees a response within 14 days\n- The full-time job question: answer \"Yes\" because of Thingiverse CMO role, but the follow-up should explain it is a fractional/consulting engagement itself\n- The pitch page renders automatically from Supabase data, no manual page creation needed\n\n## REESCALDER_API_KEY\nrck_1ec8050d2aa3e62ce09af191fe9da5b6e6a30e5ce3c5527412369fa46993d14f"}, "war-room": {"description": "Multi-agent war room methodology for complex problems. Specialist agents in dependency-ordered waves, CHAOS agent as devil's advocate, DECISIONS.md log, INTERCEPTOR controller.", "tags": ["methodology", "agents", "strategy"], "prompt": "# War Room\n\nMulti-agent methodology for complex problems. Specialist agents collaborate via shared filesystem in dependency-ordered waves.\n\n## Setup\n- Wave 0: prove riskiest assumption first (30 min max, GO/NO-GO decision)\n- Waves 1-N: parallel specialist agents\n- CHAOS agent shadows every wave as devil's advocate\n\n## Specialist Agents\nARCH (architecture), PM (product), DEV (implementation), UX (design), SEC (security), QA (testing), CHAOS (adversarial)\n\n## DECISIONS.md (Append-Only Log)\nFormat: `[D###] OWNER -- decision -- why`\nExample: `[D001] ARCH -- use PostgreSQL not MongoDB -- relational data, team familiarity`\n\n## INTERCEPTOR (Autonomous Controller)\n3 states:\n- EXEC: agents running, no intervention needed\n- AWAIT: blocking issue, waiting for human input\n- WATCH: monitoring, will intervene if drift detected\n\n## 19 DNA Protocols (4 Pillars)\n- **Socratic**: question every assumption\n- **Hermetic**: what works at small scale works at large scale\n- **Antifragile**: design for failure, not despite it\n- **Execution**: ship in waves, validate each wave\n\n## Phase 3 Rule\nAgents that designed the system ALSO produce the deliverables. No handoff to separate \"implementation\" agents -- the designers are accountable for delivery."}, "senior-frontend": {"description": "Senior-level frontend development for React/Next.js/TypeScript/Tailwind. Component patterns, hooks, accessibility, testing with Vitest, bundle analysis.", "tags": ["dev", "frontend", "react", "nextjs"], "prompt": "# Senior Frontend\n\nSenior-level frontend development for React/Next.js/TypeScript/Tailwind.\n\n## React Patterns\n\n**Compound Components** -- for complex UI with shared state:\n```tsx\nconst Tabs = ({ children }) => <TabsContext.Provider value={...}>{children}</TabsContext.Provider>\nTabs.Tab = Tab;\nTabs.Panel = Panel;\n```\n\n**Custom Hooks** -- extract stateful logic:\n- useDebounce, useLocalStorage, useIntersectionObserver\n- Always return stable references (useCallback, useMemo)\n\n**Avoid boolean props** -- use explicit variants instead:\n```tsx\n// Bad: <Button primary />\n// Good: <Button variant=\"primary\" />\n```\n\n## Accessibility Checklist\n- [ ] All interactive elements keyboard accessible\n- [ ] aria-label on icon-only buttons\n- [ ] Proper heading hierarchy (h1 \u2192 h2 \u2192 h3)\n- [ ] Color contrast 4.5:1 minimum\n- [ ] Focus visible styles\n\n## Testing (Vitest + Testing Library)\n```ts\nimport { render, screen } from '@testing-library/react';\nit('renders button', () => {\n  render(<Button>Click me</Button>);\n  expect(screen.getByRole('button')).toBeInTheDocument();\n});\n```\n\n## Bundle Health\n- Avoid barrel imports (`import { x } from './components'`)\n- Use dynamic imports for heavy components\n- Run `next build` and check page sizes"}, "openmontage": {"description": "Agent-orchestrated video production framework. 12 pipelines (explainer, montage, talking head, documentary, avatar, cinematic, etc.), 57 Python tools, 47 Claude skills. Creates professional videos from text briefs using AI. Handles scripting, media sourcing, audio/TTS, editing, rendering via Remotion. Use when asked to create any video content.", "tags": ["video", "content", "production", "ai", "remotion", "animation"], "prompt": "# OpenMontage Video Production\n\n## Location\nFull framework installed at: `vendor/openmontage/`\n\n## Quick Start\n1. Read `vendor/openmontage/AGENT_GUIDE.md` for full agent instructions\n2. Read `vendor/openmontage/PROJECT_CONTEXT.md` for architecture overview\n3. Browse `vendor/openmontage/pipeline_defs/` for available pipelines\n4. Use `vendor/openmontage/.claude/skills/` for specific tool skills\n\n## Available Pipelines\n- **animated-explainer**: Motion graphics explainer videos\n- **animation**: General animation pipeline\n- **avatar-spokesperson**: AI avatar talking head\n- **cinematic**: Cinematic-style video\n- **clip-factory**: Short-form social clips\n- **documentary-montage**: Documentary-style montage\n- **hybrid**: Multi-format hybrid video\n- **localization-dub**: Video translation/dubbing\n- **podcast-repurpose**: Repurpose podcast audio to video\n- **screen-demo**: Screen recording demos\n- **talking-head**: Talking head format\n\n## Key Tools (Python, in vendor/openmontage/tools/)\n- Audio: TTS, music gen, sound effects, speech-to-text\n- Video: ffmpeg editing, stitching, composing, stock sourcing (Pexels, Pixabay)\n- Visual: Image generation (BFL/Flux), style application\n- Rendering: Remotion composer (vendor/openmontage/remotion-composer/)\n\n## API Keys Needed\n- PEXELS_API_KEY (free stock video)\n- PIXABAY_API_KEY (free stock media)\n- ELEVENLABS_API_KEY (TTS)\n- GOOGLE_API_KEY (optional, for some features)\n\n## Workflow\n1. User provides a brief (topic, style, length)\n2. Read the matching pipeline YAML from pipeline_defs/\n3. Follow pipeline stages: brief -> script -> media -> audio -> edit -> render\n4. Use Python tools via bash for media operations\n5. Render final video with Remotion or ffmpeg\n\n## Note\nGPU tools (torch, local video gen, upscaling) are NOT available on Railway. Use API-based alternatives (BFL, ElevenLabs, stock sources)."}, "smart-debug": {"description": "Debug complex issues using specialist debug and performance-engineer subagents. Provides structured root-cause analysis, reproduction steps, and multiple fix options with trade-offs.", "tags": ["dev", "debugging", "ops"], "prompt": "Debug complex issues using specialized debugging agents:\n\n## Debugging Approach\n\n### 1. Primary Debug Analysis\nUse Agent tool with a debugger subagent to:\n- Analyze error messages and stack traces\n- Identify code paths leading to the issue\n- Reproduce the problem systematically\n- Isolate the root cause\n- Suggest multiple fix approaches with trade-offs\n\n### 2. Performance Debugging (if performance-related)\nIf the issue involves performance, spin up a second agent focused on:\n- Profiling code execution\n- Identifying bottlenecks\n- Analysing resource usage\n- Suggesting optimisation strategies\n\n## Output Structure\n\n**Root Cause Analysis**\n- Precise identification of the bug source\n- Why the issue occurs\n- Impact on other components\n\n**Reproduction Guide**\n- Step-by-step reproduction instructions\n- Required environment/test data\n\n**Solution Options**\n1. Quick Fix -- minimal change, risk assessment\n2. Proper Fix -- best long-term solution, refactoring needs\n3. Preventive Measures -- patterns to adopt, tests to add\n\n**Implementation Guide**\n- Specific code changes needed\n- Order of operations\n- Validation steps"}, "brand-guidelines": {"description": "Apply consistent brand identity (colours, typography, tone, visual rules) to any artifact: docs, slides, emails, web pages, decks. Use when working on brand-sensitive output for Levity Leads, EmployeeKit, Thingiverse, BookerBot, or New Dad Playbook. Imported from anthropics/skills as a starter; needs Kern brand definitions to be filled in per project.", "tags": ["brand", "design", "type1", "marketing", "kern", "auto-added"], "prompt": "# Brand Guidelines (Type 1)\n\n**Type 1 skill.** Lives at `/app/.claude/skills/brand-guidelines/SKILL.md`. Source: https://github.com/anthropics/skills/tree/main/skills/brand-guidelines\n\n## How to Use\n\nThe on-disk SKILL.md is Anthropic's example (their colours, their typography). Treat it as a reference for STRUCTURE, not as your brand. For each Kern project, build on top:\n\n## Per-Project Brand Notes\n\nWhen applying this skill, retrieve the brand for the relevant project from memory_recall first (tag: \"brand\", project filter). If nothing is stored, fall back to:\n\n**Levity Leads**\n- Colours: blue #224D87 (primary headings, links), grey #6b7280 (secondary), white background\n- Font: Inter\n- Voice: sardonic, direct, sound like a person with opinions, no LinkedIn energy\n- Surface rules: HEADING_2 in blue for section breaks in Google Docs\n\n**Thingiverse**\n- See teams/thingiverse/CLAUDE.md for current brand notes (CMO consulting context)\n\n**EmployeeKit / EPC Guide / New Dad Playbook**\n- See per-team CLAUDE.md and brand briefs in Drive\n\n## Workflow\n\n1. Identify the surface (Doc, Slide, email, web page, PDF)\n2. Identify the brand (which project)\n3. Pull brand spec from memory_recall or team CLAUDE.md\n4. Apply colours, typography, voice\n5. Audit against the brand checklist before delivering\n\n## Pair With\n\n- `impeccable` (design quality system) for visual polish\n- `google-doc-creation` (formatting via batchUpdate)\n- `senior-frontend` (web execution)"}, "tech-debt": {"description": "Full technical debt inventory and ROI-based remediation roadmap. Categorises debt by type, estimates velocity/cost impact, and generates a prioritised quarter-by-quarter plan with quick wins this sprint.", "tags": ["dev", "ops", "architecture", "planning"], "prompt": "Analyse technical debt and produce a prioritised remediation roadmap.\n\n## Debt Inventory\n\n**Code Debt**\n- Duplicated code (DRY violations)\n- High complexity functions (cyclomatic complexity >10)\n- Long methods (>50 lines), God classes (>500 lines)\n- Magic numbers, poor naming, tight coupling\n\n**Architecture Debt**\n- Missing abstractions\n- Violated boundaries (e.g. DB queries in UI components)\n- Monolithic components that should be split\n- Outdated/deprecated APIs still in use\n\n**Testing Debt**\n- Coverage gaps (untested critical paths)\n- Brittle/flaky tests\n- No integration tests for key flows\n\n**Infrastructure Debt**\n- Manual deployment steps that should be automated\n- Missing monitoring/alerting\n- No rollback procedures documented\n\n**Documentation Debt**\n- Undocumented complex logic\n- Missing API docs\n- No architecture overview\n\n## Impact Assessment\nFor each debt item:\n- Developer time lost per month (rough estimate)\n- Bug risk increase\n- Risk level: Critical / High / Medium / Low\n\n## Remediation Roadmap\n\n**Quick Wins (This Sprint)** -- High ROI, low effort\n**Medium-Term (Next Month)** -- Structural improvements\n**Long-Term (This Quarter)** -- Architectural work\n\n## Prevention\nRecommend quality gates to prevent future accumulation:\n- Pre-commit hooks\n- CI checks (test coverage threshold, dependency audit)\n- Definition of Done that includes debt checks"}, "full-review": {"description": "Multi-agent code review covering quality, security, architecture, performance, and test coverage in parallel. Consolidates into a unified Critical/Recommendations/Suggestions report. The solo builder's substitute for a senior engineer review.", "tags": ["dev", "code-review", "security", "architecture", "workflow"], "prompt": "Perform a comprehensive multi-perspective code review by running parallel specialist reviews.\n\nSpin up 5 specialist subagents in parallel using the Agent tool:\n\n## 1. Code Quality Review\nFocus: Clean code principles, SOLID, DRY, naming conventions, readability, documentation.\nCheck for: Code smells, long methods (>20 lines), large classes, duplicate code, poor naming, tight coupling.\n\n## 2. Security Audit\nFocus: OWASP Top 10 compliance, authentication, authorisation, data protection.\nCheck for: Injection risks, hardcoded secrets, CORS, rate limiting, input validation, insecure dependencies.\n\n## 3. Architecture Review\nFocus: Service boundaries, coupling, cohesion, design patterns, scalability.\nCheck for: Violated boundaries, missing abstractions, God classes, inappropriate pattern usage.\n\n## 4. Performance Analysis\nFocus: Response times, memory usage, database queries, caching opportunities.\nCheck for: N+1 queries, missing indexes, expensive operations in loops, unoptimised assets.\n\n## 5. Test Coverage Assessment\nFocus: Coverage metrics, test quality, edge cases, test maintainability.\nCheck for: Untested code paths, missing error case tests, brittle tests, gaps in integration coverage.\n\n## Consolidated Report\n\nCompile all findings into:\n\n**Critical Issues** (fix before shipping)\n- Security vulnerabilities, broken functionality, architectural flaws\n\n**Recommendations** (fix this sprint)\n- Performance bottlenecks, significant code quality issues, missing tests\n\n**Suggestions** (nice to have)\n- Refactoring opportunities, documentation improvements\n\n**What's Working Well**\n- Good practices to maintain and replicate"}, "decision-toolkit": {"description": "Generate structured decision-making tools: step-by-step guides, bias checkers, scenario explorers, and interactive dashboards. Use when facing significant choices requiring systematic analysis (partnerships, investments, project prioritization, technology selection). Supports multiple cognitive styles and output formats. Especially useful for ADHD: reduces cognitive load through progressive disclosure, one concept per screen.", "tags": ["strategy", "decision-making", "frameworks", "auto-added"], "prompt": "# Decision Toolkit\n\n## Overview\n\nCreate structured decision support materials that help humans think through significant choices systematically. This skill produces interactive tools, not just analysis, empowering the decision-maker rather than deciding for them.\n\n## Principles\n\n1. **Guide, don't decide** -- Tools illuminate the decision space; humans choose\n2. **One thing at a time** -- Reduce cognitive load through progressive disclosure\n3. **Multiple lenses** -- Same decision viewed through different frameworks reveals blind spots\n4. **Biases visible** -- Make cognitive biases explicit and checkable\n5. **Actionable output** -- End with concrete next steps, not abstract conclusions\n\n## When to Use\n\n- Collaboration/partnership decisions\n- Career or job changes\n- Investment of significant time/money\n- Project prioritization\n- Technology/tool selection\n- Any choice with multiple factors and uncertainty\n\n**Not for**: Trivial decisions, emergency responses, or when user just needs information.\n\n## Decision Types\n\n- **Type 1: Opportunity Evaluation** -- Should I pursue this? (partnership, investment, project)\n- **Type 2: Resource Allocation** -- Where to invest time/money/attention?\n- **Type 3: Risk Assessment** -- What could go wrong and is it worth it?\n- **Type 4: Trade-off Navigation** -- Which option among alternatives?\n\n## The Decision Journey (9 Steps)\n\n1. CONTEXT -- What is the decision?\n2. FIRST PRINCIPLES -- Does this solve a real problem?\n3. TIMING -- Is now the right moment?\n4. STAKEHOLDERS -- Who else is involved? Are they stable?\n5. BIASES -- What might cloud my judgment?\n6. OPPORTUNITY COST -- What am I giving up?\n7. SCENARIOS -- What could happen?\n8. QUESTIONS -- What do I still need to learn?\n9. SYNTHESIS -- Summary + decision\n\n## Output Formats\n\n### 1. Interactive HTML Guide (Primary)\nStep-by-step wizard with progress indicator, one question per screen, state persistence, final summary. Keyboard navigable, print-friendly.\n\n### 2. Markdown Framework\nStructured prompts, checkbox bias audit, fill-in-the-blank templates.\n\n### 3. Quick Summary\n5-7 paragraph executive summary with key decision + rationale.\n\n## Core Frameworks\n\n### First Principles Test\n1. What problem does this solve?\n2. Can I solve it myself?\n3. Is this the best solution?\n4. What assumptions am I making?\n5. If starting fresh today, would I choose this?\n\n### Bias Checklist\n- FOMO -- Am I afraid of missing out?\n- Sunk Cost -- Am I factoring past investment?\n- Authority -- Am I deferring to credentials?\n- Social Proof -- Am I following the crowd?\n- Commitment -- Do I feel locked in by past statements?\n- Optimism -- Am I assuming problems will resolve?\n- Recency -- Am I overweighting recent events?\n- Confirmation -- Am I seeking validating info only?\n- Shiny Object -- Is novelty distracting me?\n- Loss Aversion -- Am I overweighting potential losses?\n\n### Opportunity Cost Calculator\nHours/week x Weeks x Hourly rate = Direct cost\n+ What else could those hours produce?\n+ What relationships/opportunities might suffer?\n= True opportunity cost\n\n### Scenario Matrix\n| Scenario | Probability | Outcome | Expected Value |\n|----------|-------------|---------|----------------|\n| Worst    | X%          | ...     | ...            |\n| Bad      | X%          | ...     | ...            |\n| Neutral  | X%          | ...     | ...            |\n| Good     | X%          | ...     | ...            |\n| Best     | X%          | ...     | ...            |\n\n### Pre-mortem\nImagine it's [future date]. This decision failed. Why?\n1. Possible causes\n2. Which are within my control?\n3. Which warning signs should I watch for?\n\n### 10-10-10 Framework\nHow will I feel about this decision in 10 minutes? 10 months? 10 years?\n\n### Regret Minimization\nImagine you're 80 looking back. Would you regret doing this? Would you regret NOT doing this?\n\n## Implementation\n\n1. **Gather Context**: What is the decision? Options? Timeline? Stakes?\n2. **Choose Format**: Complex + time = Interactive HTML. Quick = Markdown. Share = PDF.\n3. **Generate Tool**: Apply frameworks, customize for decision type\n4. **Walk Through**: Guide the user step by step\n\nSource: glebis/claude-skills (adapted for Kern)"}, "webapp-testing": {"description": "Test or interact with a web application using Playwright: verify frontend behaviour, debug UI issues, capture screenshots, inspect DOM, check console logs, exercise forms and flows. Use after deploying a site, when something visual is broken, or when scraping a login-walled page. Pairs with the playwright MCP tools the researcher agent has.", "tags": ["testing", "playwright", "type1", "qa", "frontend", "auto-added"], "prompt": "# Webapp Testing (Type 1)\n\n**Type 1 skill.** Lives at `/app/.claude/skills/webapp-testing/SKILL.md`. Source: https://github.com/anthropics/skills/tree/main/skills/webapp-testing\n\n## Kern Adaptation\n\nThe on-disk SKILL.md emphasises native Python Playwright scripts. Kern has the Playwright MCP server available (added Apr 16, assigned to researcher Apr 19), so you have two paths:\n\n**Path A: Playwright MCP (preferred for ad-hoc checks)**\nUse `mcp__playwright__browser_*` tools directly:\n- `browser_navigate(url)` then `browser_snapshot()` for ARIA tree\n- `browser_take_screenshot()` for visual evidence\n- `browser_click`, `browser_type`, `browser_evaluate` for interaction\n- `browser_close()` when done\nBest for: one-off verification, scraping a page, screenshot-driven QA.\n\n**Path B: Native Python script (for repeatable test suites)**\nFollow the on-disk SKILL.md flow. Best for: regression tests on a deployed site that should be re-runnable.\n\n## Decision Tree\n\n```\nNeed to test or interact with a web page?\n  \u251c\u2500 One-off check, scrape, or \"look at it\" \u2192 Path A (Playwright MCP)\n  \u251c\u2500 Repeatable suite or fixture-based test \u2192 Path B (write Python script)\n  \u2514\u2500 Static HTML file \u2192 Read the file directly first, then test selectors\n```\n\n## Reconnaissance Pattern (both paths)\n\n1. Navigate, wait for networkidle\n2. Snapshot or screenshot to confirm state\n3. Inspect DOM for selectors before clicking\n4. Verify your assumption with a second read after each action\n5. Log any console errors\n\n## Pair With\n\n- `accessibility-audit` for WCAG checks\n- `smart-debug` when a UI bug surfaces\n- `ship-website` after a deploy that needs visual verification"}, "tilt-card": {"description": "3D perspective tilt card following mouse/touch. perspective: 1000px, mouse position mapped to rotation, will-change: transform, dynamic box-shadow.", "tags": ["frontend", "ui", "animation"], "prompt": "# Tilt Card\n\n3D perspective tilt card following mouse/touch position.\n\n## CSS Setup\n```css\n.container { perspective: 1000px; }\n.card {\n  will-change: transform;\n  transform-style: preserve-3d;\n  transition: transform 0.15s ease, box-shadow 0.15s ease;\n}\n.card:hover { transition: transform 0.05s; } /* faster on hover, slower on leave */\n```\n\n## Tilt Calculation\n```js\nconst maxDeg = 6; // degrees\nonMouseMove = (e) => {\n  const rect = card.getBoundingClientRect();\n  const x = (e.clientX - rect.left) / rect.width;  // 0 to 1\n  const y = (e.clientY - rect.top) / rect.height;  // 0 to 1\n  const rotateX = (y - 0.5) * -maxDeg * 2;  // tilt up/down\n  const rotateY = (x - 0.5) * maxDeg * 2;   // tilt left/right\n  card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;\n};\nonMouseLeave = () => { card.style.transform = 'rotateX(0) rotateY(0)'; };\n```\n\n## Dynamic Shadow\n`box-shadow: ${rotateY * 2}px ${rotateX * 2}px 30px rgba(0,0,0,0.3)`\n\n## Touch\n- Use touchmove event, same calculation\n- Max 3\u00b0 on mobile (less dramatic)"}, "instruction-tuning": {"description": "TDD for AI instructions. Launch sub-agents as test subjects against real tasks, monitor their behavior in real-time, identify where instructions fail, fix the instruction files (not the agent code), re-launch fresh agents, repeat until they behave correctly without hints. Use when agents keep failing, after updating CLAUDE.md or agent templates, after the weekly pattern harvest flags agent frictions, or as a periodic health check on the agent ecosystem. The agent output is throwaway. The instruction improvements are the product.", "tags": ["meta", "agents", "testing", "quality", "workflow", "kern"], "prompt": "# Instruction Tuning \u2014 TDD for AI Instructions\n\n## The Idea\n\nYou're not fixing agents. You're fixing the instructions that agents read. Launch agents, watch them fail, diagnose which instruction was too soft, missing, or contradictory, fix it, re-launch fresh agents, verify the fix worked. The agents are test subjects. Their output is throwaway. Instruction improvements are the product.\n\n## When to Use\n\n- **After pattern harvest flags agent frictions** (e.g. \"sub-agent sandbox blocks 3x this session\")\n- **After updating CLAUDE.md or agent templates** \u2014 verify the changes actually work\n- **When agents keep failing the same way** \u2014 the instructions are the bug, not the agent\n- **After adding new skills** \u2014 verify agents discover and use them correctly\n- **Monthly health check** \u2014 pick 3-5 representative tasks, run them through agents, grade the output\n- **After a bad agent experience** \u2014 \"the dev agent did something insane\" = instruction gap\n\n## When NOT to Use\n\n- One-off agent failure (just fix it directly)\n- The agent succeeded but you want better output (that's prompt engineering, not instruction tuning)\n- You're building a new feature (build first, tune later)\n\n## What You're Testing\n\nThe entire instruction chain an agent reads on spawn:\n1. `/app/CLAUDE.md` \u2014 global rules\n2. `/app/teams/[project]/CLAUDE.md` \u2014 project-specific rules  \n3. `/app/.claude/agents/[role].md` \u2014 agent template\n4. Skills discovered via `skill_search` \u2014 workflow templates\n5. Memories recalled via `memory_recall` \u2014 context and past decisions\n\nA failure at ANY level in this chain produces bad agent behavior.\n\n## The Loop\n\n```\n1. PICK test cases (real tasks that agents have struggled with or representative tasks)\n2. LAUNCH sub-agents with worktree isolation (run_in_background: true)\n3. MONITOR every 60 seconds by reading agent JSONL output\n4. GRADE each agent against the scorecard\n5. DIAGNOSE \u2014 which instruction was too soft, missing, or contradictory?\n6. FIX the instruction file (generalized, not task-specific)\n7. CONSISTENCY CHECK \u2014 grep ALL .claude/ files for contradictions\n8. PRUNE \u2014 shorter instructions are followed better. If a rule can be said in 1 line instead of 3, use 1 line\n9. COMMIT fixes\n10. RE-LAUNCH fresh agents on the same tasks to verify\n11. REPEAT until agents pass the scorecard without hints\n```\n\n## Step 1: Pick Test Cases\n\nChoose 3-5 tasks that cover the most common agent types. Good test cases:\n\n| Agent | Example Task | Tests |\n|-------|-------------|-------|\n| dev | \"Fix the bug where X returns null\" | Tool usage, git workflow, memory storage, error diagnosis |\n| researcher | \"Research competitors to X\" | WebSearch/WebFetch, source quality, output format, memory storage |\n| writer | \"Draft a cold email for prospect X\" | Tone, skill discovery, email rules, draft-not-send protocol |\n| pa | \"What's on my calendar this week?\" | Google MCP tools, account selection, formatting |\n| analyst | \"Should we do X or Y?\" | Structured thinking, memory recall, recommendation quality |\n\nPull from recent failures. The weekly pattern harvest is a goldmine for test cases.\n\n## Step 2: Launch Agents\n\nUse worktree isolation so agents can't interfere with each other or the main repo.\n\n```\nAgent({\n  description: \"Instruction tuning: [role] agent test\",\n  subagent_type: \"general-purpose\",\n  model: \"opus\",\n  isolation: \"worktree\",\n  prompt: \"[full agent template from /app/.claude/agents/[role].md]\\n\\n## Your Task\\n\\n[the test case]\\n\\n## Context\\n\\nProject: [project]\\nThis is a real task. Complete it fully.\",\n  run_in_background: true\n})\n```\n\nLaunch all test agents in parallel (single message, multiple Agent calls).\n\n## Step 3: Monitor\n\nRead agent JSONL output every 60 seconds. For each agent, track:\n\n```bash\n# Find agent output files\nls -la /root/.claude/projects/*/subagents/\n\n# Read latest activity from an agent\nFILE=\"/root/.claude/projects/.../subagents/agent-XXXX.jsonl\"\ncat \"$FILE\" | python3 -c \"\nimport sys, json\nfor line in sys.stdin:\n    try:\n        d = json.loads(line)\n        if d.get('type') == 'assistant':\n            for c in d.get('message',{}).get('content',[]):\n                if isinstance(c,dict):\n                    if c.get('type')=='text' and len(c.get('text',''))>20:\n                        print('TEXT:',c['text'][:400]); print('---')\n                    elif c.get('type')=='tool_use':\n                        n=c.get('name','');inp=c.get('input',{})\n                        if n=='Bash': print(f'BASH: {inp.get(\\\"command\\\",\\\"\\\")[:140]}')\n                        elif n in('Read','Write','Edit'): print(f'{n}: ...{inp.get(\\\"file_path\\\",\\\"\\\")[-55:]}')\n                        else: print(f'{n}')\n    except: pass\n\" | tail -25\n```\n\nAt each check, ask: **\"Would I do it this way?\"** If the agent makes a choice you wouldn't make, that's an instruction gap.\n\n## Step 4: Grade (Scorecard)\n\n### Universal Checks (all agents)\n\n| Check | Pass/Fail |\n|-------|-----------|\n| Announced itself correctly (emoji + role + one sentence) | |\n| Called skill_search before starting work | |\n| Called memory_recall for relevant context | |\n| Followed the assumption protocol (didn't ask unnecessary questions) | |\n| Used the right tools (not denied, not wrong tool for job) | |\n| Stored results to memory before finishing | |\n| Ended with TASK_COMPLETE signal | |\n| Output format matches template | |\n| No em dashes in output | |\n| No fabricated URLs | |\n| Stayed within reasonable token budget | |\n\n### Role-Specific Checks\n\n**Dev Agent:**\n- Set git identity before committing\n- Committed and pushed changes\n- Ran tests or verification\n- Used trash over rm\n\n**Researcher:**\n- Retried on tool failure (not fabricated)\n- Included source URLs\n- Findings are substantive (not surface-level)\n\n**Writer:**\n- Matched Rees's voice (sardonic, direct, short sentences)\n- Marked external content as DRAFT\n- Did NOT send emails without approval\n\n**PA:**\n- Used correct Google account (levity/thingiverse/personal)\n- Formatted for Discord (no markdown tables)\n\n## Step 5: Diagnose\n\nFor each failure, classify the root cause:\n\n1. **Missing instruction** \u2014 the rule doesn't exist anywhere in the chain\n2. **Soft instruction** \u2014 the rule exists but uses weak language (\"consider\", \"try to\", \"you might want to\")\n3. **Contradictory instructions** \u2014 two files say different things\n4. **Buried instruction** \u2014 the rule exists but is lost in a wall of text\n5. **Wrong scope** \u2014 the rule is in CLAUDE.md but should be in the agent template (or vice versa)\n6. **Tool access issue** \u2014 the agent was denied a tool it needs (sandbox/permission config)\n7. **Skill gap** \u2014 no skill exists for this workflow, agent improvised badly\n\n## Step 6: Fix\n\nRules for fixing instructions:\n\n- **Generalize.** Every fix must work for ANY task of this type, not just the test case. If a fix only helps one specific task, it's overfitting.\n- **Be specific.** \"Handle errors well\" is useless. \"Retry once on WebSearch failure, then try WebFetch, then report verbatim error\" is actionable.\n- **Use strong language for important rules.** MUST, NEVER, ALWAYS, DO NOT. Soft words (\"consider\", \"try to\") get ignored.\n- **Put rules where they'll be read.** Frequently violated rules should be EARLY in the file. Agents read top-down and attention decays.\n- **One rule per line.** Long paragraphs get skimmed. Short, punchy rules get followed.\n\n## Step 7: Consistency Check\n\nAfter changing any instruction, grep ALL instruction files for the same concept:\n\n```bash\n# Example: if you tightened the skill_search rule\ngrep -rn \"skill_search\\|skill search\\|check.*skill\" /app/.claude/agents/ /app/CLAUDE.md /app/teams/*/CLAUDE.md\n```\n\nEvery hit must be consistent. A single soft \"maybe check for skills\" in one file undoes a hard \"MUST call skill_search\" in another.\n\n## Step 8: Prune\n\nShorter instruction files are followed better. After fixing:\n- Remove redundant lines (same rule said twice)\n- Collapse wordy explanations into one-liners\n- Delete examples that don't add clarity\n- If the file grew, find something to cut\n\n## Convergence\n\nThe loop converges when fresh agents (clean session, no hints):\n1. Pass all universal scorecard checks\n2. Pass all role-specific checks\n3. Complete the task correctly\n4. Do it in reasonable token budget\n5. Produce output that wouldn't need manual correction\n\n## Output\n\nAfter each iteration, produce:\n\n```markdown\n## Instruction Tuning \u2014 Iteration [N]\n\n### Test Cases\n- [role]: [task] \u2014 [PASS/FAIL]\n\n### Failures Found\n1. [failure] \u2014 Root cause: [classification] \u2014 Fixed in: [file]\n\n### Changes Made\n- [file]: [what changed and why]\n\n### Consistency Checks\n- [concept]: verified across [N] files\n\n### Next Iteration\n- [what to test next, or \"converged\" if done]\n```\n\nStore the iteration summary to memory_store (type: \"event\", project: \"general\", tags: [\"instruction-tuning\", \"iteration-N\"], importance 6).\n\n## Session Handoff\n\nIf you need multiple sessions (common for deep tuning), write a handoff to memory:\n- Which iteration you're on\n- Which agents passed/failed\n- What's still broken\n- What to test next"}, "deploy-checklist": {"description": "Generate environment-specific deployment checklists covering pre-flight checks, infra config, CI/CD pipeline, database migrations, monitoring setup, and post-deploy smoke tests. Covers Railway, Vercel, and general Node.js deployments.", "tags": ["dev", "ops", "deployment", "infra"], "prompt": "Generate a deployment checklist and configuration for the specified service/environment.\n\n## Pre-Deployment Checklist\n- [ ] All tests passing\n- [ ] No console.logs or debug code\n- [ ] Environment variables set in target environment (Railway/Vercel)\n- [ ] Database migrations tested on staging\n- [ ] Rollback plan documented\n- [ ] Monitoring/health check endpoint exists\n\n## Environment Config\nVerify for target environment (dev/staging/prod):\n- Env vars set correctly (no dev values in prod)\n- Secrets rotated if needed\n- CORS configured for correct domains\n- Rate limiting enabled\n\n## For Railway Deployments\n- railway.toml present with healthcheckPath\n- Start command correct\n- Required env vars set in Railway dashboard\n- Volume mounts configured if needed\n\n## For Vercel Deployments\n- vercel.json present if custom config needed\n- Env vars set per environment (Production vs Preview)\n- Git identity: rees.calder@levityleads.com (Vercel rejects mismatches)\n- Build command and output directory correct\n\n## Database\n- [ ] Migrations run in correct order\n- [ ] No destructive migrations on live data without backup\n- [ ] Connection pool size appropriate for plan\n\n## Post-Deployment\n- [ ] Health check endpoint returns 200\n- [ ] Core user flows tested manually\n- [ ] Logs show no errors\n- [ ] Monitoring dashboard checked\n- [ ] Team notified\n\n## Rollback Plan\nDocument: how to revert this deployment if something goes wrong (previous Railway deployment, git revert + redeploy, etc.)"}, "supabase": {"description": "Supabase patterns for schema design, RLS, migrations, queries, auth, and REST API usage. Used across all Kern projects. Covers service role vs anon key, pgvector, and direct fetch patterns when MCP tools aren't available.", "tags": ["dev", "database", "supabase", "backend"], "prompt": "# Supabase Patterns\n\nUsed across all Kern projects. MCP tools first, direct fetch as fallback.\n\n## Auth: Which Key to Use\n\n- **Service role key** (`SUPABASE_SERVICE_ROLE_KEY`): bypasses RLS, for server-side/admin ops only. Never expose client-side.\n- **Anon key** (`SUPABASE_ANON_KEY`): respects RLS, for client-side or public operations.\n- **MCP tools** (`supabase-memory`): use for memory/skills/schedules. Don't reinvent with direct API.\n\n## Direct REST API (when MCP not available)\n\n```js\nconst sb = (path, opts = {}) => fetch(\n  `${process.env.SUPABASE_URL}/rest/v1/${path}`,\n  {\n    ...opts,\n    signal: AbortSignal.timeout(15000), // always timeout\n    headers: {\n      apikey: process.env.SUPABASE_SERVICE_ROLE_KEY,\n      Authorization: `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,\n      'Content-Type': 'application/json',\n      Prefer: 'return=representation',\n      ...opts.headers,\n    },\n  }\n).then(r => r.json());\n\n// Examples\nconst rows = await sb('contacts?select=id,name&status=eq.active');\nconst one  = await sb('contacts?id=eq.abc&select=*&limit=1').then(r => r[0]);\nawait sb('contacts?id=eq.abc', { method: 'PATCH', body: JSON.stringify({ status: 'done' }) });\nawait sb('contacts', { method: 'POST', body: JSON.stringify({ name: 'Rees' }) });\nawait sb('contacts?id=eq.abc', { method: 'DELETE' });\n```\n\n## Query Operators\n- `column=eq.value` -- equals\n- `column=neq.value` -- not equals\n- `column=ilike.*term*` -- case-insensitive LIKE\n- `column=gte.value` / `lte.value` -- range\n- `column=in.(a,b,c)` -- IN list\n- `column=is.null` -- IS NULL\n- `select=id,name,rel(*)` -- join related table\n- `order=created_at.desc&limit=50&offset=0` -- pagination\n\n## RLS Patterns\n\n```sql\n-- Enable RLS\nALTER TABLE contacts ENABLE ROW LEVEL SECURITY;\n\n-- Service role bypasses all RLS automatically\n-- Anon/user role needs explicit policies:\nCREATE POLICY \"Users see own rows\"\n  ON contacts FOR SELECT\n  USING (auth.uid() = user_id);\n\nCREATE POLICY \"Users insert own rows\"\n  ON contacts FOR INSERT\n  WITH CHECK (auth.uid() = user_id);\n```\n\n## Migrations (via SQL editor or supabase CLI)\n\n```sql\n-- Always use IF NOT EXISTS / IF EXISTS for safety\nALTER TABLE contacts ADD COLUMN IF NOT EXISTS custom_fields jsonb DEFAULT '{}';\nCREATE INDEX IF NOT EXISTS contacts_status_idx ON contacts(status);\nDROP INDEX IF EXISTS old_index;\n```\n\nRule: never drop columns in production without a deprecation period. Add first, migrate data, drop later.\n\n## pgvector (used in Kern memory)\n\n```sql\n-- Store embedding\nUPDATE memories SET embedding = '[0.1, 0.2, ...]'::vector WHERE id = 'abc';\n\n-- Semantic search\nSELECT id, content, 1 - (embedding <=> query_vec::vector) AS similarity\nFROM memories\nORDER BY embedding <=> query_vec::vector\nLIMIT 10;\n```\n\n## JSONB Patterns (custom_fields etc.)\n\n```js\n// Query nested JSON\n`contacts?custom_fields->last_call->>status=eq.completed`\n\n// Update nested (use PATCH with jsonb_set or just overwrite whole field)\nbody: JSON.stringify({ custom_fields: { ...existing, last_call: newCall } })\n```\n\n## Common Gotchas\n- Missing `Prefer: return=representation` header means PATCH/POST returns empty body\n- RLS will silently return 0 rows (not 403) if policy blocks access -- check key in use\n- `select=*` on large tables is expensive -- always select only needed columns\n- Supabase rate limits on anon key: 100 req/s. Service role: higher but not unlimited\n- Always add `AbortSignal.timeout(15000)` to all fetch calls"}, "email-auto-apply": {"description": "Auto-apply to consulting/fractional gigs that accept email applications. Generates a cover letter via reescalder.com/api/cover-letter, creates a pitch page at reescalder.com/for/[slug], and drafts an email via Gmail (levity account) from atlas@levityleads.com. Used by the consulting-gig-apply cron for HN Who's Hiring posts, direct email job listings, and any gig where the application method is \"email [address]\".", "tags": ["consulting", "gig", "auto-apply", "email", "outreach"], "prompt": "# Email Auto-Apply Skill\n\nApply to a gig via email when the listing provides an email address for applications.\n\n## Prerequisites\n- Gig must have `apply_method: \"email\"` or contact email identified\n- Gig must be in `gig_applications` table with status \"qualified\" or \"discovered\" with fit >= 6\n\n## Step 1: Generate Pitch Page\n\nCreate/update a pitch page for this gig in Supabase:\n\n```bash\n# Upsert the pitch page data\ncurl -X POST \"$SUPABASE_URL/rest/v1/gig_applications\" \\\n  -H \"apikey: $SUPABASE_SERVICE_ROLE_KEY\" \\\n  -H \"Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Prefer: resolution=merge-duplicates\" \\\n  -d '{\"id\": \"[existing-id]\", \"pitch_slug\": \"[company-slug]\", \"status\": \"applying\"}'\n```\n\nThe pitch page will be live at: https://reescalder.com/for/[company-slug]\n\n## Step 2: Generate Cover Letter\n\nCall the cover letter API:\n\n```bash\ncurl -X POST \"https://reescalder.com/api/cover-letter\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"company\": \"[Company Name]\",\n    \"role\": \"[Role Title]\",\n    \"description\": \"[Job description text]\",\n    \"skills\": [\"marketing\", \"AI\", \"product\"]\n  }'\n```\n\nThis returns a tailored cover letter. Store it in the gig_applications row.\n\n## Step 3: Draft Email via Gmail\n\nUse `mcp__kern-google__gmail_draft` with:\n- account: \"levity\"\n- to: [contact email from listing]\n- subject: \"[Role Title] - Rees Calder\"\n- body: Cover letter text + pitch page URL + reescalder.com link\n- Format: professional but warm, not corporate\n\nEmail structure:\n1. Opening hook tied to something specific about their company/role\n2. 2-3 bullet points on relevant experience (Marketing + Product + AI intersection)\n3. Pitch page link: \"I put together a quick page showing how my experience maps to this role: https://reescalder.com/for/[slug]\"\n4. Soft close asking for a 15-min call\n5. Sign off as Rees Calder\n\n## Step 4: Update Status\n\nAfter drafting (NOT sending), update the gig_applications row:\n- status: \"applied\"  \n- applied_at: current timestamp\n- cover_letter: the generated text\n- notes: \"Email drafted in Gmail (atlas@levityleads.com). Awaiting Rees approval to send.\"\n\n## CRITICAL RULES\n- NEVER send the email. Only draft it. Rees must approve before sending.\n- Always include the pitch page URL in the email body.\n- Always include reescalder.com as the main portfolio link.\n- If no contact email exists, mark the gig as \"qualified\" with notes explaining manual action needed.\n- Keep emails under 200 words. Brevity wins."}, "prompt-optimize": {"description": "Take an existing AI prompt and improve it. Applies chain-of-thought engineering, few-shot examples, context compression, model-specific tuning for Claude, and A/B testing framework. Returns optimised versions with explanations.", "tags": ["ai", "marketing", "dev", "productivity"], "prompt": "Optimise the provided prompt for better AI model performance.\n\n## Analysis\nFirst, identify what the prompt is trying to achieve and where it's falling short:\n- Is the instruction clear and unambiguous?\n- Is the output format specified?\n- Is there unnecessary verbosity or redundancy?\n- Does it need examples to clarify intent?\n\n## Optimisation Steps\n\n### 1. Chain-of-Thought Engineering\nAdd reasoning steps where needed. \"Think step by step\" or explicit numbered steps improve accuracy on complex tasks.\n\n### 2. Role and Context\nAdd a clear role if missing: \"You are a [role] specialising in [domain].\"\nAdd relevant context the model needs to do the job well.\n\n### 3. Few-Shot Examples\nIf the task has a specific output format, add 1-2 examples:\n```\nInput: [example]\nOutput: [example output]\n```\n\n### 4. Output Format Specification\nBe explicit about format, length, tone. \"Return a JSON array\", \"Under 100 words\", \"Bullet points only\".\n\n### 5. Claude-Specific Tuning\n- Use XML tags for structured inputs: `<context>`, `<task>`, `<format>`\n- Prefill the assistant response to steer format\n- For long prompts: put instructions at the end (recency bias)\n- Be direct -- Claude responds well to direct instructions without over-explaining\n\n### 6. Token Efficiency\nRemove redundant words, merge duplicate instructions, compress context without losing meaning.\n\n## Output\nProvide:\n1. Optimised prompt (ready to use)\n2. What changed and why (brief explanation per change)\n3. Alternative version if a different approach is worth considering\n4. Suggested test cases to validate the improvement"}, "designrip": {"description": "Extract any website's design system from the live DOM. Use when Rees asks to analyse a site's design, rip a design, compare two sites' styles, or when starting a new UI project and wants to reference an existing site's design language. Outputs: design-language.md (AI-optimised), design-tokens.json (W3C DTCG), tailwind.config.js. Built on Playwright headless Chromium. Feeds directly into the signature design skill.", "tags": ["design", "extraction", "playwright", "tailwind", "ui", "kern", "tool"], "prompt": "\n# designrip \u2014 Design System Extraction\n\n## When to use\n- Rees says \"rip the design from X site\" / \"analyse X's design\" / \"what does X look like?\"\n- Starting a new UI project and wants to reference a competitor or inspiration site\n- Comparing design systems across sites\n- Feeding design tokens into the signature skill for a new build\n- Auditing one of Rees's own sites for design consistency\n\n## Command\n```bash\nnode /app/scripts/designrip.mjs <url> [--out <dir>] [--wait <ms>]\n```\n\n### Options\n- `--out <dir>` \u2014 output directory (default: `/tmp/designrip/{domain}/`)\n- `--wait <ms>` \u2014 wait after page load for SPAs (default: 3000ms, increase for heavy SPAs)\n\n## Output files (all in output dir)\n1. **design-language.md** \u2014 full markdown: colors (classified by context + WCAG contrast), typography (families, type scale, samples), spacing scale, shadows, border radii, layout patterns (grid/flex/containers), motion/transitions, CSS custom properties, brand voice (headlines, CTAs), component pattern counts, metadata\n2. **design-tokens.json** \u2014 W3C Design Tokens Community Group format, portable\n3. **tailwind.config.js** \u2014 ready to drop into any Tailwind project\n\n## After extraction\n1. Read `design-language.md` with the Read tool to understand the site's design system\n2. Use the findings to inform builds \u2014 either as direct config (tailwind.config.js) or as reference for the signature skill\n3. For comparison: run on two sites, diff the markdown outputs\n\n## Known limitations (v1)\n- CSS custom properties from cross-origin stylesheets are not captured\n- Sites heavy on Tailwind utility classes show fewer computed colors (the real palette lives in CSS vars)\n- Tailwind config color names are generic (text1, border6) \u2014 manual renaming recommended\n- Spacing extraction includes granular values \u2014 cluster mentally into a base-unit scale\n- No dark mode toggle yet (--dark flag planned)\n- Single page only (no --depth crawl yet)\n\n## Architecture\n- Playwright headless Chromium (already installed on Railway)\n- Single `page.evaluate()` block walking up to 3000 DOM elements\n- Collects: getComputedStyle for colors/fonts/spacing/shadows/radii/layout/motion, plus stylesheet font-face rules, Google Fonts links, meta tags, heading/CTA text\n- Three formatters: markdown, DTCG tokens, Tailwind config\n- ~500 lines of Node.js, zero external deps beyond Playwright\n\n## Dependency\n- Playwright must be installed (`/tmp/node_modules/playwright/`). If import fails, run: `cd /tmp && npm install playwright`\n- Chromium binary at `/root/.cache/ms-playwright/chromium-1217/`\n\n## Future (planned, not built)\n- `--dark` flag for dark mode extraction\n- `--depth N` for multi-page crawl\n- `--diff <url1> <url2>` for side-by-side comparison\n- Semantic color naming (primary/secondary/accent classifier)\n- Public GitHub repo (Rees approved, needs to be set up)\n- MCP server wrapper for inline Claude Code use\n"}, "accessibility-audit": {"description": "Audit a web page or component for WCAG 2.2 AA compliance and produce a prioritised fix list. Use before shipping a content site or landing page, when onboarding a new product, or when accessibility is flagged as a concern.", "tags": ["web", "accessibility", "quality", "audit"], "prompt": "You are conducting a WCAG 2.2 AA accessibility audit. Keep it pragmatic, not legalistic.\n\n## 1. Scope\n\nConfirm what to audit:\n- Specific URL or route\n- Component or full page\n- Any known user complaints or failed tests\n\n## 2. Automated scan\n\nRun the quickest wins first:\n- `npx @axe-core/cli <url>` for violations\n- Lighthouse accessibility score (via Playwright or CLI)\n- Capture screenshot and page snapshot for manual review\n\n## 3. Manual checks\n\nWork through the WCAG AA areas that tools miss:\n\n**Keyboard**\n- Tab order follows visual order\n- All interactive elements reachable and operable with keyboard\n- Visible focus indicator on every focusable element\n- No keyboard traps\n\n**Screen reader semantics**\n- Headings form a logical outline (one h1, no skipped levels)\n- Images have alt text (decorative = empty alt, informative = descriptive)\n- Form inputs have associated labels\n- Buttons describe their action, links describe their destination\n- ARIA used sparingly and correctly (prefer native HTML)\n\n**Colour and contrast**\n- Text meets 4.5:1 (3:1 for large text)\n- Information not conveyed by colour alone\n- Focus indicator contrasts with background\n\n**Motion and timing**\n- No auto-playing video with sound\n- Animations respect prefers-reduced-motion\n- No content that flashes more than 3 times per second\n\n## 4. Prioritise\n\nGroup findings into:\n- **Blockers**: fail WCAG AA, affect primary user journeys. Fix before ship.\n- **Important**: fail WCAG AA on secondary flows, or poor UX for assistive tech users.\n- **Nice-to-have**: minor polish, AAA-level improvements.\n\n## 5. Deliver\n\nFor each finding:\n- **Issue**: what's wrong (one line)\n- **Impact**: who it affects and how\n- **WCAG ref**: e.g. 1.4.3 Contrast (Minimum)\n- **Fix**: concrete code change or copy update\n\nEnd with a one-paragraph summary: overall grade, top 3 things to fix first, estimated effort.\n\nNo jargon dumps. Rees is not a WCAG expert, write for a smart non-specialist."}, "seo-article": {"description": "Write a complete SEO-optimised long-form article for Kern's content sites (EmployeeKit, New Dad Playbook, EPC Guide). Covers structure, keyword placement, schema markup, FAQ section, internal linking, and tone. Use when the content engine is writing a new article from the backlog.", "tags": ["content", "seo", "writing", "employeekit", "new-dad-playbook"], "prompt": "# SEO Article Writing\n\nFor Kern's content sites: EmployeeKit (UK employer law), New Dad Playbook (first-time dads), EPC Guide (energy/property).\n\n## Before Writing\n\n1. **Research the SERP** -- WebSearch the target keyword. Check top 3 results: what angle do they take? What are they missing? What questions do they not answer?\n2. **Check People Also Ask** -- WebSearch \"[keyword] site:google.com\" or just note PAA boxes in search results. These become your FAQ section.\n3. **Find a credible source** -- NHS/NICE for health content, GOV.UK/ACAS for employment law, HMRC/EPC register for energy. Cite it.\n\n## Article Structure (1,500-2,500 words)\n\n```\nH1: [Target keyword + intent signal, 50-60 chars]\n\n[Hook: 2-3 sentences. State the problem, promise the answer. No fluff.]\n\n## [H2: What/Why question -- targets featured snippet]\n[Concise answer first (2-3 sentences for snippet capture), then expand.]\n\n## [H2: Core content section]\n[Subheadings (H3) for scannability. Bullet lists where appropriate.]\n\n## [H2: Practical steps or what to do]\n[Numbered steps if sequential, bullets if not.]\n\n## [H2: Common mistakes / When to worry / What this means for you]\n[The \"so what\" section that competitors skip.]\n\n## [CTA section -- soft, contextual]\n[1 paragraph pointing to relevant tool or next step. Not salesy.]\n\n## Frequently Asked Questions\n\n**Q: [Question from PAA or reader research]**\nA: [2-4 sentence answer. Cite source if relevant.]\n\n[Minimum 4 Q&As. More for competitive keywords.]\n```\n\n## SEO Rules\n\n**Title tag** (goes in frontmatter/head): 50-60 chars, target keyword in first 30 chars.\n**Meta description**: 150-160 chars, includes keyword, compelling but not clickbait.\n**One H1 only** -- matches or closely reflects title tag.\n**H2/H3 hierarchy** -- include secondary keywords naturally. Don't stuff.\n**Internal links** -- minimum 3 links to existing articles on the same site.\n**Keyword density** -- target keyword appears in: H1, first paragraph, at least 2 H2s, conclusion.\n\n## Schema Markup (JSON-LD in head)\n\nAlways include:\n- `Article` schema (required)\n- `FAQPage` schema matching the FAQ section (required)\n- `HowTo` schema if article is instructional (optional)\n\n## Format by Site\n\n**EmployeeKit** (MDX):\n```mdx\n---\ntitle: \"...\"\nslug: \"...\"\ndescription: \"...\"\npublishedAt: \"YYYY-MM-DD\"\nupdatedAt: \"YYYY-MM-DD\"\ntopic: \"dismissal\"\ncluster: \"disciplinary\"\nreadTime: 8\nkeywords: [\"...\"]\n---\n```\nTone: employer POV ONLY, never employee. Plain English. UK English spelling. No legalese. Cite specific legislation (ERA 1996, ERA 2025) by name.\n\n**New Dad Playbook** (HTML):\nFull HTML file with GA4 tag, canonical, og tags, email capture component. Tone: honest, practical, slightly sardonic. Like a mate who's been through it. Evidence-based where relevant.\n\n**EPC Guide** (MDX or HTML per existing pattern):\nProperty/energy owner POV. Practical, jargon-free. Link to EPC register where relevant.\n\n## Non-Negotiables (all sites)\n- No em dashes. Ever. Commas, colons, or restructure.\n- No emojis in HTML/MDX.\n- UK English spelling (optimise, colour, licence as noun, practise as verb).\n- No fabricated statistics or URLs -- only cite real sources you've verified.\n- Word count 1,500 minimum. 2,000-2,500 for competitive keywords.\n- FAQ section with minimum 4 Q&As.\n- Internal links to at least 3 existing articles."}, "ai-seo": {"description": "Optimize content to appear in AI-generated answers, LLM search results (ChatGPT, Perplexity, Google AI Overviews, Copilot). Covers structured content, entity authority, citation-friendliness, and LLM-specific ranking signals. Use alongside traditional SEO when writing content for any Kern site.", "tags": ["marketing", "seo", "content", "ai"], "prompt": "# AI SEO -- Optimizing for LLM Search\n\nContent now surfaces in AI-generated answers (ChatGPT search, Perplexity, Google AI Overviews, Copilot). Traditional SEO still matters, but AI SEO is a separate discipline.\n\n## Core Principle\n\nLLMs don't rank pages. They extract and cite trustworthy, structured, unambiguous content. Your goal: be the source the model quotes.\n\n## 7 Rules for AI-Citeable Content\n\n1. **Lead with the answer.** First 2-3 sentences should directly answer the query. No preamble, no \"In this article we'll explore...\" The model extracts the first clear answer it finds.\n\n2. **Use definition-style formatting.** \"X is Y\" pattern. \"SSP stands for Statutory Sick Pay. It is paid by employers at a rate of [amount] per week.\" Models love extractable definitions.\n\n3. **Structure with semantic HTML.** H2s as questions (\"What is X?\", \"How does Y work?\"). FAQ sections with Q/A pairs. Schema markup (FAQPage, HowTo). Models parse structure, not vibes.\n\n4. **Be the primary source, not the aggregator.** Original data, specific numbers, named methodologies, proprietary frameworks. Models prefer citing originators over summarisers.\n\n5. **Entity clarity.** Mention your brand/site name near key claims. \"According to EmployeeKit's analysis...\" or \"The EPC Guide recommends...\" This builds entity authority in the knowledge graph.\n\n6. **Cite your sources explicitly.** \"Per ACAS guidance (2025)...\" or \"NHS recommends...\" Models trust content that itself cites authoritative sources. It's a trust signal.\n\n7. **Avoid ambiguity.** Don't hedge everything. State facts clearly. \"Employers must give at least one week's notice\" beats \"It's generally advisable to consider providing notice where possible.\"\n\n## Content Structure for AI Pickup\n\n```\nH1: [Clear topic statement]\n\n[2-3 sentence direct answer to the primary query]\n\n## What is [Topic]?\n[Definition-style paragraph. Entity mention. Source citation.]\n\n## How [Topic] Works\n[Step-by-step or clear explanation. Numbered if sequential.]\n\n## Key Facts About [Topic]\n[Bullet list of specific, extractable facts with numbers/dates]\n\n## Common Questions About [Topic]\n[FAQ pairs -- these are gold for AI answers]\n\n## Sources\n[Named sources with dates. Builds trust signal.]\n```\n\n## Monitoring AI Visibility\n\n- Search your target keywords in ChatGPT, Perplexity, and Google (check AI Overview)\n- Note: are you cited? Is your content paraphrased? Are competitors cited instead?\n- Track which content structures get picked up vs ignored\n- Google Search Console: filter for AI Overview appearances (if available)\n\n## What NOT To Do\n\n- Don't write for \"AI SEO\" by stuffing keywords differently. Write clearly for humans, structure for machines.\n- Don't gate content behind email walls if you want AI citation (models can't see gated content)\n- Don't rely on backlinks alone. AI models weight content quality and structure over link profiles.\n- Don't use vague language hoping to rank for more queries. Specificity wins.\n\n## Relationship to Traditional SEO\n\nAI SEO doesn't replace traditional SEO. You still need:\n- Technical SEO (Core Web Vitals, mobile-first, HTTPS)\n- On-page SEO (title tags, meta descriptions, H-tag hierarchy)\n- Content quality and depth\n\nAI SEO adds: structure for extraction, entity authority, citation-friendliness, and answer-first formatting."}, "fanned-cards": {"description": "Fanned card carousel with active card centred, adjacent cards peeking from behind. Swipe/click/arrow navigation with Framer Motion springs.", "tags": ["frontend", "ui", "carousel"], "prompt": "# Fanned Cards Carousel\n\nFanned card carousel. Active card centred with glow effect, adjacent cards peek from behind (dimmed, scaled).\n\n## Navigation\n- Swipe left/right (touch)\n- Click adjacent cards\n- Arrow keys\n\n## Framer Motion Config\n- Spring: stiffness 300, damping 30\n- Active card: scale 1, full opacity, cyan border glow\n- Adjacent cards: scale 0.85, opacity 0.6, no glow\n- Cards behind: scale 0.7, opacity 0.3\n\n## Layout\n- Cards positioned absolutely, centred\n- Z-index based on distance from active\n- Perspective on container for depth effect"}, "discourse-api": {"description": "Interact with the Thingiverse Discourse forum API. Use when any agent needs to read topics, post content, manage users, moderate, or check forum stats. Full admin access available.", "tags": ["discourse", "forum", "thingiverse", "community", "api"], "prompt": "## Thingiverse Discourse Forum API\n\n**Base URL:** https://forum.thingiverse.com (env var: $DISCOURSE_BASE_URL)\n**API Key:** env var: $DISCOURSE_API_KEY\n**Access Level:** Full admin (system user)\n\n### Authentication\nPass these headers on every request:\n```\nApi-Key: $DISCOURSE_API_KEY\nApi-Username: system\n```\n\n### Environment Note\nNo curl available. Use Node.js fetch():\n\n```javascript\nconst API_KEY = process.env.DISCOURSE_API_KEY;\nconst BASE = process.env.DISCOURSE_BASE_URL || 'https://forum.thingiverse.com';\nconst headers = { 'Api-Key': API_KEY, 'Api-Username': 'system', 'Content-Type': 'application/json' };\n\nasync function discourseGet(path) {\n  const r = await fetch(BASE + path, { headers, signal: AbortSignal.timeout(10000) });\n  return r.json();\n}\n\nasync function discoursePost(path, body) {\n  const r = await fetch(BASE + path, { method: 'POST', headers, body: JSON.stringify(body), signal: AbortSignal.timeout(10000) });\n  return r.json();\n}\n\nasync function discoursePut(path, body) {\n  const r = await fetch(BASE + path, { method: 'PUT', headers, body: JSON.stringify(body), signal: AbortSignal.timeout(10000) });\n  return r.json();\n}\n\nasync function discourseDelete(path) {\n  const r = await fetch(BASE + path, { method: 'DELETE', headers, signal: AbortSignal.timeout(10000) });\n  return r.json();\n}\n```\n\n### Read Operations\n- `GET /about.json` - site stats (users, topics, posts, activity)\n- `GET /categories.json` - list all categories\n- `GET /latest.json` - latest topics\n- `GET /top.json` - top topics (by period: /top/daily.json, /top/weekly.json, etc.)\n- `GET /c/{category_id}.json` - topics in a specific category\n- `GET /t/{topic_id}.json` - read a topic with all posts\n- `GET /t/{topic_id}/posts.json?post_ids[]={id}` - specific posts\n- `GET /search.json?q={query}` - full text search\n- `GET /u/{username}.json` - user profile\n- `GET /groups.json` - list groups\n- `GET /admin/users/list/active.json` - admin user list with emails\n- `GET /admin/dashboard.json` - admin dashboard stats\n- `GET /admin/site_settings.json` - all site settings\n- `GET /admin/reports/{report_type}.json` - specific reports (signups, topics, posts, etc.)\n- `GET /notifications.json` - notifications\n- `GET /tags.json` - all tags\n\n### Write Operations\n\n**Create a new topic:**\n```javascript\ndiscoursePost('/posts.json', {\n  title: 'Topic Title',\n  raw: 'Post body in Markdown',\n  category: 2  // category ID\n});\n```\n\n**Reply to a topic:**\n```javascript\ndiscoursePost('/posts.json', {\n  topic_id: 123,\n  raw: 'Reply body in Markdown'\n});\n```\n\n**Edit a post:**\n```javascript\ndiscoursePut('/posts/{post_id}.json', {\n  post: { raw: 'Updated content' }\n});\n```\n\n**Pin/unpin a topic:**\n```javascript\ndiscoursePut('/t/{topic_id}/status.json', {\n  status: 'pinned',\n  enabled: 'true'\n});\n```\n\n**Close/open a topic:**\n```javascript\ndiscoursePut('/t/{topic_id}/status.json', {\n  status: 'closed',\n  enabled: 'true'  // or 'false' to reopen\n});\n```\n\n**Create a category:**\n```javascript\ndiscoursePost('/categories.json', {\n  name: 'Category Name',\n  color: '0088CC',\n  text_color: 'FFFFFF',\n  parent_category_id: null  // or parent ID for subcategory\n});\n```\n\n**Invite a user:**\n```javascript\ndiscoursePost('/invites.json', {\n  email: 'user@example.com',\n  group_ids: [],\n  custom_message: 'Welcome message'\n});\n```\n\n**Change user trust level:**\n```javascript\ndiscoursePut('/admin/users/{user_id}/trust_level.json', {\n  level: 2  // 0-4\n});\n```\n\n**Send a system PM:**\n```javascript\ndiscoursePost('/posts.json', {\n  title: 'PM Subject',\n  raw: 'Message body',\n  target_recipients: 'username',\n  archetype: 'private_message'\n});\n```\n\n**Delete a post:**\n```javascript\ndiscourseDelete('/posts/{post_id}.json');\n```\n\n### Current Forum State (as of April 23, 2026)\n- 78 users, 20 topics, 86 posts, 47 likes\n- **Categories:** New Features Ideas (id:2), General (id:4), What's New (id:6), Events (id:5), Staff (id:3)\n- **Admins:** rees, aandreou, thingiro, luis_cordoba\n- **Most active:** thingiro (15 posts), remi_rafael (6 posts), ekuruvilla (5 posts)\n- **Tagline:** \"The Community for Open Hardware, since 2008\"\n- Brand line: \"DARE TO BE HUMAN\" (anti-AI positioning)\n\n### Safety Rules\n- NEVER delete topics/posts without Rees's explicit approval\n- NEVER suspend/ban users without approval\n- Creating topics, posting replies, and pinning are SAFE to do autonomously\n- Moderation actions (close, hide, delete) need approval\n- Site settings changes need approval\n- When posting as system, make sure the tone matches Thingiverse brand: community-first, pro-human-creator, open source hardware advocate"}, "vertical-fanned-cards": {"description": "Vertical card carousel with auto-cycle every 2.5s when in view. Swipe up/down navigation, dot indicators, stops permanently on user interaction.", "tags": ["frontend", "ui", "carousel"], "prompt": "# Vertical Fanned Cards\n\nVertical card carousel. Active card prominent, adjacent cards peek above/below.\n\n## Behaviour\n- Auto-cycles every 2.5s when in view (useInView)\n- Stops permanently on first user interaction (userInteracted state)\n- Swipe up/down with 30px threshold\n- Dot indicators with active pill\n\n## Props\n```ts\n{\n  items: T[],\n  renderCard: (item: T) => ReactNode,\n  cardHeight?: number,   // default 155px\n  overlap?: number,      // default 22px (how much adjacent cards peek)\n}\n```\n\n## Layout\n- Cards positioned absolutely, stacked on Y axis\n- Active card: full opacity, scale 1\n- Adjacent: opacity 0.6, scale 0.92, translateY \u00b1(cardHeight - overlap)\n- Cards beyond adjacent: hidden (opacity 0)\n\n## Auto-cycle\n```ts\nconst { ref, inView } = useInView({ threshold: 0.5 });\nuseEffect(() => {\n  if (!inView || userInteracted) return;\n  const interval = setInterval(() => setActive(a => (a + 1) % items.length), 2500);\n  return () => clearInterval(interval);\n}, [inView, userInteracted]);\n```"}, "mega-code-fix": {"description": "Parallel 7-subagent codebase cleanup for mature repos that have accumulated AI slop, dead code, duplication, and drift. Use when Rees says \"mega code fix\", \"clean up this codebase\", \"reduce the cruft\", or when auditing a repo he's built with Claude Code that's starting to feel bloated. Each subagent runs in a separate track, assesses with critical eye, ranks changes by confidence, implements only high-confidence low-risk fixes, then runs checks. Not for greenfield or small codebases \u2014 built for repos with real accumulation (Content Engine, BookerBot, Kern core, etc).", "tags": ["dev", "code-quality", "claude-code", "subagents", "cleanup", "kern"], "prompt": "\n# Mega Code Fix \u2014 7-Track Parallel Cleanup\n\n## When to use\nA mature codebase that's accumulated AI-generated cruft: duplicated logic, scattered types, dead exports, circular deps, weak types (`any`/`unknown` placeholders), defensive try/catches that swallow errors, stub comments. Sweet spot: 10K\u2013100K LOC repos Rees has built with Claude Code over several months.\n\n## When NOT to use\n- Greenfield / under 5K LOC (there's nothing to clean)\n- Production critical paths without a staging/branch safety net\n- Right before a demo or deploy (surgery, not whilst driving)\n\n## Guardrails (non-negotiable)\n1. Run on a fresh branch (`git checkout -b mega-fix-YYYY-MM-DD`)\n2. Each subagent produces a CRITICAL ASSESSMENT before changing anything \u2014 ranked by confidence, with rationale\n3. Each subagent implements ONLY the HIGH-CONFIDENCE, LOW-RISK slice. Everything else gets logged to a `REVIEW.md` for Rees to adjudicate\n4. Run full test + type + lint + build after each subagent finishes\n5. Commit per subagent so rollback is a single revert\n\n## Master prompt (paste into Claude Code / Codex)\n\n> I want to clean up my codebase and improve code quality through a careful, low-risk cleanup pass.\n>\n> Work in 7 focused tracks. For each track: inspect the code, write a critical assessment, rank changes by confidence, implement ONLY high-confidence low-risk fixes, then run all checks after.\n>\n> Anything medium or low confidence goes into REVIEW.md for human adjudication. Commit per track. Do not proceed to track N+1 if track N broke tests.\n\n## The 7 subagents\n\n### SA1 \u2014 Deduplication\nScan the entire codebase for repeated logic, copy-pasted functions, and redundant abstractions. Consolidate where it reduces complexity without obscuring intent. Implement DRY only where it genuinely simplifies. DO NOT merge code that merely LOOKS similar but serves different purposes.\n\n### SA2 \u2014 Type consolidation\nFind all type definitions scattered across files. Consolidate any that should be shared where duplication causes drift or inconsistency. Check for types defined in multiple places that have quietly gone out of sync. Merge into a single source of truth.\n\n### SA3 \u2014 Dead code removal\nUse tools like `knip` (TS/JS) or equivalent to find all unused exports, unreferenced functions, and orphaned files. VERIFY MANUALLY before removing. Check for: dynamic imports, config references, framework conventions (Next.js route files, etc), and code generation that static analysis misses. Remove only what is CONFIRMED dead.\n\n### SA4 \u2014 Circular dependencies\nUse tools like `madge` to map the full dependency graph. Identify every circular import and prioritise the ones that affect maintainability, testability, or correctness. Untangle by extracting shared logic into neutral modules. DO NOT introduce new abstractions just to break a cycle.\n\n### SA5 \u2014 Type strengthening\nFind every instance of `any`, `unknown`, and other weak types the AI left as placeholders. Research what the real types should be by inspecting the codebase, related packages, and actual runtime usage. Replace with STRONG types. Run type checks after every batch. Preserve legitimate boundary types where `unknown` is correct (external API responses pre-validation, etc).\n\n### SA6 \u2014 Error handling cleanup\nFind all try/catch blocks and equivalent defensive patterns. Remove any that are silently swallowing errors, hiding failures, or falling back to defaults that mask real problems. Keep error handling that serves a REAL boundary: recovery, logging, cleanup, or user-facing error reporting. No error hiding. No silent fallbacks.\n\n### SA7 \u2014 Deprecated code + AI slop\nFind legacy, deprecated, and fallback code paths. Remove only what is CLEARLY obsolete and not required for compatibility or active users. Then find every AI artefact: stubs, placeholder logic, comments that narrate edit history instead of explaining intent (\"// Changed X to Y\", \"// TODO from previous iteration\"). Remove all of it. If a comment is worth keeping, rewrite it so a NEW engineer understands why the code exists.\n\n## Output per subagent\n1. `track-N-ASSESSMENT.md` \u2014 what was found, ranked by confidence\n2. Code changes (only high-confidence slice)\n3. Test + lint + build pass (or a clear reason why not)\n4. `track-N-REVIEW.md` \u2014 medium/low-confidence findings for Rees\n5. One commit, titled `mega-fix: SA{N} \u2014 {short summary}`\n\n## Source\n@thewizeai Instagram carousel, Apr 2026. Adapted for Kern workflows.\n"}, "vercel-react-best-practices": {"description": "45 rules from Vercel Engineering across 8 categories. Eliminating waterfalls (CRITICAL), bundle size, server performance, client fetching, re-render optimization.", "tags": ["dev", "react", "nextjs", "performance"], "prompt": "# Vercel React Best Practices\n\n45 rules across 8 categories from Vercel Engineering.\n\n## CRITICAL: Eliminate Waterfalls\n- Defer await: don't await at top of component, pass promise down\n- Promise.all for parallel fetches\n- Suspense boundaries to parallelise data + rendering\n\n```tsx\n// Bad: sequential\nconst user = await getUser();\nconst posts = await getPosts(user.id);\n\n// Good: parallel\nconst [user, posts] = await Promise.all([getUser(), getPosts()]);\n```\n\n## CRITICAL: Bundle Size\n- Avoid barrel imports (`import { x, y } from './components'`)\n- Dynamic imports for heavy components: `const Chart = dynamic(() => import('./Chart'))`\n- Defer third-party scripts\n\n## HIGH: Server Performance\n- `React.cache()` to deduplicate server-side fetches\n- LRU cache for expensive computations\n- `after()` (Next.js) for post-response work\n\n## MEDIUM-HIGH: Client Fetching\n- SWR for deduplication and revalidation\n- Never fetch in useEffect for data that could be server-fetched\n\n## MEDIUM: Re-render Optimization\n- memo() for expensive pure components\n- Functional setState (`setCount(c => c + 1)`) to avoid stale closures\n- useOptimistic for instant UI feedback\n\n## LOW-MEDIUM: JavaScript\n- Map for O(1) lookups (not array.find in loops)\n- Early return / guard clauses\n- Set for O(1) membership checks"}, "security-scan": {"description": "OWASP-aligned security audit for Node.js/Next.js projects. Covers SAST, dependency scanning, secrets detection, auth review, and produces a prioritised Critical/High/Medium/Low remediation plan.", "tags": ["dev", "security", "ops"], "prompt": "Perform a comprehensive security audit against OWASP Top 10.\n\n## OWASP Top 10 Assessment\nCheck each category:\n- A01 Broken Access Control -- are routes/resources properly protected?\n- A02 Cryptographic Failures -- secrets in code, weak hashing, HTTP not HTTPS?\n- A03 Injection -- SQL injection, NoSQL injection, command injection possible?\n- A04 Insecure Design -- missing rate limiting, no input validation, no CSRF protection?\n- A05 Security Misconfiguration -- debug mode on, default credentials, verbose errors?\n- A06 Vulnerable Components -- run npm audit, check for known CVEs in dependencies\n- A07 Auth/Session failures -- JWT implemented correctly? Sessions expire? Passwords hashed with bcrypt/argon2?\n- A08 Software/Data Integrity -- supply chain risks, unsigned packages?\n- A09 Logging/Monitoring failures -- are security events logged? Are logs queryable?\n- A10 SSRF -- can user input cause server-side requests to internal resources?\n\n## Secrets Scan\nSearch codebase for: API keys, tokens, passwords, connection strings hardcoded anywhere. Check .gitignore covers .env files.\n\n## Dependency Audit\nRun npm audit (or yarn audit). Flag Critical and High severity CVEs. List outdated packages with security implications.\n\n## Auth Review\n- JWT: proper signing, expiry set, no sensitive data in payload\n- Passwords: bcrypt/argon2 used (not MD5/SHA1)\n- Sessions: secure + httpOnly cookies, proper expiry\n- CORS: not wildcard (*) in production\n\n## Remediation Report\n\n**Critical** (fix immediately -- exploitable, data exposure risk)\n**High** (fix this sprint)\n**Medium** (fix this quarter)\n**Low** (nice to have)\n\nFor each finding: location, description, impact, exact fix."}, "daily-briefing": {"description": "Generate a daily briefing for Rees. Pulls from calendar, memory timeline, team status, and flags urgent items.", "tags": ["operations", "briefing", "daily"], "prompt": "# Daily Briefing\n\n## Data Sources\n1. **Calendar** -- Check today's events across all 3 Google accounts (personal, levity, thingiverse)\n2. **Memory timeline** -- Recent memories across all projects (last 24h)\n3. **Team status** -- Check each active team for pending items, blockers, recent completions\n\n## Output Format\n\n**Good morning Rees. Here's your day.**\n\n**Today's Calendar**\n- Time -- Event (account)\n- Time -- Event (account)\n\n**Yesterday's Highlights**\n- Key completions, decisions, or events from memory\n\n**Action Items**\n- Urgent items that need attention today\n- Deadlines approaching this week\n\n**Team Status**\n- Levity: [status]\n- Thingiverse: [status]\n- [other active teams]\n\n**Heads Up**\n- Anything coming up in the next few days worth knowing about\n\n## Rules\n- Keep it SHORT. Rees has ADHD. Scannable, not verbose.\n- Lead with urgent items. Bury nice-to-knows at the bottom.\n- No email content (hard rule from CLAUDE.md).\n- Meetings and deadlines only from calendar."}, "flip-card": {"description": "3D CSS flip card with front/back faces and smooth Y-axis rotation. Neon banner CTA, CSS perspective, backfaceVisibility hidden.", "tags": ["frontend", "ui", "animation"], "prompt": "# Flip Card\n\n3D CSS flip card with front/back faces, neon banner CTA, smooth Y-axis rotation.\n\n## CSS Setup\n```css\n.container { perspective: 1000px; }\n.card { transform-style: preserve-3d; transition: transform 0.6s; }\n.card.flipped { transform: rotateY(180deg); }\n.front, .back { backface-visibility: hidden; position: absolute; }\n.back { transform: rotateY(180deg); }\n```\n\n## Neon Banner\n- Position above card\n- Gradient background (cyan/purple)\n- Box-shadow glow effect\n- onClick triggers flip\n\n## Notes\n- Both faces must be same dimensions\n- Use position: relative on container, position: absolute on faces\n- Avoid overflow: hidden on the card (clips 3D children)"}, "floating-quotes": {"description": "Draggable glassmorphic quote cards with physics-based momentum and Pac-Man viewport wrap-around. Hidden on mobile.", "tags": ["frontend", "ui", "animation"], "prompt": "# Floating Quotes\n\nDraggable glassmorphic quote cards with physics-based momentum and optional Pac-Man wrap-around.\n\n## Physics Engine\n- Track velocity on drag (position delta between frames)\n- On release: apply velocity, decay with friction (multiply by 0.95 each frame)\n- Pac-Man wrap: when card exits viewport edge, teleport to opposite edge via jump()\n- requestAnimationFrame loop\n\n## Glassmorphism Style\n- background: rgba(255,255,255,0.1)\n- backdrop-filter: blur(12px)\n- border: 1px solid rgba(255,255,255,0.2)\n- border-radius: 16px\n\n## Notes\n- Hidden on mobile (touch drag conflicts with scroll)\n- Use pointer events, not touch events\n- Each card independent -- no collision detection needed"}, "stripe-best-practices": {"description": "Stripe integration best practices. Prefer CheckoutSessions, Stripe-hosted Checkout, SetupIntents. APIs to avoid: Charges, Sources, Card Element, Tokens.", "tags": ["dev", "payments", "stripe"], "prompt": "# Stripe Best Practices\n\n## Prefer\n- CheckoutSessions over PaymentIntents (for on-session payments)\n- Stripe-hosted Checkout over embedded (simpler, PCI compliant)\n- SetupIntents over Sources (for saving payment methods)\n- Billing APIs for subscriptions\n\n## Never Use (Legacy APIs)\n- Charges API\n- Sources API\n- Card Element\n- Tokens API (unless specific legacy requirement)\n\n## Connect\n- Use controller properties (not legacy Standard/Express/Custom terms)\n- controller.fees.payer = 'application' (you absorb fees)\n- controller.losses.payments = 'stripe' (Stripe covers losses)\n\n## Webhooks\n```js\nconst event = stripe.webhooks.constructEvent(body, sig, process.env.STRIPE_WEBHOOK_SECRET);\n// Always verify signature\n```\n\n## CheckoutSession Pattern\n```js\nconst session = await stripe.checkout.sessions.create({\n  mode: 'payment', // or 'subscription'\n  line_items: [{ price: 'price_xxx', quantity: 1 }],\n  success_url: '...',\n  cancel_url: '...',\n});\nredirect(session.url);\n```"}, "railway-deploy": {"description": "Deploy Node.js services to Railway. railway.toml config, auto-deploy from GitHub, env vars, health check endpoint. ~$5/month Hobby tier.", "tags": ["dev", "deployment", "railway"], "prompt": "# Railway Deploy\n\nDeploy Node.js services to Railway.\n\n## railway.toml\n```toml\n[build]\nbuilder = \"nixpacks\"\n\n[deploy]\nstartCommand = \"node index.js\"\nhealthcheckPath = \"/health\"\nhealthcheckTimeout = 30\nrestartPolicyType = \"always\"\n```\n\n## Setup\n1. Connect GitHub repo in Railway dashboard\n2. Auto-deploys on push to main\n3. Set env vars via dashboard or `railway variables set KEY=value`\n4. ~$5/month Hobby tier, ~$20/month Pro\n\n## Health Check\nAlways add a health endpoint:\n```js\napp.get('/health', (req, res) => res.json({ status: 'ok' }));\n```\n\n## Env Vars\n- Available as process.env.VAR_NAME\n- Set in Railway dashboard under Variables tab\n- Can reference other vars: ${Postgres.DATABASE_URL}"}, "sound-engine": {"description": "Web Audio API sound design system. 13 synthesized UI sounds. Zero external files, React context provider, sound OFF by default, lazy AudioContext.", "tags": ["frontend", "ui", "audio"], "prompt": "# Sound Engine\n\nWeb Audio API sound design system. 13 synthesized sounds, zero external files.\n\n## Sounds
