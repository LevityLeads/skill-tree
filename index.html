 Available\ntick, click, flip, slide, crack, unlock, tab, reveal, bubble, toggle, type, success, whoosh\n\n## Setup\n```tsx\n// SoundContext.tsx\nconst AudioContext = window.AudioContext || window.webkitAudioContext;\nlet ctx: AudioContext | null = null;\n\nfunction getCtx() {\n  if (!ctx) ctx = new AudioContext(); // lazy init to avoid autoplay block\n  return ctx;\n}\n\n// Sound OFF by default\nconst [soundEnabled, setSoundEnabled] = useState(false);\n```\n\n## Usage\n```tsx\nconst { play } = useSound();\n<button onClick={() => { play('click'); doAction(); }}>\n```\n\n## Key Rules\n- Keep sounds SHORT: 20-60ms for clicks, 200-400ms for transitions\n- Ramp to 0.001 (not 0) to avoid audio pops: `gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05)`\n- Create AudioContext lazily after user gesture (browser requirement)\n- Sound OFF by default -- respect user preference"}, "infinite-canvas": {"description": "Nested navigable canvas with React Flow + Zustand. Double-click to drill in, Escape to go back. Breadcrumb navigation, viewport saved per level.", "tags": ["frontend", "ui", "dev"], "prompt": "# Infinite Canvas\n\nNested navigable canvas with React Flow + Zustand. Double-click nodes to drill in, Escape to go back.\n\n## Zustand Store\n```ts\n{\n  path: string[],          // breadcrumb path of node IDs\n  currentParentId: string | null,\n  nodes: Record<string, Node[]>,\n  viewports: Record<string, Viewport>,\n}\n```\n\n## Navigation\n- Double-click node: push to path, set currentParentId, load children\n- Escape or breadcrumb click: pop path, restore saved viewport\n- Save viewport on every navigation via reactFlowInstance.getViewport()\n\n## Data Loading\n- Next.js API routes: GET /api/nodes?parentId=xxx\n- Lazy load -- only fetch nodes for current level\n- Cache in Zustand store (don't re-fetch if already loaded)\n\n## Breadcrumbs\n- Render path array as clickable trail\n- Each click navigates to that level directly"}, "pr-enhance": {"description": "Generate comprehensive PR descriptions from git diffs. Analyses change types, writes title and body, auto-generates review checklist, flags risky areas, and assesses PR size with splitting recommendations.", "tags": ["dev", "git", "workflow"], "prompt": "Generate a comprehensive PR description for the current changes.\n\n## Steps\n\n### 1. Analyse Changes\nRun git diff and git log to understand:\n- Files changed and change statistics\n- Categorise: features, bug fixes, refactors, tests, docs, config\n- Assess impact areas and risk\n\n### 2. Generate PR Description\n\n**Title:** Use prefix (feat/fix/refactor/docs/test/chore) + concise description under 72 chars\n\n**Body:**\n```\n## Summary\nBrief description of what this PR does and why.\n\n## Changes\n- [ ] Change 1\n- [ ] Change 2\n\n## Type of Change\n- [ ] Bug fix / New feature / Breaking change / Docs update\n\n## Testing\n- Tests added/updated\n- Manual testing steps\n\n## Notes for Reviewers\nSpecific areas to focus on, architectural decisions, potential side effects.\n```\n\n### 3. Review Guidance\n- Highlight complex or risky changes\n- Flag potential side effects\n- Note architectural decisions\n\n### 4. PR Size Assessment\n- Small (<200 lines): Easy to review\n- Medium (200-500 lines): Reasonable\n- Large (500-1000 lines): Consider splitting\n- Too Large (>1000 lines): Must split -- provide specific split suggestions\n\n### 5. Quality Checklist\n- [ ] Tests for new functionality\n- [ ] No console.logs or debug code\n- [ ] Error handling for edge cases\n- [ ] No sensitive data exposed\n- [ ] Consistent code style"}, "nextjs-expert": {"description": "Next.js 15 App Router specialist. Server-first components, async params, RSC vs Client Components, data fetching, caching, streaming, Server Actions. 8 anti-patterns to avoid.", "tags": ["dev", "nextjs", "frontend"], "prompt": "# Next.js 15 Expert\n\nComprehensive Next.js 15 App Router specialist. Server-first by default.\n\n## Core Principles\n- Components are Server Components by default\n- Only use 'use client' when you need: interactivity, browser APIs, hooks\n- Always await params in Next.js 15: `const { id } = await params`\n\n## Data Fetching\n- Server Components: fetch directly (no useEffect)\n- Client Components: SWR or React Query\n- Route Handlers: for API endpoints called by client\n\n## Caching (Next.js 15 defaults)\n- fetch() is NOT cached by default (changed from v14)\n- Use `cache: 'force-cache'` explicitly for static\n- `unstable_cache` for non-fetch data\n\n## Streaming\n- Use Suspense boundaries around slow data fetches\n- Loading.tsx files for route-level loading states\n- `<Suspense fallback={<Skeleton />}>` for component-level\n\n## 8 Anti-Patterns\n1. Putting everything in Client Components\n2. Not using Suspense for async data\n3. Fetching in Client Components when Server Components work\n4. Not handling loading/error states\n5. Ignoring RSC payload size (don't pass huge props to client)\n6. Using useEffect for data fetching in new code\n7. Not using Server Actions for mutations\n8. Forgetting await on params/searchParams in Next.js 15"}, "email-marketing-system": {"description": "End-to-end email marketing system for any Kern property. Covers: domain setup, Resend audience, email capture (forms, popups, inline banners), React email template system with theme tokens, welcome drip sequence, weekly newsletter broadcast, broadcast API, scheduled automation, and monitoring. Built on react-email + Resend + Next.js. Swap one theme file to re-skin for a new property. Use when setting up email marketing for a new site (BookerBot, DadGuide, Content Engine, etc.) or when maintaining/extending an existing one.", "tags": ["email", "marketing", "newsletter", "resend", "react-email", "automation", "template"], "prompt": "# Email Marketing System\n\nComplete playbook for setting up and running email marketing on any Kern property. Proven on EPCGuide.co.uk (19+ subscribers, 3-part welcome drip, weekly autonomous newsletter). Every piece is reusable across properties by swapping the theme file.\n\n## Architecture Overview\n\n```\nEmail Capture (3 touchpoints)\n  -> POST /api/subscribe (or /api/newsletter/subscribe)\n    -> Google Sheets (audit log)\n    -> Resend Audience (source of truth for broadcasts)\n    -> enrollInWelcomeSequence() (3-part drip, Day 0/3/10)\n\nWeekly Briefing (scheduled agent, every Wednesday 7am)\n  -> Researches news, picks data point, writes copy\n  -> POST /api/email/broadcast\n    -> Renders WeeklyBriefing template with content JSON\n    -> Sends to all audience contacts (250ms rate limit between sends)\n\nAll emails rendered via react-email components + theme tokens\nPreview at /email-preview (noindex, internal only)\n```\n\n## Prerequisites\n\nBefore starting, run the `email-domain-setup` skill to configure:\n- Resend domain verification (DKIM, SPF, return-path)\n- ImprovMX receiving (catch-all forwarding)\n- Gmail Send As alias\n- DNS records on Vercel\n\nYou need these env vars set (Vercel for Next.js sites):\n- `RESEND_API_KEY` - Resend API key (also used as SMTP password)\n- `RESEND_AUDIENCE_ID` - Resend audience ID for this property\n- `KERN_EMAIL_SECRET` - shared secret for API endpoint auth\n- `KERN_EMAIL_FROM` - e.g. \"Rees at EPCGuide <rees@epcguide.co.uk>\"\n- `KERN_EMAIL_REPLY_TO` - e.g. \"rees@epcguide.co.uk\"\n- `GOOGLE_API_PROXY_KEY` - for Google Sheets logging\n\n## Step 1: Create Resend Audience\n\n```bash\ncurl -s -X POST \"https://api.resend.com/audiences\" \\\n  -H \"Authorization: Bearer $RESEND_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"name\":\"PROPERTY_NAME Subscribers\"}' | jq .\n```\n\nSave the audience ID. Set it as `RESEND_AUDIENCE_ID` in Vercel env vars.\n\n## Step 2: Theme File\n\nCreate `src/email/themes/PROPERTY.ts`. This is the ONLY file that changes per property. Everything else is shared.\n\n```typescript\nimport type { Theme } from './types';\n\nexport const propertyTheme: Theme = {\n  name: 'PropertyName',\n  wordmark: 'PropertyName',\n  domainLabel: '.co.uk',  // or .com, etc.\n  baseUrl: 'https://www.example.com',\n\n  // Body: serif for trust/authority, sans for modern/tech\n  fontBody: '\"Charter\", \"Iowan Old Style\", \"Palatino Linotype\", \"Georgia\", serif',\n  // Headings: always sans\n  fontHeading: '\"Inter\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif',\n\n  colors: {\n    light: {\n      background: '#f5f6f8',\n      surface: '#ffffff',\n      surfaceAlt: '#fafbfc',\n      border: '#eef0f3',\n      textPrimary: '#0f172a',\n      textBody: '#1e293b',\n      textMuted: '#64748b',\n      accent: '#224D87',        // THE brand colour. One only.\n      accentSoft: '#eef2f7',\n      warning: '#b45309',\n      success: '#16a34a',\n    },\n    dark: {\n      background: '#0b1220',\n      surface: '#0f172a',\n      surfaceAlt: '#111c30',\n      border: '#1e293b',\n      textPrimary: '#f1f5f9',\n      textBody: '#cbd5e1',\n      textMuted: '#94a3b8',\n      accent: '#6d9bd4',        // Lighter version for dark backgrounds\n      accentSoft: '#1a2a44',\n      warning: '#f59e0b',\n      success: '#22c55e',\n    },\n  },\n};\n```\n\nTheme TypeScript interfaces (`src/email/themes/types.ts`):\n\n```typescript\nexport interface ColorTokens {\n  background: string;\n  surface: string;\n  surfaceAlt: string;\n  border: string;\n  textPrimary: string;\n  textBody: string;\n  textMuted: string;\n  accent: string;\n  accentSoft: string;\n  warning: string;\n  success: string;\n}\n\nexport interface Theme {\n  name: string;\n  wordmark: string;\n  domainLabel: string;\n  baseUrl: string;\n  fontBody: string;\n  fontHeading: string;\n  colors: {\n    light: ColorTokens;\n    dark: ColorTokens;\n  };\n}\n```\n\n## Step 3: Shared Component Library\n\nAll components live in `src/email/components/`. They accept `theme: Theme` as a prop and derive all styling from it. Never hardcode colours or fonts.\n\n### Components (copy from EPCGuide or reference repo)\n\n| Component | Purpose | Key Props |\n|-----------|---------|-----------|\n| `EmailShell` | Outer wrapper: Html/Head/Body/Container (560px), dark mode CSS injection | `theme`, `preheader` |\n| `Masthead` | Wordmark + domain label + issue label. Hairline border-bottom. | `theme`, `issueLabel` |\n| `Hero` | Optional full-bleed image + kicker + H1 + dek | `theme`, `imageSrc`, `kicker`, `headline`, `dek` |\n| `StatCard` | Big number (52px) with optional proportional bar | `theme`, `label`, `value`, `unit`, `proportion`, `footnote` |\n| `ChartBlock` | Horizontal bar chart with tone-coded rows | `theme`, `title`, `rows[]`, `footnote` |\n| `ImageBlock` | Inline image, 'rounded' or 'fullBleed' | `src`, `alt`, `layout` |\n| `CardStack` | Numbered content cards with optional images | `theme`, `items[]` |\n| `CTA` | Single primary button, accent background, arrow appended | `theme`, `href`, `label`, `caption` |\n| `Signature` | Name + role + optional postscript. Hr divider above. | `theme`, `name`, `role`, `postscript` |\n| `Footer` | Tagline, unsubscribe link (REQUIRED BY LAW), legal line | `theme`, `tagline`, `unsubscribeUrl`, `legal` |\n\n### Dark Mode\n\nHandled automatically by EmailShell. It injects a `<style>` block with:\n- `@media (prefers-color-scheme: dark)` rules\n- `kern-*` class hooks with `!important` to override inline styles\n\nCRITICAL: Every `<strong>` element MUST have `className=\"kern-text-primary\"` or the text will be invisible in dark mode (dark navy on dark background). This was a real bug.\n\n### Render Utility\n\n```typescript\n// src/email/utils/render.ts\nimport { render } from '@react-email/render';\n\nexport async function renderEmail(component: React.ReactElement) {\n  const html = await render(component);\n  const text = await render(component, { plainText: true });\n  return { html, text };\n}\n```\n\n## Step 4: Email Capture (3 Touchpoints)\n\n### 4a. Footer Form (always visible)\n\n`src/components/layout/NewsletterForm.tsx` - simple email input in the site footer. Posts to `/api/subscribe`. Always present on every page.\n\n### 4b. Popup Modal (engagement-triggered)\n\n`src/components/NewsletterPopup.tsx` - modal that appears:\n- After 8 seconds on first visit, OR\n- After scrolling 40% down the page\n- Respects localStorage: won't show if dismissed or already signed up\n- Keys: `newsletter_popup_dismissed`, `newsletter_signed_up`\n- Escape key closes, backdrop click closes, scroll locked while open\n- Dismiss text: \"No thanks, I don't need [topic] updates\" (guilt-free)\n\n### 4c. Inline Banner (contextual)\n\n`src/components/email/EmailCaptureBanner.tsx` - inline banner placed within blog content or tool pages. Same API endpoint. Pass `source` prop to track where signups come from.\n\n### Subscribe API Route\n\n`src/app/api/subscribe/route.ts` (or `/api/newsletter/subscribe/route.ts`):\n\n```\nPOST { email, source? }\n  1. Validate email format\n  2. In parallel:\n     - Append to Google Sheets (audit log, source of truth for success)\n     - Add to Resend Audience (source of truth for broadcasts)\n  3. enrollInWelcomeSequence(email) - non-blocking try/catch\n  4. Return { success: true }\n```\n\nSheets failure = request fails. Resend failure = logged but request succeeds. Welcome failure = logged but request succeeds. Subscriber is never lost.\n\n## Step 5: Welcome Drip Sequence\n\n### Template Structure\n\n3 emails, each in `src/email/templates/Welcome0N.tsx`:\n\n| Email | Day | Purpose | Structure |\n|-------|-----|---------|-----------|\n| Welcome01 | 0 (immediate) | Establish stakes, set tone | Hero image + data chart + 3 bold-lead paragraphs + series preview + CTA |\n| Welcome02 | 3 | Practical value | ChartBlock + data image + rules of thumb + CTA |\n| Welcome03 | 10 | Incentives/grants | CardStack + map image + geographic detail + CTA |\n\nEach template exports a `WelcomeNNMeta = { subject, stage }` object.\n\n### Send Helper\n\n`src/email/send-welcome.ts`:\n\n```typescript\nexport async function enrollInWelcomeSequence(email: string): Promise<EnrolmentResult> {\n  // Render all 3 templates in parallel\n  // Send Welcome01 immediately via resend.emails.send()\n  // Schedule Welcome02 for +3 days via scheduled_at\n  // Schedule Welcome03 for +10 days via scheduled_at\n  // Return { welcome01Id, welcome02Id, welcome03Id, errors? }\n}\n```\n\nUses Resend's `scheduled_at` parameter (supports up to 30 days). No cron needed for drip timing.\n\n### Subject Line Formulas (proven)\n\n- \"60% of UK rental stock fails the new EPC rules\" (data shock)\n- \"What \u00a315k of EPC upgrades actually gets you\" (money + specificity)\n- \"The three EPC grants most landlords overlook\" (hidden value)\n\nPattern: [specific number] + [thing they care about] + [angle they haven't considered]\n\n### Manual Send Endpoint\n\n`POST /api/email/welcome` - guarded by `x-kern-secret` header. Body: `{ to, stage: 1|2|3 }`. For testing and manual triggers.\n\n### Backfill Endpoint\n\n`POST /api/email/welcome/backfill` - guarded by `x-kern-secret`. Fetches all audience contacts, filters unsubscribed + excludeEmails, enrols each. Supports `dryRun: true` and `limit: N`.\n\nIMPORTANT: The backfill sends 3 API calls per contact. With Resend's 5 req/sec limit, large audiences will hit 429 errors. The backfill route should send serially with delays, or use the individual welcome endpoint with 400ms delays between calls for retries.\n\n## Step 6: Weekly Newsletter (Broadcast)\n\n### Template\n\n`src/email/templates/WeeklyBriefing.tsx` - accepts all content as props:\n\n```typescript\ninterface WeeklyBriefingProps {\n  theme: Theme;\n  unsubscribeUrl: string;\n  issueNumber: number;\n  date: string;           // \"30 April 2026\"\n  subject: string;\n  preheader: string;\n  chart: {                // Chart of the Week (StatCard)\n    label: string;\n    value: string;\n    unit?: string;\n    proportion?: number;\n    proportionLeftLabel?: string;\n    proportionRightLabel?: string;\n    footnote?: string;\n    commentary: string;   // 2-3 sentence insight paragraph\n  };\n  briefing: Array<{       // The Briefing (3-4 news items)\n    headline: string;     // Bold lead-in\n    body: string;         // 1-2 sentences\n    source?: string;      // Publication name\n    sourceUrl?: string;   // Link to source\n  }>;\n  archive: {              // From the Archive (one blog article)\n    title: string;\n    teaser: string;       // Why it matters now\n    url: string;\n  };\n  cta: {                  // Single CTA\n    label: string;\n    href: string;\n    caption?: string;\n  };\n}\n```\n\n### Broadcast Helper\n\n`src/email/send-broadcast.ts`:\n\n```typescript\nexport async function sendBroadcast(params: {\n  subject: string;\n  renderForContact: (email: string) => Promise<{ html: string; text: string }>;\n  excludeEmails?: string[];\n}): Promise<BroadcastResult>\n```\n\n- Fetches audience contacts, filters unsubscribed + excluded\n- Sends individually with 250ms delay between sends (stays under 5 req/sec)\n- Each contact gets a personalised unsubscribe URL\n- Returns `{ sent[], failed[], skipped[], total }`\n\n### Broadcast API Endpoint\n\n`POST /api/email/broadcast` - guarded by `x-kern-secret`. Accepts:\n\n```json\n{\n  \"content\": { ...WeeklyBriefingContent },\n  \"dryRun\": false,\n  \"excludeEmails\": []\n}\n```\n\nUses `createElement` (NOT JSX) because file is `.ts`. Set `maxDuration = 120`.\n\n### Scheduled Automation\n\nCreate via `schedule_create`:\n- Name: `PROPERTY-weekly-briefing`\n- Cron: `0 7 * * 3` (Wednesday 7am SAST)\n- Fully autonomous agent that:\n  1. Recalls issue counter from memory\n  2. Researches current news (WebSearch)\n  3. Picks a rotating data point for Chart of the Week\n  4. Picks an archive article from the blog\n  5. Drafts all copy (sardonic, data-driven, cold open)\n  6. POSTs to /api/email/broadcast\n  7. Updates issue counter in memory\n  8. Stores issue details to memory\n\n## Step 7: Preview Route\n\n`src/app/email-preview/page.tsx` (Server Component, `force-static`, noindex):\n- Renders every template + every component in isolation to HTML\n- Passes to `PreviewClient.tsx` (Client Component)\n- Sidebar tab navigation\n- Desktop/mobile viewport toggle (720px/380px)\n- Light/dark scheme toggle\n\n## Step 8: Email Imagery\n\n### AI-Generated Editorial Images\n\nUse Imagen 4 (Google) for editorial photography:\n\n```bash\ncurl -s --max-time 30 -X POST \\\n  \"https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=$GOOGLE_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"instances\":[{\"prompt\":\"YOUR PROMPT\"}],\"parameters\":{\"sampleCount\":1,\"outputOptions\":{\"mimeType\":\"image/jpeg\"}}}' \\\n  | jq -r '.predictions[0].bytesBase64Encoded' | base64 -d > output.jpg\n```\n\nThen optimise with sharp: mozjpeg quality 82, progressive JPEG, retina-sized (1200-1600w), serve with `width=\"600\"` attribute.\n\nStore in `public/email/SERIES_NAME/`. Commit to repo. Served from the site's domain (no external image hosting).\n\n### Image Rules\n- Every image earns its place. No stock photography.\n- Max 4 images per email (hero + up to 3 supporting)\n- Meaningful alt text (WCAG AA)\n- All `<strong>` elements need `className=\"kern-text-primary\"` for dark mode\n\n## Rolling Out to a New Property\n\nChecklist for adding email marketing to BookerBot, DadGuide, Content Engine, etc.:\n\n1. **Domain**: Run `email-domain-setup` skill with the new domain\n2. **Resend**: Create audience, set env vars\n3. **Theme**: Create `src/email/themes/PROPERTY.ts` with brand colours, fonts, URLs\n4. **Copy components**: If not already shared, copy `src/email/components/` (they're theme-agnostic)\n5. **Welcome templates**: Write 3 welcome emails specific to the property's audience and value prop\n6. **Capture forms**: Add NewsletterForm to footer, NewsletterPopup to layout, EmailCaptureBanner to key pages\n7. **Subscribe route**: Copy and adjust `/api/subscribe` (change Sheet ID, audience ID)\n8. **Broadcast route**: Copy `/api/email/broadcast` (swap theme import)\n9. **Preview route**: Copy `/email-preview` (add new templates)\n10. **Schedule**: Create weekly briefing scheduled task with property-specific research prompt\n11. **Backfill**: If existing subscribers, run backfill endpoint\n\nTime estimate: 2-3 hours for full setup if components are already built. Under 1 hour if just swapping theme.\n\n## Package Dependencies\n\n```json\n{\n  \"@react-email/components\": \"^1.0.12\",\n  \"@react-email/render\": \"^2.0.7\",\n  \"resend\": \"^6.12.2\"\n}\n```\n\n## Rules (Non-Negotiable)\n\n- No em dashes. Ever. Commas, colons, semicolons, or restructure.\n- Every email MUST have an unsubscribe link (legal requirement).\n- List-Unsubscribe + List-Unsubscribe-Post headers per RFC 8058 on every send.\n- Rate limit sends: 250ms between each (Resend caps at 5 req/sec).\n- `.ts` API routes use `createElement()`, not JSX. JSX only in `.tsx` files.\n- All `<strong>` elements: `className=\"kern-text-primary\"` for dark mode.\n- Welcome sequence failure is non-blocking: subscriber saved to Sheets + Audience regardless.\n- Subject lines under 60 characters.\n- Preheaders 40-120 characters, never repeat the subject.\n- One CTA per email. Not button-soup.\n- `force-static` on preview page, `force-dynamic` on API routes.\n- No fabricated URLs in newsletter content. Only real sources.\n\n## Tone Guide\n\n- Economist-adjacent. Dry, confident, sardonic.\n- Cold open. First sentence is the most interesting thing.\n- No \"Hope you had a great week.\" No \"Happy Wednesday.\"\n- Specific numbers over generalities. \"\u00a38,400\" not \"thousands.\"\n- One dry joke per email, max. Not Morning Brew energy.\n- Named human sign-off with reply-invite postscript.\n- \"Reply and tell me what you're dealing with\" builds parasocial trust.\n\n## Monitoring\n\n- **Resend dashboard**: delivery rates, opens, clicks, bounces, complaints\n- **Google Sheets**: subscriber audit log with timestamps and source attribution\n- **Memory**: issue counter, past issues, what data points and articles were featured\n- **Preview route**: visual QA before any template changes go live\n- Check for unsubscribes weekly. If rate exceeds 2% per send, investigate content quality.\n\n## Known Limitations (v1)\n\n1. `scheduled_at` emails don't re-check audience unsubscribe status. If someone unsubs between signup and Day 10, Welcome03 still sends. Fix: add Resend webhook to cancel scheduled emails on unsubscribe.\n2. No open/click tracking beyond Resend's built-in. No custom analytics.\n3. Broadcast is sequential (250ms per contact). At 1000 subscribers, a send takes ~4 minutes. Fine for now, would need batching at scale.\n4. No A/B testing infrastructure. Test via manual sends to small segments first."}, "envelope-letter": {"description": "Multi-phase animated envelope component: slides in, flips open, letter slides out, fracture dismiss. 10 phases with handwritten font, wax seal, paper texture.", "tags": ["frontend", "ui", "animation"], "prompt": "# Envelope Letter Animation\n\nMulti-phase animated envelope: slides in \u2192 user taps \u2192 flips \u2192 flap opens \u2192 letter slides out \u2192 fracture/crack dismiss animation.\n\n## 10 Phases\n1. Idle (off-screen)\n2. Slide in\n3. Waiting for tap\n4. Flip (Y-axis rotation)\n5. Flap opens (CSS transform on flap element)\n6. Letter slides up out of envelope\n7. Letter fully revealed\n8. User reads\n9. Fracture dismiss (convex hull polygon crack effect)\n10. Gone\n\n## Key Details\n- Font: Caveat (Google Fonts) for handwritten feel\n- Wax seal: SVG circle with red/burgundy fill\n- Paper texture: subtle CSS background-image noise\n- Fracture: generate convex hull polygon, animate SVG clip-path splitting apart\n- sessionStorage to track dismissed state (don't show again this session)"}, "internal-comms": {"description": "Write internal communications: 3P updates (Progress/Plans/Problems), status reports, leadership updates, project updates, FAQ responses, company newsletters, incident postmortems. Use when Rees needs an internal-style write-up for himself, his team, or a client retainer review. Bundled examples on disk cover the major formats.", "tags": ["communication", "type1", "writing", "ops", "internal", "auto-added"], "prompt": "# Internal Communications (Type 1)\n\n**Type 1 skill.** Lives at `/app/.claude/skills/internal-comms/SKILL.md` with examples in `/app/.claude/skills/internal-comms/examples/`. Source: https://github.com/anthropics/skills/tree/main/skills/internal-comms\n\n## Available Formats (in examples/)\n\n- `3p-updates.md` -- Progress, Plans, Problems weekly team update\n- `company-newsletter.md` -- Broader internal newsletter\n- `faq-answers.md` -- FAQ-style responses\n- `general-comms.md` -- Catch-all for anything that doesn't fit a template\n\n## Workflow\n\n1. Identify the comms type (3P, status, FAQ, postmortem, etc.)\n2. Read the matching `examples/[type].md` for tone, structure, length norms\n3. Pull facts via memory_recall (project filter, last 7-14 days)\n4. Draft against the template\n5. Apply Kern voice rules: no em dashes, no LinkedIn energy, sardonic where appropriate, short sentences\n\n## Kern Adaptations\n\n- For weekly updates to Thingiverse client (Rees as CMO consultant): use 3P format, frame from \"we\" perspective\n- For Levity team updates (when team grows): use company-newsletter format scaled down\n- For incident reports (e.g. Kern OS issue, deploy failure): postmortem format, blameless, focus on lessons + actions\n- Always store the published comms to memory_store as \"event\" with tag \"internal-comms\" + project tag, importance 5\n\n## Pair With\n\n- `daily-briefing` (when the comms IS the briefing)\n- `email-drafting` (if the comms ships as an email)\n- `google-doc-creation` (if it ships as a Doc)"}, "remotion-video": {"description": "Generate AI videos with KIE API (Veo 3.1, Runway Gen-4, Kling 3.0) and compose with Remotion. Full model comparison, polling patterns, ffmpeg compression.", "tags": ["video", "ai", "content"], "prompt": "# Remotion Video\n\nGenerate AI videos with KIE API and compose with Remotion.\n\n## KIE API\nBase URL: `https://api.kie.ai/api/v1`\nAuth: `Authorization: Bearer $KIE_API_KEY`\n\n## Models\n- veo3_fast: ~85s, $0.40/8s (DEFAULT -- best quality/speed)\n- runway_gen4: ~120s, $0.60/8s\n- kling_3: ~60s, $0.25/8s (fastest)\n\n## Generate + Poll Pattern\n```js\n// 1. Submit\nconst { taskId } = await POST('/video/generate', { model, prompt });\n\n// 2. Poll until complete\nwhile (true) {\n  const { status, videoUrl } = await GET(`/video/${taskId}`);\n  if (status === 'completed') break;\n  await sleep(5000);\n}\n```\n\n## Remotion Composition\n```tsx\n<AbsoluteFill>\n  <Sequence from={0} durationInFrames={150}>\n    <OffthreadVideo src={staticFile('clip1.mp4')} />\n  </Sequence>\n</AbsoluteFill>\n```\n\n## ffmpeg Compression\n```bash\nffmpeg -i input.mp4 -crf 28 -preset fast -c:v libx264 output.mp4\n# Target: <16MB for social, <3MB for web embed\n```"}, "vapi-voice-playbook": {"description": "Troubleshooting playbook for VAPI voice AI calls. Covers: endCall function gotchas (LLMs trigger it prematurely), voicemail detection provider selection (Twilio AMD vs VAPI), firstMessageMode configuration, LLM model selection for voice (which models work, which don't), voicemail false positive detection, and the core rule that LLMs cannot reliably reproduce exact phrasing. Use when debugging BookerBot call failures, switching voice AI models, or configuring VAPI assistants.", "tags": ["voice-ai", "vapi", "bookerbot", "debugging", "auto-added", "from-introspection"], "prompt": "# VAPI Voice AI Playbook\n\nHard-won lessons from 2 weeks of BookerBot production calls (Apr 2026). Every rule here cost real leads.\n\n## Rule 1: LLMs Cannot Reproduce Exact Phrasing\n\nNever ask an LLM to reliably speak specific words. Prompt rules for deterministic text fail at ~63% compliance even with explicit bans and examples. Use platform-level injection instead:\n- VAPI `firstMessage` for greetings (hardcoded, never LLM-generated)\n- Set `firstMessageMode: 'assistant-speaks-first'` explicitly\n- Without this, LLMs add filler (\"Oh\", \"Hey there\") or rephrase your greeting entirely\n\n## Rule 2: endCall Function Architecture\n\nThe endCall tool definition is the #1 cause of premature call termination. Both GPT-OSS 20B and Llama 3.3 70B triggered endCall on their first turn after identity confirmation, skipping the entire qualification flow.\n\n**Root cause**: How the endCall function is defined/exposed, not model-level instruction-following failure.\n\n**Fix pattern**: Add an 8-step mandatory checklist to the endCall function description itself (not just the system prompt). The function description is what the LLM reads when deciding whether to call it.\n\n```\nendCall function description should include:\n\"ONLY call this after completing ALL of these steps:\n1. Confirmed caller identity\n2. Asked about [qualification question 1]\n3. Asked about [qualification question 2]\n...\n8. Provided closing summary\"\n```\n\n## Rule 3: Voicemail Detection\n\n**Twilio AMD**: Fast but aggressive. Classifies short human responses as voicemail. False positive rate too high for cold outbound where people answer with \"yeah?\" or \"hello?\"\n\n**VAPI provider**: Uses LLM-based transcription analysis (Gemini). Significantly fewer false positives. Slightly slower detection but worth the trade-off.\n\n**Config gotcha**: `voicemailDetection` config rejects the `enabled` property as of Apr 2026. Use `{ provider: 'vapi' }` only, no `enabled: true` field. Adding `enabled` causes 400 Bad Request, silently failing every first call attempt.\n\n## Rule 4: Voicemail False Positive Fix\n\nThe post-call webhook's \"isSuspiciouslyShort\" check (duration < 30s OR userTurnCount <= 1 AND aiTurnCount <= 2) can classify real people as voicemail when the AI ends calls prematurely.\n\n**Fix**: Add human confirmation word detection before classifying. Check the transcript for words like \"yeah\", \"hello\", \"speaking\", \"yes\" before marking as voicemail.\n\n## Rule 5: LLM Model Selection for Voice\n\nTested on Groq (Apr 2026):\n- **GPT-OSS 20B**: CATASTROPHIC. Ignores 15K-char system prompts, triggers endCall on first turn. Every real call from Apr 18-25 failed. Do NOT use.\n- **Llama 3.3 70B**: Same endCall bug but less extreme (waits for user response). Still not reliable enough without the function description guardrails.\n- **Llama 4 Scout**: Current recommendation for Groq-hosted voice. Better instruction following.\n\n## Rule 6: Inbound Callback Handling\n\nVAPI phone numbers handle both inbound and outbound. When a customer calls back the same number, the INBOUND handler fires (assistant-request event). The inbound handler must detect callback scenarios and adjust greeting accordingly. Don't assume inbound = new lead.\n\n## Debugging Checklist\n\nWhen a call fails:\n1. Check the VAPI call logs for endCall timing (did it fire on turn 1?)\n2. Check voicemail detection result (false positive?)\n3. Check firstMessage delivery (did the LLM override it?)\n4. Check the model being used (GPT-OSS 20B = instant fail)\n5. Check function descriptions (are guardrails in the endCall definition?)\n6. Check voicemailDetection config (is \"enabled\" field present? Remove it)"}, "illustrate-article": {"description": "Generate premium editorial infographics for articles using OpenAI's gpt-image-2 with a recursive review-and-improve loop. Each batch of images is examined, learnings are extracted, and applied to improve the next batch. Use when creating images, infographics, or visual assets for articles or blog posts.", "tags": ["images", "infographics", "openai", "gpt-image-2", "editorial", "do-gooder", "articles", "data-viz"], "prompt": "## Illustrate Article - Recursive Learning Image Generation\n\n### Workflow\n1. Read the article, identify 3-5 key data points/concepts for visualization\n2. Choose a DISTINCT visual approach (never repeat across articles)\n3. Write image prompts with 6 required elements: composition, typography, data points, color palette, mood, anti-patterns\n4. Generate with OpenAI gpt-image-2 API (ALWAYS gpt-image-2, never gpt-image-1)\n5. REVIEW every image: examine each one, write specific observations on text legibility, composition clarity, visual metaphor effectiveness, editorial vs promotional tone\n6. Apply learnings to improve the next batch\n7. Update article MDX with heroImage frontmatter and images with data-focused alt text\n\n### API Details\n- POST https://api.openai.com/v1/images/generations\n- model: \"gpt-image-2\", size: \"1536x1024\", quality: \"high\", output_format: \"png\"\n- API key from $OPENAI_API_KEY\n- Optimize with Sharp: resize to 1400px wide, JPEG quality 82\n- Sharp installed at /tmp/do-gooder-ux/node_modules, run scripts from there\n\n### Visual Approach Matrix\n- Investigative/myth-busting: Hand-drawn sketch on parchment, analyst notebook margins\n- Hopeful/solution-focused: Gold-on-dark, photographic + data viz mixing\n- Scientific/evidence-heavy: Clean white backgrounds, journal precision, teal+gold\n- Urgent/crisis: Dark navy with amber accents, monumental scale\n- Financial/analytical: Ledger textures, bronze metallics, forensic detail\n- Personal/behavioral: Warm cream, organic illustration, editorial magazine\n\n### Prompt Engineering Principles (learned through iteration)\n- Mix photographic elements with data visualization\n- Use metaphorical chart containers (coins as donut charts, monoliths as bar charts, magnifying glasses revealing data)\n- All text must be LARGE and highly legible at web resolution (~700px display width)\n- Key numbers/stats should be the dominant visual element\n- Simpler compositions with more white space are MORE powerful than busy ones\n- Maintain editorial distance - journalism, not charity marketing\n- Source citations: either legible or leave them out entirely\n- Include pillar color from site design system in style base\n- Always include \"No clip art, no PowerPoint aesthetics, no stock photo feel\"\n- Specify \"Think [editorial reference] meets [data journalism reference]\"\n\n### The Review Loop (core differentiator)\nAfter generating each batch, examine every image and assess:\n- Text legibility: readable at web resolution?\n- Composition clarity: clear focal point, guided hierarchy?\n- Visual metaphor: strengthens or distracts from data?\n- Editorial tone: journalism or marketing?\n- Strongest image: which one and why?\n- Weakest image: what specifically to change?\n\nWrite 3-5 SPECIFIC actionable learnings (not vague like \"make it better\").\nGood: \"Annotation text on village elements was too small. Next batch: minimum 14pt equivalent.\"\nBad: \"Images could be better.\"\n\n### Article Integration\n- Add heroImage to frontmatter: heroImage: \"/images/articles/<slug>/header.jpg\"\n- Insert images BEFORE the section they illustrate\n- Alt text describes the DATA/INSIGHT, not the visual\n- Good alt: \"Every $1 transferred generates $2.60 in local economic activity\"\n- Bad alt: \"A gold coin with arrows pointing to buildings\""}, "video-content": {"description": "Social media video + image content pipeline. Chat card screenshots, animated chat video, AI video clip via KIE API, composite with music. GetLate API for posting to X.", "tags": ["content", "video", "social", "ai"], "prompt": "# Video Content Pipeline\n\nSocial media video + image content pipeline.\n\n## Pipeline\n1. Static chat card (Puppeteer screenshot)\n2. Animated chat video (frames + ffmpeg)\n3. AI video clip (KIE API -- Veo 3.1, Runway, Kling)\n4. Full composite with music (KIE Suno endpoint)\n\n## KIE API\n- Base: `https://api.kie.ai/api/v1`\n- Default model: `veo3_fast` ($0.40/8s)\n- FLUX for images, Suno for music\n\n## Chat Cards\n- Telegram-style bubbles\n- Puppeteer: headless Chrome screenshot\n- Consistent sizing: 1080x1920 (portrait) or 1080x1080 (square)\n\n## Writing Style\n- Insight-first (lead with the idea, not the context)\n- No LinkedIn energy\n- Conversational, opinionated, specific\n\n## Posting\n- GetLate API for X/Twitter\n- upload-post.com API for other platforms\n- NEVER post without explicit Rees approval\n\n## ffmpeg Composite\n```bash\nffmpeg -i background.mp4 -i overlay.png -filter_complex \"[0:v][1:v]overlay=x:y\" output.mp4\n```"}, "voice-note-processing": {"description": "Process a voice note or audio file. Download, transcribe with Whisper, summarise key points, extract action items.", "tags": ["audio", "transcription", "communication"], "prompt": "# Voice Note Processing\n\n## Steps\n1. **Download** the audio file (if URL provided, use yt-dlp or curl)\n2. **Convert** to WAV if needed: `ffmpeg -i input.mp3 -vn -acodec pcm_s16le -ar 16000 audio.wav`\n3. **Transcribe** using Groq Whisper API:\n   ```bash\n   curl -s https://api.groq.com/openai/v1/audio/transcriptions \\\n     -H \"Authorization: Bearer $GROQ_API_KEY\" \\\n     -F \"file=@audio.wav\" \\\n     -F \"model=whisper-large-v3-turbo\"\n   ```\n4. **Summarise** the transcript\n5. **Extract** action items, decisions, and key facts\n\n## Output Format\n**Bold summary first** (so Rees can scan without re-listening)\n\n**Key Points**\n- Bullet points of main topics discussed\n\n**Action Items**\n- [ ] Specific actions with owners and deadlines\n\n**Decisions Made**\n- Any decisions or commitments\n\n**Store to Memory**\n- Call memory_store for any important facts, decisions, or action items"}, "upload-post": {"description": "Post to TikTok, Instagram, YouTube, LinkedIn, Facebook, X, Threads, Pinterest, Reddit, Bluesky via the upload-post.com API. Scheduling, analytics, FFmpeg processing.", "tags": ["social", "content", "publishing"], "prompt": "# Upload Post (Social Publishing)\n\nPost to multiple social platforms via single API.\n\n## API\nBase URL: `https://api.upload-post.com/api`\nAuth: `Apikey: YOUR_KEY` header\n\n## Endpoints\n- POST /video -- upload video (TikTok, Instagram, YouTube, LinkedIn, etc.)\n- POST /photos -- upload image post\n- POST /text -- text-only post (X, LinkedIn, Bluesky, Reddit)\n- POST /document -- LinkedIn only (PDF/PPT/DOC, up to 100MB, 300 pages)\n\n## Scheduling\n```json\n{\n  \"scheduled_date\": \"2024-12-25T09:00:00\",\n  \"timezone\": \"Africa/Johannesburg\"\n}\n```\n\n## Platforms\ntiktok, instagram, youtube, linkedin, facebook, x (twitter), threads, pinterest, reddit, bluesky\n\n## FFmpeg Processing\n- Endpoint: POST /ffmpeg\n- Process video before posting (trim, resize, add captions)\n\n## Notes\n- Never post without Rees's explicit approval\n- Draft first, show content + target platforms, wait for go-ahead"}, "grill-me": {"description": "Adversarial requirements gathering before building anything non-trivial. Instead of jumping to a plan, interrogate Rees relentlessly about every aspect of the design until a shared understanding is reached. Use BEFORE plan mode on any project that will take more than one session. Inspired by Frederick P. Brooks' \"design concept\" from The Design of Design.", "tags": ["planning", "requirements", "design", "workflow"], "prompt": "## Grill Me \u2014 Adversarial Requirements Gathering\n\n### When to Use\nBefore any build that will take more than one session. Before plan mode. Before writing specs. This comes FIRST.\n\n### The Point\nYou and Rees need to share a \"design concept\" \u2014 the invisible theory of what's being built. This isn't a document. It's alignment. Plan mode is eager to produce artefacts. This skill produces understanding.\n\n### How It Works\n\n1. **Rees describes what he wants** (however vaguely).\n\n2. **You interrogate. Relentlessly.** Walk down every branch of the design tree, resolving dependencies between decisions one by one. Ask about:\n   - Who is this for? What's their context when they encounter it?\n   - What's the single most important thing it must do?\n   - What happens when it fails? What does failure look like?\n   - What existing systems does this touch? What are the boundaries?\n   - What does \"done\" look like? How will we know it works?\n   - What are you NOT building? (Scope boundaries)\n   - What's the simplest version that would be useful?\n   - What have you seen that's similar to what you want?\n   - What specifically do you hate about existing solutions?\n   - How does this fit into what already exists?\n   - Technical constraints: hosting, budget, auth, data, integrations?\n   - What decisions have you already made that I should treat as fixed?\n\n3. **Don't stop early.** The natural instinct is to stop after 5-10 questions and start planning. Resist. Keep going until you can articulate back to Rees exactly what he wants and he says \"yes, that's it.\" 20-60 questions is normal. 100 is fine.\n\n4. **Challenge assumptions.** If something sounds over-engineered, say so. If the scope is creeping, call it out. If there's an existing tool that does this, mention it. You're not a yes-machine.\n\n5. **Summarise the design concept.** When alignment is reached, produce a concise summary:\n   - **What:** One sentence.\n   - **For whom:** Target user and context.\n   - **Core behaviour:** The 3-5 things it must do.\n   - **Boundaries:** What it explicitly does NOT do.\n   - **Dependencies:** What it connects to.\n   - **Success criteria:** How we know it's working.\n\n6. **Then and only then** enter plan mode or create a PRD. The grill output becomes the input to planning.\n\n### Rules\n- Ask ONE question at a time. Don't dump a list. Conversation, not questionnaire.\n- Use Rees's own words back to him. Don't translate into jargon.\n- If Rees says \"I don't know\" to something, that's useful data. Note it and move on.\n- If Rees gets impatient, remind him: \"20 minutes here saves 2 hours of rebuilding.\"\n- Store the final design concept summary via memory_store (type: decision, project: relevant project)."}, "competitor-analysis": {"description": "Research and analyse a competitor. Covers product, pricing, positioning, strengths, weaknesses, and opportunities.", "tags": ["research", "strategy", "marketing"], "prompt": "# Competitor Analysis\n\n## Research Steps\n1. **Website audit** -- Visit their site. Note: value prop, pricing model, target audience, key features, design quality.\n2. **Product deep dive** -- Sign up for free trial if available. Document UX, features, limitations.\n3. **Pricing analysis** -- Document all tiers, features per tier, compare to our pricing.\n4. **Social presence** -- Check Twitter/X, LinkedIn, YouTube. Note: follower count, posting frequency, engagement, content themes.\n5. **Reviews** -- Check G2, Capterra, Product Hunt, Reddit. Note: common praises and complaints.\n6. **Tech stack** -- Check BuiltWith or Wappalyzer. Note: hosting, frameworks, analytics.\n7. **SEO** -- Check top ranking keywords, domain authority, content strategy.\n\n## Output Format\n**Summary** (3 sentences max)\n\n**Strengths**\n- Bullet points\n\n**Weaknesses**\n- Bullet points\n\n**Opportunities for Us**\n- Where we can differentiate\n- Gaps in their offering\n- Underserved segments\n\n**Threat Level:** Low / Medium / High (with reasoning)"}, "ubiquitous-language": {"description": "Generate a shared glossary of domain terms for a project. Scans the codebase, extracts terminology, and produces a markdown reference file. Reduces AI verbosity, improves planning alignment, and ensures code matches how the team talks about the domain. From Domain-Driven Design (DDD).", "tags": ["planning", "documentation", "ddd", "architecture", "workflow"], "prompt": "## Ubiquitous Language \u2014 Shared Domain Glossary\n\n### When to Use\n- Starting serious work on a project for the first time\n- After a grill-me session surfaces lots of domain-specific terms\n- When AI keeps misunderstanding or being verbose about concepts\n- When a codebase has inconsistent naming (same thing called 3 different names)\n\n### What It Produces\nA `LANGUAGE.md` file in the project root containing:\n1. Domain terms and their precise definitions\n2. Relationships between terms\n3. Anti-terms (words that should NOT be used, and what to use instead)\n\n### Steps\n\n1. **Scan the codebase** for domain terminology:\n   - Read key files: README, CLAUDE.md, main entry points, type definitions, database schemas\n   - Extract nouns that appear repeatedly (these are your domain entities)\n   - Extract verbs that describe operations (these are your domain actions)\n   - Look at variable names, function names, file names, comments\n   - Check for inconsistencies (same concept, different names)\n\n2. **Scan memory** for project context:\n   - `memory_recall` for the project to find decisions, facts, and patterns\n   - Pull any existing documentation or specs\n\n3. **Scan external context** if available:\n   - What industry is this in? What terms do users/customers use?\n   - Are there standard industry terms we should adopt?\n\n4. **Build the glossary** as a markdown file:\n\n```markdown\n# [Project Name] \u2014 Ubiquitous Language\n\n## Core Entities\n| Term | Definition | Also Known As | NOT |\n|------|-----------|---------------|-----|\n| Lead | A person who has been identified as a potential customer but not yet contacted | prospect (deprecated) | contact, user |\n\n## Actions\n| Term | Definition | Triggers |\n|------|-----------|----------|\n| Qualify | Assess whether a lead matches our ICP criteria | After enrichment completes |\n\n## States\n| Term | Definition | Transitions To |\n|------|-----------|---------------|\n| Cold | Lead has not been contacted | Contacted (after first email) |\n\n## Anti-terms (Do NOT Use)\n| Bad Term | Use Instead | Why |\n|----------|------------|-----|\n| customer | lead or client | \"customer\" is ambiguous in our context |\n\n## Module Map\n| Module | Responsibility | Key Interfaces |\n|--------|---------------|----------------|\n| enrichment | Takes raw lead data, returns qualified lead with company info | enrich(lead) -> EnrichedLead |\n```\n\n5. **Validate with Rees.** Walk through the glossary. Are terms correct? Missing any? Any that feel wrong?\n\n6. **Save the file** as `LANGUAGE.md` in the project root (or team directory for non-code projects).\n\n7. **Reference it.** Add a note to the project's CLAUDE.md pointing to LANGUAGE.md. This ensures every future session loads the shared vocabulary.\n\n### Rules\n- Definitions must be in plain English. No jargon-defining-jargon.\n- If two terms mean the same thing, pick ONE and deprecate the other.\n- Include the \"NOT\" column. Knowing what a term does NOT mean prevents drift.\n- Keep it under 100 terms. If you need more, the project's scope might be too broad.\n- Update it when new terms emerge during development. It's a living document."}, "incident-response": {"description": "Five-phase production incident workflow: triage, root cause analysis, fix implementation, stabilisation, and blameless postmortem. For when something breaks in production and panic is not an option.", "tags": ["dev", "ops", "infra", "devops"], "prompt": "Handle production incident with urgency and structure.\n\n## Phase 1: Immediate Triage (first 5 minutes)\n- What is broken? What is the user impact?\n- Severity: P0 (total outage), P1 (major feature down), P2 (partial degradation)\n- When did it start? Correlate with recent deployments or changes\n- Immediate mitigation: can we roll back? Disable a feature flag? Redirect traffic?\n\n## Phase 2: Root Cause Analysis\nRun in parallel:\n- Check application logs (Railway logs, Vercel function logs)\n- Check error tracking\n- Check recent deployments (what changed in the last 24h?)\n- Check DB health (connection pool exhausted? Slow queries?)\n- Check external dependencies (APIs, Supabase, third-party services down?)\n\n## Phase 3: Fix\n- Develop fix based on root cause\n- For Railway: commit fix, push to main, Railway autodeploys\n- For Vercel: push to main or trigger deployment\n- Verify fix with health check endpoint\n- Monitor logs for 5 minutes post-fix\n\n## Phase 4: Stabilisation\n- Confirm the fix held\n- Clear any backlogs (queued jobs, failed webhooks, etc.)\n- Confirm monitoring is green\n- Notify stakeholders (Rees, or relevant client) that issue is resolved\n\n## Phase 5: Postmortem (blameless)\nDocument in memory_store (type: event):\n- Timeline: when detected, when resolved, total duration\n- Root cause (the actual cause, not symptoms)\n- Impact (how many users affected, revenue impact if any)\n- Fix applied\n- Prevention: what to add/change so this doesn't happen again\n- Action items with owners\n\nNo blame. Focus on systems and processes, not people."}, "deep-modules-audit": {"description": "Audit a codebase for shallow module sprawl and propose restructuring into deep modules with simple interfaces. From John Ousterhout's \"A Philosophy of Software Design\". Deep modules = lots of functionality behind a simple interface. Shallow modules = little functionality, complex interface. AI works better in deep-module codebases, they're easier to test, and humans can reason about them without burning out.", "tags": ["architecture", "refactoring", "code-quality", "testing", "workflow"], "prompt": "## Deep Modules Audit \u2014 Codebase Architecture Review\n\n### When to Use\n- Before a major feature build on an existing codebase\n- When AI keeps getting confused about where code lives\n- When testing is painful or tests are brittle\n- When you feel like you can't keep the codebase in your head anymore\n- After a fast-shipping sprint when technical debt has accumulated\n\n### Concepts (from John Ousterhout)\n\n**Deep module:** Lots of functionality hidden behind a simple interface. You can use it without understanding its internals. Easy to test at the boundary. Easy for AI to navigate.\n\n**Shallow module:** Little functionality, complex interface. Many tiny files that individually do almost nothing. Hard to test. Hard for AI to navigate because it has to traverse dozens of files to understand one feature.\n\n**The goal:** Fewer, larger modules with clean interfaces. Not a monolith \u2014 still separated by responsibility. But each module is substantial and self-contained.\n\n### Steps\n\n1. **Map the current structure:**\n   ```bash\n   # Count files per directory\n   find [project_root] -name \"*.ts\" -o -name \"*.js\" -o -name \"*.py\" -o -name \"*.mjs\" | sed 's|/[^/]*$||' | sort | uniq -c | sort -rn | head -30\n   \n   # Find tiny files (likely shallow modules)\n   find [project_root] -name \"*.ts\" -o -name \"*.js\" -o -name \"*.py\" | xargs wc -l | sort -n | head -30\n   \n   # Find files with many imports (high coupling)\n   grep -r \"^import\" [project_root] --include=\"*.ts\" -l | xargs -I{} sh -c 'echo \"$(grep -c \"^import\" {}) {}\"' | sort -rn | head -20\n   ```\n\n2. **Identify shallow module clusters:**\n   - Directories with 10+ files under 50 lines each\n   - Files that are just re-exporting from other files\n   - Utility files that are imported everywhere (sign of missing abstraction)\n   - Types/interfaces files that mirror the structure 1:1 (the interface IS the implementation)\n\n3. **Identify natural deep module boundaries:**\n   - Group files by what feature/capability they serve together\n   - Look for clusters that share the same database tables or API endpoints\n   - Find code that changes together (if you change file A, you always change file B \u2014 they're one module)\n\n4. **Propose restructuring:** For each proposed deep module:\n   ```markdown\n   ### Module: [name]\n   **Responsibility:** One sentence.\n   **Current files:** List of files that would merge into this module.\n   **Proposed interface:**\n   - `functionName(input) -> output` \u2014 what it does\n   - `functionName(input) -> output` \u2014 what it does\n   **What it hides:** Complexity that callers don't need to know about.\n   **Test strategy:** How to test at the boundary.\n   ```\n\n5. **Score the current state:**\n   - **Module depth score:** (total functionality / number of public interfaces). Higher = deeper.\n   - **Coupling score:** Average imports per file. Lower = better.\n   - **Sprawl score:** Number of files under 50 lines / total files. Lower = better.\n\n6. **Prioritise changes:**\n   - Which module restructuring gives the most immediate benefit?\n   - Which is safest to do (fewest external dependencies)?\n   - Which would most improve AI's ability to work in the codebase?\n\n### Output Format\n```markdown\n# Deep Modules Audit: [Project]\n\n## Current State\n- Total files: X\n- Sprawl score: X% (files under 50 lines)\n- Coupling score: X avg imports/file\n- Shallow module clusters: [list]\n\n## Proposed Deep Modules\n[For each proposed module, use the template above]\n\n## Migration Priority\n1. [Module] \u2014 why first, estimated effort, risk\n2. [Module] \u2014 ...\n3. [Module] \u2014 ...\n\n## Quick Wins\n- [Small changes that improve structure without major refactoring]\n```\n\n### Rules\n- This is an AUDIT. Produce proposals. Do NOT restructure code without approval.\n- Don't propose modules smaller than ~200 lines. That's still shallow.\n- Every proposed module must have a clear, simple interface (3-7 public functions max).\n- The interface should be designable by a non-coder (Rees should be able to understand what each module does from its interface alone).\n- Consider: \"Would a new developer (or AI) understand this codebase in 5 minutes?\" That's the benchmark."}, "new-team-setup": {"description": "Set up a new team/project in Kern OS. Creates team directory, CLAUDE.md, context.md, registers Discord channel.", "tags": ["operations", "setup", "kern"], "prompt": "# New Team Setup\n\n## Steps\n1. **Create directory** at teams/{team-name}/\n2. **Create CLAUDE.md** with:\n   - Identity section (what this team does)\n   - Available Modes table (roles with emoji)\n   - Context section (project details, people, priorities)\n   - Tools section (which Google account, APIs, etc.)\n   - Rules section (team-specific rules)\n   - Memory section (pointing to Supabase)\n3. **Create context.md** with quick reference (what it is, current state, key decisions, priorities)\n4. **Register Discord channel** via /register command\n5. **Symlink .mcp.json** -- handled automatically by Dockerfile on next deploy, but can be done manually: ln -sf /app/.mcp.json /app/teams/{team-name}/.mcp.json\n6. **Commit and push** to main\n\n## Template Reference\nSee teams/_template/ for the base template structure.\n\n## Naming Conventions\n- Directory: lowercase, hyphens (e.g. new-dad-playbook)\n- Discord channel: same as directory name\n- Project tag in memories: same as directory name"}, "glassmorphism-ui": {"description": "Modern glassmorphism styling with Tailwind CSS. Dark mode patterns for cards, modals, inputs. Zinc backgrounds, low opacity, always add borders.", "tags": ["frontend", "ui", "design"], "prompt": "# Glassmorphism UI\n\nModern glassmorphism styling with Tailwind CSS.\n\n## Core Pattern (Dark Mode)\n```\nbg-zinc-900/80 backdrop-blur-md border border-white/10 shadow-xl rounded-2xl\n```\n\n## Component Patterns\n\n**Cards:**\n`bg-white/5 backdrop-blur-sm border border-white/10 rounded-xl p-6`\n\n**Modals:**\n`bg-zinc-900/90 backdrop-blur-lg border border-white/20 rounded-2xl shadow-2xl`\n\n**Inputs:**\n`bg-white/10 border border-white/20 rounded-lg focus:border-white/40 focus:bg-white/15`\n\n**Color-coded cards:**\nUse `bg-blue-500/10 border-blue-500/20` pattern with matching accent\n\n## Rules\n- Use zinc-950 for page backgrounds\n- Keep opacity 10-20% on glass elements\n- ALWAYS add borders -- glass without border looks broken\n- Semantic zoom: scale transforms on hover (scale-[1.02])\n- Never use pure white backgrounds in dark glassmorphism UI"}, "seo": {"description": "On-page SEO rules, technical audits, content strategy, structured data. Core Web Vitals targets, mobile-first indexing, canonical tags.", "tags": ["marketing", "seo", "content"], "prompt": "# SEO\n\nOn-page rules, technical audits, content strategy, structured data.\n\n## On-Page Rules\n- Title: 50-60 chars, target keyword in first 30 chars\n- Meta description: 150-160 chars, compelling, includes keyword\n- Only ONE H1 per page\n- H2/H3 for structure, include related keywords naturally\n- Images: descriptive alt text, WebP format, lazy loading\n\n## Core Web Vitals Targets\n- LCP (Largest Contentful Paint): < 2.5s\n- INP (Interaction to Next Paint): < 200ms\n- CLS (Cumulative Layout Shift): < 0.1\n\n## Technical Checklist\n- [ ] Canonical tag on every page\n- [ ] Mobile-first (Google indexes mobile version)\n- [ ] sitemap.xml submitted to Search Console\n- [ ] robots.txt configured\n- [ ] HTTPS everywhere\n- [ ] Structured data (JSON-LD) for relevant content types\n\n## NEVER Do\n- Keyword stuffing\n- Hidden text or links\n- Cloaking (different content for bots vs users)\n- Buying links\n- Duplicate content without canonical"}, "proposal-template-adaptation": {"description": "Adapt a winning proposal or pitch document for a new client. Use when Levity has a proven proposal structure and needs to customize it for a different prospect. Preserves the winning structure while swapping in new client context, pain points, and deliverables.", "tags": ["levity", "sales", "proposals", "writing"], "prompt": "## Proposal Template Adaptation\n\n### Input\n- `source_proposal`: The winning proposal to use as template (Google Doc URL or content)\n- `new_client`: Company name and context\n- `client_pain_points`: What problems they have (from discovery call, research, or brief)\n- `deliverables`: What we're proposing to do for them\n- `budget_range`: Optional price range\n\n### Steps\n\n1. **Read the source proposal** structure. Identify:\n   - Section order and headings\n   - Tone and voice\n   - Social proof placement\n   - CTA structure\n   - Pricing presentation format\n\n2. **Research the new client**:\n   - Company website (use designrip if needed for their brand language)\n   - LinkedIn for key stakeholders\n   - Recent news/announcements\n   - Their competitors\n   - Industry-specific language\n\n3. **Adapt each section**:\n   - Swap client name and context throughout\n   - Rewrite pain points to match their specific situation\n   - Adjust deliverables and scope\n   - Update social proof (pick most relevant case studies)\n   - Customize pricing to their scale\n   - Match their industry terminology\n\n4. **Quality checks**:\n   - No leftover references to the original client\n   - Tone matches their industry (enterprise = formal, startup = casual)\n   - All claims are defensible\n   - CTA is specific and time-bound\n\n5. **Output** as a Google Doc with rich formatting (Inter font, brand colors, proper headings per CLAUDE.md formatting rules).\n\n### Key Principle\nThe structure won. Don't reinvent it. Change the content, keep the skeleton."}, "deps-upgrade": {"description": "Safely upgrade npm dependencies across a project. Use for quarterly maintenance sweeps, pre-release hardening, or when a specific vulnerability needs patching. Reduces breakage risk by staging upgrades and verifying at each step.", "tags": ["maintenance", "npm", "security", "dev"], "prompt": "You are performing a dependency upgrade. Safety first, speed second.\n\n## 1. Baseline\n\nBefore touching anything:\n- Check branch is clean (`git status`), create new branch `chore/deps-YYYY-MM`\n- Snapshot current state: `cat package.json package-lock.json > /tmp/deps-before.txt`\n- Run the test suite and record: does it pass now?\n- Note the build command and that it works: `npm run build`\n\nIf tests don't pass on main, STOP. Don't upgrade on top of a broken base.\n\n## 2. Identify\n\n```\nnpm outdated\nnpm audit\n```\n\nGroup results into three tiers:\n- **Patch** (x.y.Z): almost always safe, batch together\n- **Minor** (x.Y.z): usually safe, upgrade in logical groups (all React-related together, all build tooling together)\n- **Major** (X.y.z): one at a time, read the migration guide, allocate time\n\n## 3. Upgrade in waves\n\n**Wave 1, patches**: `npm update` for all patch bumps. Run tests. Commit.\n\n**Wave 2, minors**: group by ecosystem (React stack, build tools, linters). For each group:\n- `npm install <pkg>@<new-version> ...`\n- Run tests\n- Run build\n- If it breaks, roll back the group and upgrade packages one at a time to isolate\n\n**Wave 3, majors**: one package at a time.\n- Read release notes and migration guide BEFORE running install\n- Plan the code changes the upgrade requires\n- Install, apply migrations, test, commit as its own commit\n\n## 4. Verify\n\nAfter every wave:\n- `npm test` (or project equivalent)\n- `npm run build`\n- `npm run typecheck` if TypeScript\n- `npm run lint`\n- Smoke test the app manually on the main routes\n\n## 5. Security\n\nRun `npm audit` again. For remaining vulnerabilities:\n- Critical/high in prod deps: must fix, either upgrade or replace\n- Critical/high in dev deps: fix if easy, document if not\n- Moderate/low: batch into next cycle unless exploitable\n\nDon't use `npm audit fix --force` without reading what it's about to do.\n\n## 6. Deliver\n\nCommit structure:\n- One commit per wave (or per major)\n- Message format: `chore(deps): bump [ecosystem] to latest minor`\n- Include bullet list of what changed and why in the body\n\nFinal PR description:\n- What was upgraded (grouped by tier)\n- What broke and how it was fixed\n- Any new deprecation warnings to watch\n- Test/build status\n\nOpen the PR. Don't merge without a second look."}, "email-drafting": {"description": "Draft an email for Rees. Covers tone, formatting, threading, and the review-before-send protocol.", "tags": ["communication", "email"], "prompt": "# Email Drafting\n\n## CRITICAL RULES\n- NEVER send without Rees's explicit approval\n- Draft first, show Rees, wait for approval, then send\n- Always thread replies using threadId + replyToMessageId\n- replyToMessageId = Gmail hex ID (e.g. 19c51e229cb53b1b), NOT RFC Message-ID\n\n## Style Guide\n- TO Rees: Levity address, rich HTML, SHORT drafts, \"should\" not \"will\", no signature\n- TO clients: Professional but warm. No corporate jargon. Get to the point.\n- TO partners: Peer-to-peer. Not subservient.\n- No em dashes. Ever.\n- \"should\" not \"will\" (softer, less committal)\n\n## Process\n1. Identify: who, what account, reply or new, what tone\n2. Draft: keep it SHORT. If it's more than 3 paragraphs, cut it.\n3. Show Rees: present the draft with subject line\n4. Wait for approval or edits\n5. Send only after explicit \"send it\" or similar\n\n## Gmail Accounts\n- Personal: account=personal\n- Levity (rees.calder@levityleads.com): account=levity\n- Thingiverse (rees@thingiverse.com): account=thingiverse"}, "create-prd": {"description": "Generate a comprehensive Product Requirements Document from conversation context. Covers executive summary, user personas, MVP scope, user stories, architecture, tech stack, API spec, success criteria, implementation phases, and risks. Writes to a markdown file.", "tags": ["product", "planning", "strategy", "ops"], "prompt": "Generate a comprehensive Product Requirements Document (PRD) based on the conversation context and requirements discussed.\n\n## PRD Structure\n\n**1. Executive Summary**\n- Product overview (2-3 paragraphs)\n- Core value proposition\n- MVP goal statement\n\n**2. Mission**\n- Product mission statement\n- Core principles (3-5)\n\n**3. Target Users**\n- Primary user personas\n- Technical comfort level\n- Key needs and pain points\n\n**4. MVP Scope**\n- In Scope: Core functionality (checkboxes)\n- Out of Scope: Deferred features (checkboxes)\n\n**5. User Stories**\n- 5-8 primary stories: \"As a [user], I want to [action], so that [benefit]\"\n\n**6. Core Architecture**\n- High-level approach\n- Directory structure\n- Key design patterns\n- Tech-specific patterns\n\n**7. Technology Stack**\n- Backend/Frontend with versions\n- Dependencies and libraries\n- Third-party integrations\n\n**8. Security**\n- Auth/authorisation approach\n- Environment variable management\n- Deployment considerations\n\n**9. API Specification** (if applicable)\n- Endpoint definitions with request/response formats\n\n**10. Success Criteria**\n- MVP success definition\n- Functional requirements (checkboxes)\n- Quality indicators\n\n**11. Implementation Phases**\n- 3-4 phases: Goal, Deliverables, Validation criteria, Timeline\n\n**12. Risks and Mitigations**\n- 3-5 key risks with specific mitigations\n\n## Instructions\n1. Extract requirements from conversation history\n2. Make reasonable assumptions where needed (flag them)\n3. Keep scope realistic for a solo builder\n4. Write to PRD.md (or specified file)\n5. After writing: confirm file path, summarise key decisions, flag assumptions, suggest next steps\n\n## Style\n- Professional but concise\n- Markdown throughout (headings, lists, checkboxes, code blocks)\n- Scannable over comprehensive -- Rees has ADHD"}, "bubble-chart": {"description": "Build an interactive packed bubble/circle chart with timeline slider. Custom greedy circle packing, React + Framer Motion springs.", "tags": ["frontend", "ui", "data-viz"], "prompt": "# Bubble Chart\n\nInteractive packed circle/bubble chart with timeline slider.\n\n## Key Details\n- Custom greedy circle packing algorithm (no D3 dependency)\n- React + Framer Motion springs for animations\n- Circles resize with spring animations as user scrubs through time periods\n- Timeline slider controls which data snapshot is shown\n\n## Implementation\n- Each circle is a positioned div with border-radius: 50%\n- Packing algorithm: place largest circles first, find nearest valid non-overlapping position\n- Framer Motion `animate` prop handles smooth transitions between positions/sizes\n- Spring config: stiffness 200, damping 25 for bouncy feel"}, "apollo-sequence-hygiene": {"description": "Pre-flight checklist and rules for Apollo sequence management: contact deduplication before batch loading, HTML email formatting standards, follow-up threading verification, and sequence activation safety checks. Use before loading contacts into any Apollo sequence or when debugging Apollo email issues (duplicate sends, broken formatting, unthreaded follow-ups).", "tags": ["apollo", "outreach", "email", "deduplication", "hygiene", "thingiverse"], "prompt": "# Apollo Sequence Hygiene\n\nPre-flight and formatting rules for Apollo sequence management. Born from real production incidents (56 contacts double-emailed, unthreaded follow-ups, broken formatting).\n\n## Before Loading Contacts\n\n### Deduplication (CRITICAL)\n\nBefore adding contacts to ANY sequence, deduplicate against:\n\n1. **Existing sequence contacts**: Query the sequence's contact list first.\n   ```\n   GET /v1/emailer_campaigns/{sequence_id}/emailer_campaign_statuses\n   ```\n   Extract all `contact_id` values. Compare against your new batch. Skip any already present.\n\n2. **Cross-sequence dedup**: If running multiple sequences to the same audience (e.g. warm + cold), check both sequences. A person in the warm sequence should NOT also be in the cold sequence.\n\n3. **Same-day batch guard**: If you've already loaded contacts today, fetch the sequence status list AGAIN before a second load. Two batch loads on the same day without dedup is how 56 people got every email twice (Apr 28 2026 incident).\n\n### Pre-load validation\n\n- Verify email addresses are present (Apollo silently skips contacts without emails)\n- Check that the sending mailbox is active and verified in the Apollo workspace\n- Confirm the sequence is INACTIVE before loading (loading into active sequences can trigger immediate sends)\n\n## Email Template Formatting\n\n### Paragraph Spacing (CRITICAL)\n\nApollo renders bare `<div>` tags with ZERO margin. Emails look like a wall of text.\n\n**ALWAYS use:**\n```html\n<div style=\"margin-bottom:12px\">Paragraph text here.</div>\n```\n\n**NEVER use:**\n```html\n<div>Paragraph text here.</div>\n```\n\nThis applies to every paragraph in every template. No exceptions.\n\n### Other formatting rules\n\n- `<br>` for line breaks within a paragraph, `<div style=\"margin-bottom:12px\">` for paragraph breaks\n- Links: `<a href=\"URL\" style=\"color:#1a73e8\">anchor text</a>` (blue, no underline by default in Apollo)\n- Bold: `<strong>` not `<b>`\n- No inline images in cold outreach (triggers spam filters)\n- Keep total HTML under 2000 chars (deliverability)\n- Subject lines: 4-7 words, sentence case or lowercase, no ALL CAPS\n\n## Follow-up Threading\n\nApollo follow-ups MUST thread onto the original email. If they send as standalone emails, the recipient sees separate conversations, which looks spammy and breaks context.\n\n### How to verify threading\n\n1. After sequence activation, wait for first follow-up to send\n2. Check in the recipient's inbox (or test with a team email)\n3. Follow-ups should appear in the same thread as Step 1\n\n### Common threading failures\n\n- **Sequence type wrong**: Must be \"Email Sequence\" not \"Task Sequence\" for auto-threading\n- **Manual emails between steps**: If you manually email a contact outside Apollo between sequence steps, Apollo may not thread correctly\n- **Different mailbox**: All steps must send from the same mailbox. Switching mailboxes mid-sequence breaks threading.\n- **Step type**: All steps must be `auto_email` type. Manual email steps don't auto-thread.\n\n## Sender Identity\n\n- Cold outreach FROM the person whose name is in the email. Don't send \"Hi, I'm Rees\" from ece@thingiverse.com.\n- Each sender needs their own sequence (or use Apollo's sender rotation within one sequence, but only if all senders are introduced in the copy).\n- Warm outreach can come from a team member if the copy references them properly.\n\n## Sequence Activation Checklist\n\nBefore activating any sequence:\n\n- [ ] Contacts deduplicated against existing sequence members\n- [ ] All email templates use `<div style=\"margin-bottom:12px\">` for paragraphs\n- [ ] Subject lines are 4-7 words, no spam triggers\n- [ ] Sending mailbox matches the \"from\" identity in the copy\n- [ ] Sequence is set to the correct sending schedule (business hours, timezone)\n- [ ] Daily send limit is set (max 50/day per mailbox for cold)\n- [ ] Test email sent to team address and reviewed\n- [ ] Follow-up threading verified on test send\n- [ ] Unsubscribe link present (CAN-SPAM / GDPR)\n- [ ] Touches are in \"to_be_reviewed\" status, requiring manual approval before first send\n\n## Post-Activation Monitoring\n\n- Check bounce rates after first batch. >5% = stop and clean list.\n- Check reply rates after 48 hours. 0 replies on 50+ sends = something is wrong (deliverability, copy, or targeting).\n- Check for \"duplicate\" complaints from recipients = dedup failed.\n\n## Apollo API Reference\n\n```\nBase URL: https://api.apollo.io/v1\n\n# List sequence contacts\nGET /emailer_campaigns/{id}/emailer_campaign_statuses\n\n# Add contacts to sequence  \nPOST /emailer_campaigns/{id}/add_contact_ids\nBody: { \"contact_ids\": [\"id1\", \"id2\"], \"emailer_campaign_id\": \"seq_id\" }\n\n# List sequences\nGET /emailer_campaigns\n\n# Get sequence details\nGET /emailer_campaigns/{id}\n```\n\nAPI key goes in header: `X-Api-Key: {key}` or query param `api_key={key}`"}, "vercel-composition-patterns": {"description": "React composition patterns that scale. Avoid boolean props, use compound components, context interface, explicit variants. React 19 APIs: no forwardRef, use use() hook.", "tags": ["dev", "react", "frontend", "patterns"], "prompt": "# Vercel Composition Patterns\n\nReact composition patterns that scale. From Vercel Engineering.\n\n## Component Architecture (HIGH PRIORITY)\n\n**Avoid boolean props -- use variants:**\n```tsx\n// Bad\n<Button primary large disabled />\n// Good\n<Button variant=\"primary\" size=\"lg\" disabled />\n```\n\n**Compound components for complex UI:**\n```tsx\n<Select>\n  <Select.Trigger />\n  <Select.Content>\n    <Select.Item value=\"a\">Option A</Select.Item>\n  </Select.Content>\n</Select>\n```\n\n## State Management\n- Decouple state implementation from interface\n- Use context with a typed interface (not raw setState)\n- Lift state only as high as needed\n\n## React 19 APIs\n- No `forwardRef` -- refs are now regular props\n- Use `use()` instead of `useContext()`\n- `useOptimistic` for optimistic UI updates\n\n## Children Over Render Props\n```tsx\n// Prefer\n<Card header={<Title />}>{content}</Card>\n// Over\n<Card renderHeader={() => <Title />} />\n```"}, "analytics-setup": {"description": "Set up and audit analytics tracking for web projects. Covers GA4 setup, event tracking, conversion goals, Google Search Console, UTM parameters, and data layer configuration. Use when launching a new site or auditing tracking on an existing one.", "tags": ["dev", "marketing", "analytics", "seo"], "prompt": "# Analytics Setup and Audit\n\nSet up or audit analytics tracking for Kern's web projects.\n\n## GA4 Setup (Next.js)\n\n### Install\n```bash\nnpm install @next/third-parties\n```\n\n### Implementation\n```tsx\n// app/layout.tsx\nimport { GoogleAnalytics } from '@next/third-parties/google';\n\nexport default function RootLayout({ children }) {\n  return (\n    <html>\n      <body>{children}</body>\n      <GoogleAnalytics gaId=\"G-XXXXXXXXXX\" />\n    </html>\n  );\n}\n```\n\n### Alternative (manual gtag)\n```html\n<\!-- In <head> -->\n<script async src=\"https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX\"><\/script>\n<script>\n  window.dataLayer = window.dataLayer || [];\n  function gtag(){dataLayer.push(arguments);}\n  gtag('js', new Date());\n  gtag('config', 'G-XXXXXXXXXX');\n<\/script>\n```\n\n## Event Tracking\n\n### Standard Events to Set Up\n- `page_view` (automatic with GA4)\n- `scroll` (automatic, 90% threshold)\n- `click` (outbound links, automatic)\n- `form_submit` (custom, on email capture / contact forms)\n- `sign_up` (custom, on account creation)\n- `generate_lead` (custom, on lead form submission)\n\n### Custom Event Pattern\n```tsx\n// Track a custom event\nfunction trackEvent(eventName: string, params?: Record<string, string>) {\n  if (typeof window !== 'undefined' && window.gtag) {\n    window.gtag('event', eventName, params);\n  }\n}\n\n// Usage\ntrackEvent('generate_lead', { source: 'hero_cta', page: '/pricing' });\n```\n\n## Conversion Goals\n\nSet up in GA4 Admin > Events > Mark as conversion:\n- `generate_lead` (form submissions)\n- `sign_up` (account creation)\n- `purchase` (if applicable)\n- Custom: `email_captured` (email gate submissions)\n\n## Google Search Console\n\n### Setup Checklist\n- [ ] Property added (URL prefix or Domain)\n- [ ] Ownership verified (DNS TXT record or HTML file)\n- [ ] Sitemap submitted (yourdomain.com/sitemap.xml)\n- [ ] Connected to GA4 (GA4 Admin > Search Console Linking)\n\n### Key Reports to Monitor\n- Performance: impressions, clicks, CTR, average position\n- Index Coverage: indexed vs excluded pages\n- Core Web Vitals: LCP, INP, CLS\n- Sitemaps: submission status and indexed count\n\n## UTM Parameters\n\n### Standard Format\n```\n?utm_source=newsletter&utm_medium=email&utm_campaign=launch_q1\n```\n\n### UTM Conventions for Kern\n- `utm_source`: where the traffic comes from (newsletter, linkedin, twitter, cold-email)\n- `utm_medium`: marketing medium (email, social, cpc, organic)\n- `utm_campaign`: campaign name (snake_case, descriptive)\n- `utm_content`: A/B test variant or specific link (hero_cta, footer_link)\n\n## Audit Checklist\n\nWhen auditing existing tracking:\n- [ ] GA4 tag firing on all pages (check via GA4 Realtime report)\n- [ ] No duplicate tags (causes inflated pageviews)\n- [ ] Events firing correctly (test each form, CTA, signup flow)\n- [ ] Conversions marked in GA4\n- [ ] Search Console connected and sitemap current\n- [ ] Referral exclusions set (own domain, payment processors)\n- [ ] Internal traffic filtered (create filter for office IP / dev environments)\n- [ ] Cross-domain tracking if needed (multiple domains in one property)\n- [ ] Cookie consent banner if serving EU traffic (GDPR)\n\n## Kern-Specific Notes\n\n- Use the `kern-google` MCP tools for Search Console and Analytics data\n- GA4 property IDs stored in each project's context\n- For Vercel sites: set GA ID as env var, reference in layout\n- All tracking must work with cookie consent (defer gtag until consent given for EU)"}, "programmatic-seo": {"description": "Build SEO-driven page templates for large-scale content generation. Programmatic SEO creates hundreds or thousands of pages from data + templates targeting long-tail keywords. Use for content sites like EmployeeKit, EPC Guide, or any site where a repeatable template can target many keyword variations.", "tags": ["seo", "content", "dev", "marketing"], "prompt": "# Programmatic SEO\n\nGenerate hundreds of pages targeting long-tail keywords from data + templates. Each page is unique, valuable, and indexable.\n\n## When to Use\n\n- You have a data source (spreadsheet, API, database) with many items\n- Each item maps to a search query people actually make\n- A template can generate genuinely useful pages per item\n- Examples: \"[city] + [service]\", \"[topic] + [question]\", \"[product] + [comparison]\"\n\n## Planning Phase\n\n### 1. Keyword Pattern Research\n- Identify the repeatable keyword pattern (e.g., \"[employment topic] UK law\", \"[EPC rating] meaning\")\n- Validate with search data: do people actually search these variations?\n- Check competition: are top results thin or authoritative?\n- Estimate total addressable pages (50? 500? 5000?)\n\n### 2. Data Source\n- What data populates each page? (topics list, city list, product database)\n- Is the data complete enough for a useful page? (minimum 3-4 unique data points per page)\n- Where does the data live? (Google Sheets, CMS, database, API)\n\n### 3. Template Design\nEvery programmatic page MUST have:\n- **Unique H1** targeting the specific long-tail keyword\n- **Unique introductory paragraph** (not just swapping one word in a template sentence)\n- **Unique data/content section** (the core value -- stats, facts, guidance specific to this variation)\n- **Contextual internal links** (to related programmatic pages AND pillar content)\n- **FAQ section** with variation-specific questions\n- **Schema markup** (Article, FAQPage, or appropriate type)\n\n### 4. Quality Gate\nBefore generating at scale, manually review 5 sample pages:\n- [ ] Would a human find this page useful?\n- [ ] Does it answer the search query better than current top results?\n- [ ] Is there enough unique content per page (not just template with swapped words)?\n- [ ] Does each page pass the \"thin content\" test (300+ words of genuine value)?\n- [ ] Are internal links contextual, not just a generic sidebar?\n\n## Implementation (Next.js)\n\n```\n/app/[topic]/page.tsx          -- Dynamic route\n/lib/data/topics.json          -- Data source\n/lib/generate-content.ts       -- Content generation logic\n/app/sitemap.ts                -- Dynamic sitemap\n```\n\n### Dynamic Route Pattern\n```tsx\n// app/[slug]/page.tsx\nexport async function generateStaticParams() {\n  const topics = await getTopics();\n  return topics.map(t => ({ slug: t.slug }));\n}\n\nexport async function generateMetadata({ params }) {\n  const { slug } = await params;\n  const topic = await getTopic(slug);\n  return {\n    title: topic.metaTitle,        // 50-60 chars, keyword-first\n    description: topic.metaDesc,   // 150-160 chars, compelling\n    alternates: { canonical: `/topics/${slug}` },\n  };\n}\n```\n\n### Sitemap\n```tsx\n// app/sitemap.ts\nexport default async function sitemap() {\n  const topics = await getTopics();\n  return topics.map(t => ({\n    url: `https://example.com/${t.slug}`,\n    lastModifie
