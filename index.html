<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kern OS - Skill Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #09090b;
    --bg-surface: #18181b;
    --bg-elevated: #27272a;
    --border: #3f3f46;
    --text: #fafafa;
    --text-muted: #a1a1aa;
    --text-dim: #71717a;
    --panel-width: 480px;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ---- Top bar ---- */
  .top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: linear-gradient(to bottom, rgba(9,9,11,0.95) 0%, rgba(9,9,11,0.7) 80%, transparent 100%);
    pointer-events: none;
  }

  .top-bar > * { pointer-events: auto; }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: white;
  }

  .logo-text {
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.02em;
  }

  .logo-sub {
    color: var(--text-dim);
    font-weight: 400;
    margin-left: 4px;
  }

  .search-wrapper {
    position: relative;
    width: 320px;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 10px 12px 10px 38px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus {
    border-color: #a855f7;
    box-shadow: 0 0 0 3px rgba(168,85,247,0.15);
  }

  .stats {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: var(--text-dim);
  }

  .stat-num {
    color: var(--text-muted);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  /* ---- Legend ---- */
  .legend {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 100;
    display: flex;
    flex-wrap: wrap;
    gap: 8px 16px;
    padding: 12px 16px;
    background: rgba(24,24,27,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 12px;
    max-width: 520px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    opacity: 0.8;
    transition: opacity 0.2s;
  }

  .legend-item:hover { opacity: 1; }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-label {
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ---- Controls hint ---- */
  .controls-hint {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 100;
    font-size: 12px;
    color: var(--text-dim);
    background: rgba(24,24,27,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    line-height: 1.6;
  }

  .controls-hint kbd {
    display: inline-block;
    padding: 1px 5px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ---- SVG canvas ---- */
  #canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    cursor: grab;
  }

  #canvas.dragging { cursor: grabbing; }

  /* ---- Detail Panel ---- */
  .detail-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: var(--panel-width);
    height: 100%;
    background: var(--bg-surface);
    border-left: 1px solid var(--border);
    z-index: 200;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .detail-panel.open { transform: translateX(0); }

  .panel-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 24px 24px 0 24px;
  }

  .panel-close {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }

  .panel-close:hover {
    background: var(--border);
    color: var(--text);
  }

  .panel-body {
    padding: 24px;
    overflow-y: auto;
    flex: 1;
  }

  .panel-category {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .panel-cat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .panel-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .panel-description {
    font-size: 15px;
    line-height: 1.65;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  .panel-section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .panel-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 24px;
  }

  .panel-tag {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid;
  }

  .panel-usage {
    padding: 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 24px;
  }

  .panel-usage-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .panel-usage-code {
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    color: #a855f7;
  }

  .panel-prompt-wrapper {
    margin-bottom: 24px;
  }

  .panel-prompt-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .panel-prompt-copy {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .panel-prompt-copy:hover {
    background: var(--border);
    color: var(--text);
  }

  .panel-prompt-copy.copied {
    background: #065f46;
    border-color: #10b981;
    color: #6ee7b7;
  }

  .panel-prompt-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    max-height: 400px;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .panel-prompt-block pre {
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-muted);
    white-space: pre-wrap;
    word-wrap: break-word;
    margin: 0;
  }

  .panel-related {
    margin-top: 8px;
  }

  .panel-related-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(63,63,70,0.5);
    cursor: pointer;
    transition: color 0.15s;
    color: var(--text-muted);
    font-size: 14px;
  }

  .panel-related-item:hover { color: var(--text); }
  .panel-related-item:last-child { border-bottom: none; }

  .panel-related-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ---- Responsive ---- */
  @media (max-width: 768px) {
    .search-wrapper { width: 200px; }
    .stats { display: none; }
    .legend { max-width: calc(100vw - 48px); }
    .controls-hint { display: none; }
    .detail-panel { width: 100%; }
  }

  @media (max-width: 480px) {
    .top-bar { padding: 12px 16px; }
    .search-wrapper { width: 160px; }
    .logo-sub { display: none; }
  }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <div class="logo">
    <div class="logo-mark">K</div>
    <div class="logo-text">Kern OS<span class="logo-sub">Skill Tree</span></div>
  </div>
  <div class="search-wrapper">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Search skills..." autocomplete="off" spellcheck="false">
  </div>
  <div class="stats">
    <span><span class="stat-num" id="skillCount">0</span> skills</span>
    <span><span class="stat-num" id="catCount">0</span> categories</span>
  </div>
</div>

<!-- Legend -->
<div class="legend" id="legend"></div>

<!-- Controls Hint -->
<div class="controls-hint">
  <kbd>Scroll</kbd> Zoom &nbsp; <kbd>Drag</kbd> Pan &nbsp; <kbd>Click</kbd> Explore<br>
  <kbd>Esc</kbd> Close panel &nbsp; <kbd>/</kbd> Search
</div>

<!-- SVG Canvas -->
<svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
  <div class="panel-header">
    <div></div>
    <button class="panel-close" id="panelClose" aria-label="Close panel">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
// ============================================================
// SKILL PROMPTS DATABASE (full prompts for detail panel)
// ============================================================
const SKILL_PROMPTS = {"skill-creator": {"description": "Create new skills, modify and improve existing skills, and measure skill performance with evals. Use when designing a fresh skill from scratch, editing an existing one, running quantitative benchmarks, or optimising a skill's description for better triggering accuracy. Pairs with the skill-scout cron and the spawn-agent skill.", "tags": ["meta", "type1", "skill-management", "kern", "auto-added"], "prompt": "# Skill Creator (Type 1)\n\n**Type 1 skill.** Full implementation lives at `/app/.claude/skills/skill-creator/SKILL.md` in the kern-os repo. Source: https://github.com/anthropics/skills/tree/main/skills/skill-creator\n\n## How to Use\n\nRead `/app/.claude/skills/skill-creator/SKILL.md` first for the full methodology. The high level loop:\n\n1. Decide what the skill should do and roughly how\n2. Write a draft (frontmatter + markdown)\n3. Create test prompts and run them through Claude with skill access\n4. Evaluate results qualitatively + quantitatively\n5. Rewrite based on feedback, repeat\n6. Optimise the description for triggering accuracy\n\n## Kern Adaptations\n\n- For Type 2 (Supabase-only) skills: call `mcp__supabase-memory__skill_create` directly. No file commit needed.\n- For Type 1 (file + Supabase pointer) skills: commit `SKILL.md` to `/app/.claude/skills/[name]/SKILL.md` via GitHub API, then create a thin Supabase entry tagged `type1` pointing at the file.\n- Test invocation in this session by typing the slash command to verify trigger.\n- Always store a memory after creation with type \"event\", tag \"skill-created\", importance 5.\n\n## When to Use\n\n- Rees says \"let's make a skill for X\"\n- A workflow has been done 3+ times manually\n- The skill-scout cron finds a candidate worth adding\n- An existing skill is misfiring (wrong trigger or wrong instructions)"}, "superpowers": {"description": "Jesse Vincent's Superpowers: a complete software development methodology for coding agents. 14 composable skills covering the full dev lifecycle: brainstorming (Socratic design refinement), writing-plans (bite-sized implementation tasks), subagent-driven-development (parallel task execution with review), test-driven-development (strict RED-GREEN-REFACTOR), systematic-debugging (4-phase root cause analysis), code review (requesting + receiving), verification-before-completion, git worktrees, and more. Skills trigger automatically based on context. Use when doing any non-trivial development work.", "tags": ["dev", "methodology", "tdd", "planning", "code-review", "type1", "subagents"], "prompt": "# Superpowers -- Dev Methodology (obra/superpowers)\n\n**Type 1 skill.** Full implementation lives at `.claude/skills/superpowers/` in the kern-os repo.\n\n## 14 Skills (auto-trigger based on context)\n\n- **brainstorming** -- Activates before writing code. Refines rough ideas through questions, explores alternatives, presents design in sections for validation.\n- **writing-plans** -- Breaks work into bite-sized tasks (2-5 min each). Every task has exact file paths, complete code, verification steps.\n- **executing-plans** -- Executes plans in batches with human checkpoints.\n- **subagent-driven-development** -- Dispatches fresh subagent per task with two-stage review (spec compliance, then code quality).\n- **dispatching-parallel-agents** -- Parallel subagent execution for independent tasks.\n- **test-driven-development** -- Strict RED-GREEN-REFACTOR: write failing test, watch fail, write minimal code, watch pass, commit. Deletes code written before tests.\n- **systematic-debugging** -- 4-phase root cause process with defense-in-depth and condition-based waiting techniques.\n- **requesting-code-review** -- Reviews against plan, reports issues by severity. Critical issues block progress.\n- **receiving-code-review** -- How to respond to code review feedback.\n- **verification-before-completion** -- Ensure it's actually fixed/working before marking done.\n- **using-git-worktrees** -- Creates isolated workspace on new branch, runs project setup, verifies clean test baseline.\n- **finishing-a-development-branch** -- Verifies tests, presents options (merge/PR/keep/discard), cleans up worktree.\n- **using-superpowers** -- Meta-skill: how to discover and use all other skills.\n- **writing-skills** -- How to write new skills (meta-skill for skill creation).\n\n## 3 Commands\n- `/brainstorm` -- Start a brainstorming session\n- `/write-plan` -- Write an implementation plan\n- `/execute-plan` -- Execute a plan\n\n## Key Principles\n- YAGNI (You Aren't Gonna Need It)\n- True TDD (not \"write tests after\")\n- Plans detailed enough for \"an enthusiastic junior engineer with poor taste\"\n- Subagent isolation: each task gets a fresh agent with no accumulated context drift\n\nSource: https://github.com/obra/superpowers"}, "introspection-scout": {"description": "Weekly introspective skill scout. Scans Rees's last 7 days of Supabase memory and conversation activity for repeated patterns, stitched-together workflows, and hard-won lessons, then proposes skills based on what he actually did rather than what's trending on GitHub. Runs every Sunday at 11am. Higher signal-to-noise than the bi-daily external scout because it sources from real work patterns, not public repos.", "tags": ["meta", "skill-management", "introspection", "workflow", "kern", "scheduled"], "prompt": "# Introspection Scout (weekly, Sunday 11am)\n\nYou are scanning Rees's own work from the past week and turning repeated patterns into skills. This is fundamentally different from the bi-daily `skill-scout` which pulls from GitHub. You do not touch the web. You look inward.\n\n## The principle\n\nIf Rees did the same thing three times last week, that's a skill. If he solved the same category of problem twice with different approaches, that's a skill waiting to be named. If he logged a correction or preference that would apply to future work, that's a skill.\n\nSkills from your own work fit your reality far better than anything from awesome-claude-code.\n\n## STEP 1: Pull the window\n\nRun these in parallel:\n- `memory_timeline` with `limit: 100` (no project filter)\n- `memory_timeline` with `types: [\"correction\", \"preference\", \"decision\", \"pattern\", \"learning\"]`, `limit: 50`\n\nYou now have the last week of signal. If activity is low, extend to 14 days.\n\n## STEP 2: Cluster into patterns\n\nRead the window and cluster by:\n- **Repeated task shape** (e.g. \"deployed a Next.js site 3x\", \"wrote a client proposal 2x\", \"debugged Railway env vars 4x\")\n- **Repeated tool combinations** (e.g. \"Playwright + mobile viewport + screenshot every time\")\n- **Repeated lessons** (e.g. \"JSX whitespace bug bit me twice\", \"forgot to kill stale server before rebuild\")\n- **Stitched workflows** (e.g. \"push via Git Database API because no git binary, then poll Vercel, then Playwright smoke test\" \u2014 happened 3 times last week)\n- **Domain corrections** (e.g. repeated \"no em-dashes\" reminders that could become an automated hook spec)\n\nOnly cluster patterns that appeared 3+ times OR that represent substantial learning (one-time but high-value, like a new technique that worked).\n\n## STEP 3: Check coverage\n\nFor each cluster, run `skill_search` with a natural-language description. If similarity > 0.65 to an existing skill, skip \u2014 the skill already covers it. If lower, candidate is genuine.\n\n## STEP 4: Draft 1 to 5 skills\n\nFor each surviving cluster, write a skill in Kern voice:\n- Title in slug form\n- Short description (discoverable via semantic search)\n- Prompt template in Rees voice: no em-dashes, short sentences, no LinkedIn energy\n- Concrete inputs and outputs\n- Examples of when it applies\n\nCap at 5 per run. If you have 8 candidates, pick the 5 with highest frequency or highest ROI.\n\n## STEP 5: Auto-add with `auto-added` tag\n\nCall `skill_create` for each. MANDATORY tags: `auto-added` + `from-introspection` + 2-4 descriptive tags. This lets `weekly-kern-setup-review` filter and audit anything problematic.\n\nIf a skill feels risky or Rees-specific in a way that might not generalise, flag it in the report instead of auto-adding. Let Rees approve.\n\n## STEP 6: Report\n\nPost a concise report to the channel:\n- Patterns detected (with frequency counts)\n- Skills added (name + 1-line description each)\n- Skills proposed but not added (and why)\n- Gaps noted for next run\n\nKeep it under 400 words. Rees skims these.\n\n## Voice rules\n\n- No em-dashes\n- No \"exciting findings!\" or similar filler\n- Sardonic where it fits, factual where it doesn't\n- Skills authored here must themselves follow the no-em-dash rule"}, "wellfound-auto-apply": {"description": "Apply to fractional/consulting gigs posted on Wellfound (formerly AngelList Talent). Requires Rees's Wellfound auth cookie. This skill documents the semi-manual process and prepares application materials.", "tags": ["consulting", "gig", "auto-apply", "wellfound", "angellist"], "prompt": "# Wellfound Auto-Apply (Semi-Manual)\n\nWellfound (formerly AngelList Talent) blocks scraping but has a simpler application flow than LinkedIn.\n\n## Prerequisites\n- Rees needs an active Wellfound profile (create if not exists)\n- Auth cookie needed for any automated submission (not yet configured)\n\n## What This Skill Prepares\n\n1. **Cover letter** - Generated via reescalder.com/api/cover-letter\n2. **Pitch page** - Created at reescalder.com/for/[slug]\n3. **Direct link** - Wellfound job URL\n4. **Application answers** - Pre-written responses to common Wellfound questions:\n   - \"Why are you interested in this role?\"\n   - \"What relevant experience do you have?\"\n   - \"What's your availability?\"\n   - \"Expected compensation?\"\n\n## Standard Answers (Customise Per Role)\n\n**Availability:** \"Available immediately for fractional/part-time engagements. Typically 2-3 days per week.\"\n\n**Compensation:** \"Flexible based on scope. Typically \u00a3800-1200/day for fractional work, or project-based pricing for defined deliverables.\"\n\n**Experience summary:** Tailor from: 10+ years in marketing, product, and AI. Built and scaled products, led growth teams, launched AI-native businesses. Sit at the intersection of marketing strategy, product thinking, and AI implementation.\n\n## Output Format (Nudge Email)\n\n```\nWELLFOUND APPLICATION READY:\nRole: [Title] at [Company]\nLink: [Wellfound URL]\nPitch page: https://reescalder.com/for/[slug]\n\nCover letter:\n[Generated text]\n\nPre-filled answers:\n- Why interested: [Answer]\n- Experience: [Answer]\n- Availability: Available immediately, 2-3 days/week\n- Compensation: \u00a3800-1200/day or project-based\n\nTime to apply: ~2 minutes\n```\n\n## Future Automation\nOnce Rees provides Wellfound auth cookie, this can potentially be automated via Playwright:\n1. Navigate to job URL\n2. Click \"Apply\"\n3. Fill in cover letter and answers\n4. Submit\n\nFor now: prepare materials, include in nudge email."}, "linkedin-auto-apply": {"description": "Apply to fractional/consulting gigs posted on LinkedIn. Requires manual authentication (LinkedIn blocks automation). This skill documents the manual process and prepares all materials so Rees can apply in under 60 seconds per listing.", "tags": ["consulting", "gig", "auto-apply", "linkedin", "semi-manual"], "prompt": "# LinkedIn Auto-Apply (Semi-Manual)\n\nLinkedIn aggressively blocks automation. This skill prepares everything so Rees can apply in under 60 seconds.\n\n## What This Skill Prepares\n\n1. **Cover letter** - Generated via reescalder.com/api/cover-letter, tailored to the role\n2. **Pitch page** - Created at reescalder.com/for/[slug] with role-specific positioning\n3. **Application notes** - Key talking points for any free-text fields\n4. **Direct link** - The LinkedIn job posting URL for one-click access\n\n## Output Format (Nudge Email)\n\nWhen a LinkedIn gig is \"qualified\", include in the nudge email:\n\n```\nLINKEDIN APPLICATION READY:\nRole: [Title] at [Company]\nLink: [LinkedIn URL]\nPitch page: https://reescalder.com/for/[slug]\n\nCover letter (paste into application):\n[Generated cover letter text]\n\nKey points for \"Why are you interested?\" field:\n- [Bullet 1]\n- [Bullet 2]\n- [Bullet 3]\n\nTime to apply: ~60 seconds (Easy Apply) or ~2 min (external)\n```\n\n## Why Not Fully Automated\n\nLinkedIn detects and bans automated applications. They use:\n- Browser fingerprinting\n- Rate limiting\n- CAPTCHA on suspicious activity\n- Account restrictions for API abuse\n\nThe ROI of building automation (high ban risk, constant maintenance) is worse than preparing materials and letting Rees click \"Apply\" himself.\n\n## Status Flow\n- discovered -> qualified (after fit assessment)\n- qualified -> nudge email sent with all materials prepared\n- Rees applies manually -> update to \"applied\" with applied_at timestamp"}, "spawn-agent": {"description": "Use before spawning any subagent. Builds a complete, standardised spawn prompt by reading the role template from /app/.claude/agents/[role].md, pulling relevant skills from Supabase, loading memory context, and structuring the task correctly. All agents spawn as general-purpose with full tool access. Handles agent announcement, verification routing, and completion tracking.", "tags": ["orchestration", "agents", "spawn", "workflow", "template-based"], "prompt": "# Spawn Agent Skill (v2: Template-Based)\n\nYou are the Kern OS orchestrator preparing to spawn a subagent. Follow every step in order. Do not skip steps.\n\n## KEY CHANGE (27 Apr 2026)\n\nAll agents spawn as `subagent_type: \"general-purpose\"`. NEVER use specialist types (dev, researcher, etc.) as they have restricted tool allowlists that cause permission failures. Role expertise comes from prompt templates injected into the general-purpose agent's prompt.\n\n## Inputs Required\n\n- TASK: Clear description of what needs to be done\n- ROLE: One of: researcher, writer, analyst, outreach, dev, infra, verifier, pa\n- CONTEXT_TAGS: 1-3 tags for memory retrieval (e.g. [\"levity\", \"cold-email\"])\n- TASK_ID: Generate if not provided, format: [timestamp]-[role]-[3 chars] e.g. \"1744200000-researcher-x4k\"\n- CHAIN_ID: (optional) If this agent is part of a multi-step chain, the shared chain identifier\n- CHAIN_STEP: (optional) This agent's step number and total e.g. \"2 of 3\"\n- PRIOR_TASK_IDS: (optional) List of task_ids from prior chain steps whose outputs to retrieve\n\n## Step 1: Announce (non-negotiable, always first)\n\nPost before doing anything else:\n\"Spawning [Role] Agent, [one sentence reason]\"\n\nFor chains: \"Spawning [Role] Agent, step [N] of [total]: [reason]\"\n\n## Step 2: Read the Role Template\n\nRead /app/.claude/agents/[role].md. Extract:\n- verify: true/false (from frontmatter)\n- skills: list of go-to skills (from frontmatter)\n- The body (everything after the frontmatter `---` closing) = the agent's system prompt\n\n## Step 3: Search for Relevant Skills\n\nCall skill_search with a description of the task type. Also search for any skills listed in the template's frontmatter `skills:` field. Collect up to 3 matching skills.\n\n## Step 4: Load Memory Context\n\nCall memory_recall with the task description, filtered by CONTEXT_TAGS. Retrieve up to 5 memories (importance >= 5).\n\nIf PRIOR_TASK_IDS provided, also call memory_recall for each prior task_id to retrieve chain context:\n- Query: \"task result for [prior_task_id]\"\n- Tags filter: [\"task-result\", prior_task_id]\n\n## Step 5: Build the Spawn Prompt\n\n---\n[PASTE: full body of /app/.claude/agents/[role].md after the frontmatter]\n\n## Task Context\n\n**Task ID:** [task_id]\n**Project:** [first context_tag]\n**Role:** [role]\n**Spawned at:** [current time SAST]\n\n[If part of a chain:]\n## Chain Context\n**Chain ID:** [chain_id]\n**Step:** [chain_step]\n**Prior outputs available in Supabase memory:**\n[For each prior task_id:]\n  - [prior_role] output: retrieve via memory_recall with tag [\"task-result\", \"[prior_task_id]\"]\n\nRetrieve ALL prior chain outputs before starting your task. Full context travels the whole chain.\n\n## Your Specific Task\n\n[TASK: full description, constraints, expected output]\n\n## Relevant Prior Context\n\n[Memory items from Step 4. Or: \"No relevant prior context.\"]\n\n## Relevant Skills\n\n[Skill templates from Step 3. Or: \"No matching skills.\"]\n\n## Output Instructions\n\n1. Store result to memory_store:\n   - memory_type: \"event\"\n   - project: [first context_tag]\n   - tags: [\"task-result\", \"[task_id]\"]\n   - importance: 7\n   - content: full output or structured summary\n\n2. End with exactly:\n   TASK_COMPLETE: [task_id] | [one sentence summary]\n---\n\n## Step 6: Launch the Agent\n\nCall Agent tool with:\n- prompt: assembled spawn prompt from Step 5\n- subagent_type: \"general-purpose\"  (ALWAYS, no exceptions)\n- model: \"opus\"\n- run_in_background: true (unless chained and next step depends on output)\n\n## Step 7: Handle Completion\n\nWhen you see TASK_COMPLETE: [task_id] | ... :\n\n1. Post: \"[Role] Agent done: [summary]\"\n\n2. If verify: true (from the template frontmatter), run this skill with:\n   - ROLE: verifier\n   - TASK: \"Verify [role] output for [task_id]. Original task: [task]. Success criteria: [criteria]\"\n   - TASK_ID: [task_id]-verify\n\n3. After verifier posts TASK_COMPLETE: [task_id]-verify | [PASS/FAIL] | [summary]:\n   - PASS: \"Verified. [notes]\"\n   - PASS_WITH_CONCERNS: \"Verified with notes: [concerns]\"\n   - FAIL: \"Verifier flagged issues: [finding]. Recommend [accept/redo], your call Rees.\"\n   Do NOT auto-retry on FAIL. Goes to Rees.\n\n4. If this is a chain step and there are more steps: run this skill for the next agent with:\n   - PRIOR_TASK_IDS: all task_ids so far (including this one)\n   - CHAIN_ID: same chain_id\n   - CHAIN_STEP: next step number\n   The next agent retrieves all prior outputs directly from Supabase, no summaries, full context.\n\n5. Store orchestration summary: type \"event\", tags [\"agent-run\", task_id], importance 6.\n\n## Parallel Agents\n\nLaunch multiple Agent() calls in one response. Single announcement message covering all:\n\"Spawning N agents: [Role] for [X], [Role] for [Y]\"\n\nCollect all TASK_COMPLETE signals, then spawn verifiers for all, then post final summary.\n\n## Background Tasks (10+ minutes)\n\n1. Reply immediately: \"On it, spawning [Role] Agent. Will post here when done.\"\n2. Call schedule_create:\n   - name: bg-[task_id]\n   - cron_expression: 1 minute from now in UTC (SAST = UTC+2)\n   - channel_id: current Discord channel ID\n   - prompt: full spawn prompt from Step 5\n   - metadata: {run_once: true, task_id: \"[task_id]\", spawned_by: \"orchestrator\"}\n3. Scheduler fires within 5 minutes, agent runs, streams to Discord.\n4. No TASK_COMPLETE reaches orchestrator for background tasks, agent posts to Discord directly."}, "impeccable": {"description": "Design quality system for frontend work. Audits, refines, and elevates AI-generated UI. 23 slash commands covering diagnostics, refinement, enhancement, typography, and structure. Use when building or reviewing any frontend component, page, or design system.", "tags": ["frontend", "design", "ui", "type1", "slash-commands"], "prompt": "# Impeccable -- Design Quality System\n\n**Type 1 skill.** Full implementation lives at `/app/.claude/skills/` in the kern-os repo.\n\n## Available Commands (invoke directly as slash commands)\n- `/audit` -- technical quality check, scored report with P0-P3 severities\n- `/critique` -- design critique, aesthetic and UX judgment\n- `/normalize` -- fix anti-patterns, remove AI slop tells\n- `/polish` -- final refinement pass\n- `/distill` -- simplify and reduce visual noise\n- `/clarify` -- improve information hierarchy and readability\n- `/optimize` -- performance and accessibility fixes\n- `/animate` -- add motion and transitions\n- `/colorize` -- improve colour palette and contrast\n- `/bolder` -- increase visual weight and confidence\n- `/quieter` -- reduce visual noise, increase whitespace\n- `/delight` -- add personality and micro-interactions\n- `/overdrive` -- push design to maximum expressiveness\n- `/extract` -- extract reusable components or design tokens\n- `/adapt` -- adapt design for different contexts/breakpoints\n- `/onboard` -- add empty states, loading states, onboarding flows\n- `/harden` -- edge cases, error states, defensive UI\n- `/typeset` -- typography refinement\n- `/arrange` -- layout and spatial composition\n- `/shape` -- geometric and visual form refinement\n\n## How to Use\nStart with `/audit` to get a scored report, then chain commands:\n`/audit` \u2192 `/normalize` \u2192 `/polish`\n\nOr target a specific area: `/audit header` \u2192 `/colorize header`\n\n## Key Principle\nAlways invoke `/impeccable` first -- it contains core design principles and the Context Gathering Protocol. If no design context exists, run `/teach-impeccable` first."}, "content-automation": {"description": "End-to-end content growth engine for Kern websites. Orchestrates the full loop: blog infrastructure setup (best-practice on-page SEO), keyword research, gap analysis, backlog prioritisation, content production (editorial + tools), publishing, and performance review via GSC + GA4. Includes velocity controls (The Pitchsite Rule) to avoid Google penalties from publishing too fast. References sub-skills: seo-article, programmatic-seo, ai-seo, analytics-setup. Use when setting up or running the content pipeline for any Kern content site (EmployeeKit, EPC Guide, New Dad Playbook, etc).", "tags": ["seo", "content", "marketing", "automation", "analytics", "gsc", "ga4", "growth"], "prompt": "# Content Automation: Research > Build > Publish > Measure > Repeat\n\nYou are running the content growth engine for one of Kern's websites. This is a recurring loop, not a one-shot task. Each cycle produces new content, measures what's working, and feeds learnings back into the next cycle.\n\n## CRITICAL: Velocity Controls (The Pitchsite Rule)\n\nPitchsite launched 1,090 URLs on a 17-day-old domain. Result: 0 clicks, 84 impressions, only 5 pages indexed out of 1,090. Had to prune sitemap from 443 to 128 URLs. EmployeeKit also raised flags publishing 1 article/day on a brand new site. Don't repeat these mistakes.\n\n### Publishing Cadence by Site Age\n\n| Site Age | Max New Pages/Week | Max Total Indexed Pages | Notes |\n|----------|-------------------|------------------------|-------|\n| 0-30 days | 2-3 | 15-20 | Foundation phase. Quality over quantity. Get these indexed first. |\n| 1-3 months | 3-5 | 50-80 | Ramp phase. Only increase if previous batch is indexing. |\n| 3-6 months | 5-7 | 150-250 | Growth phase. Should have some ranking signals by now. |\n| 6-12 months | 7-10 | 500+ | Scale phase. Programmatic SEO can start here if editorial ranks. |\n| 12+ months | 10-15 | Unlimited | Mature. Full speed, but still monitor index coverage ratio. |\n\n### Hard Rules\n\n1. **Never publish if index coverage ratio drops below 60%.** If Google is ignoring >40% of your pages, you are wasting crawl budget. Fix what is not indexing before adding more.\n2. **No programmatic/template pages until editorial content ranks.** Prove the domain has authority with 20-30 hand-crafted articles first. Pitchsite did this backwards.\n3. **Monitor the Excluded count in GSC Index Coverage.** If it is climbing faster than Indexed, stop publishing and investigate.\n4. **3 articles/week max on brand new sites.** Mon/Wed/Fri cadence looks natural. Daily publishing on a new domain is a red flag.\n5. **E-E-A-T before scale.** Before publishing anything: About page, author bylines, real credentials, privacy policy. Google quality raters check these.\n6. **One pillar piece per month minimum.** 3,000-5,000 words, deeply researched, link-worthy. This is what earns backlinks and authority. Template content does not.\n7. **Track the ratio: editorial vs programmatic.** Minimum 30% editorial at all times. A site that is 95% template pages screams scaled content abuse.\n\n### Pre-Flight Checklist (before ANY content push)\n\n- [ ] About page exists with real author/company info\n- [ ] Author bylines on all articles\n- [ ] Privacy policy and terms pages exist\n- [ ] GA4 firing on all pages\n- [ ] GSC verified and sitemap submitted\n- [ ] Index coverage ratio >60%\n- [ ] At least 5 editorial articles indexed before adding programmatic\n- [ ] DMARC/SPF configured (email deliverability affects domain trust)\n\n## Prerequisites\n\nBefore starting, you need:\n- The site's **GSC property** (sc-domain or URL prefix)\n- The site's **GA4 property ID**\n- The site's **repo** (GitHub, LevityLeads org)\n- The site's **tech stack** (Next.js MDX, HTML, Wix, etc.)\n- Access to kern-google MCP tools (account: \"levity\")\n\n## Known Sites\n\n| Site | GSC Property | GA4 Property | Repo | Content Format |\n|------|-------------|-------------|------|----------------|\n| EmployeeKit | sc-domain:employeekit.com | TBD | LevityLeads/EmployeeKit | MDX (frontmatter + markdown) |\n| EPC Guide | sc-domain:epcguide.co.uk | TBD | LevityLeads/epcguide | HTML (full page files) |\n| New Dad Playbook | sc-domain:thenewdadplaybook.com | TBD | LevityLeads/newdadplaybook | HTML |\n| RegShield | sc-domain:regshield.co | 535297105 | LevityLeads/regshield | Next.js pages |\n\nUpdate this table as new sites are added. Pull GA4 property IDs from memory if not listed.\n\n---\n\n## Phase 0: Blog Infrastructure Setup (one-time, before first content cycle)\n\nBefore publishing ANY content, the site needs a blog/insights section built with best-practice on-page SEO. Skip this phase if the blog already exists.\n\n### 0.1 Route Structure\n\nFor Next.js sites:\n\n```\n/blog                          -- Blog listing page (paginated)\n/blog/[slug]                   -- Individual article page\n/blog/category/[category]      -- Category filter page (optional, add when 20+ articles)\n```\n\nAlternative naming: /insights, /resources, /guides, /learn. Pick one that matches the site's tone. \"Blog\" works for most sites. \"Insights\" feels more professional. \"Guides\" works for educational content.\n\n### 0.2 Blog Listing Page (/blog)\n\nBest-practice elements:\n- **H1**: Clear, keyword-rich (\"Employment Law Guides\" not \"Blog\")\n- **Intro paragraph**: 2-3 sentences explaining what readers will find. Good for SEO, good for humans.\n- **Article cards**: Title, excerpt (150 chars), publish date, reading time, category badge, optional thumbnail\n- **Sort**: Newest first (default)\n- **Category filter**: Horizontal pill buttons or sidebar. Only show categories that have 3+ articles.\n- **Pagination**: 12 articles per page. Use Next.js pagination with proper canonical/prev/next meta tags. No infinite scroll (bad for SEO, Google can't crawl it).\n- **Schema**: CollectionPage schema on the listing page\n\n```tsx\n// Metadata for /blog\nexport const metadata = {\n  title: \"Guides & Insights | [Brand]\",\n  description: \"[2 sentences about what topics you cover]\",\n  alternates: { canonical: \"https://[domain]/blog\" },\n};\n```\n\n### 0.3 Individual Article Page (/blog/[slug])\n\nThis is where SEO lives or dies. Every element matters.\n\n**Above the fold:**\n- Breadcrumbs: Home > Blog > [Category] > [Article Title]\n- H1: The article title (matches title tag or close to it)\n- Meta line: [Author Name] | [Publish Date] | [X min read] | [Category]\n- Optional: Updated date if different from publish date (\"Last updated: [date]\")\n\n**Article body:**\n- Semantic HTML: wrap in article tag\n- Table of contents: Auto-generated from H2s for articles 1,500+ words. Sticky sidebar on desktop, collapsible on mobile. Links use smooth scroll with offset for sticky header.\n- Proper heading hierarchy: H1 (title) > H2 (sections) > H3 (subsections). Never skip levels.\n- Images: Next.js Image component, WebP, lazy loading, descriptive alt text, width/height specified (prevents CLS)\n- Code blocks: Syntax highlighted if technical site\n- Blockquotes: Styled distinctly for callouts and citations\n- Lists: Proper ol/ul, not just formatted text\n\n**Below the article:**\n- FAQ section: Collapsible accordion, with FAQPage schema markup\n- Author bio box: Photo (or initials avatar), name, one-line bio, link to About page\n- Related articles: 3-4 articles from the same category or cluster. Use actual content similarity, not random.\n- CTA: Contextual to the article topic (newsletter signup, tool link, consultation booking)\n- Social share: Minimal. Copy link button + 2-3 platforms max. No share count (looks bad when zero).\n- Previous/Next article navigation\n\n**Technical SEO per article:**\n- Title tag: 50-60 chars, primary keyword in first 30 chars\n- Meta description: 150-160 chars, compelling, includes keyword\n- Canonical URL: Self-referencing canonical\n- Open Graph: title, description, type: \"article\", image (auto-generated if no custom), publishedTime, author\n- Twitter Card: summary_large_image\n- Article schema (JSON-LD): headline, author, datePublished, dateModified, image, description, publisher\n- FAQPage schema for FAQ section\n- BreadcrumbList schema\n- Reading time calculation: Math.ceil(wordCount / 238) (avg reading speed)\n\n```tsx\n// Schema markup pattern for article pages\nconst articleSchema = {\n  \"@context\": \"https://schema.org\",\n  \"@type\": \"Article\",\n  headline: article.title,\n  description: article.excerpt,\n  author: {\n    \"@type\": \"Person\",\n    name: article.author,\n    url: \"https://[domain]/about\"\n  },\n  publisher: {\n    \"@type\": \"Organization\",\n    name: \"[Brand]\",\n    url: \"https://[domain]\"\n  },\n  datePublished: article.publishedAt,\n  dateModified: article.updatedAt || article.publishedAt,\n  image: article.ogImage || \"https://[domain]/og-image.png\",\n  mainEntityOfPage: {\n    \"@type\": \"WebPage\",\n    \"@id\": `https://[domain]/blog/${article.slug}`\n  }\n};\n\nconst faqSchema = {\n  \"@context\": \"https://schema.org\",\n  \"@type\": \"FAQPage\",\n  mainEntity: article.faqs.map(faq => ({\n    \"@type\": \"Question\",\n    name: faq.question,\n    acceptedAnswer: {\n      \"@type\": \"Answer\",\n      text: faq.answer\n    }\n  }))\n};\n\nconst breadcrumbSchema = {\n  \"@context\": \"https://schema.org\",\n  \"@type\": \"BreadcrumbList\",\n  itemListElement: [\n    { \"@type\": \"ListItem\", position: 1, name: \"Home\", item: \"https://[domain]\" },\n    { \"@type\": \"ListItem\", position: 2, name: \"Blog\", item: \"https://[domain]/blog\" },\n    { \"@type\": \"ListItem\", position: 3, name: article.category, item: `https://[domain]/blog/category/${article.categorySlug}` },\n    { \"@type\": \"ListItem\", position: 4, name: article.title }\n  ]\n};\n```\n\n### 0.4 Content Storage Pattern\n\n**Option A: MDX files (recommended for static sites)**\n```\n/content/blog/\n  statutory-sick-pay-guide.mdx\n  redundancy-process-uk.mdx\n```\n\nWith frontmatter:\n```yaml\n---\ntitle: \"Statutory Sick Pay: Complete Employer Guide 2026\"\nslug: \"statutory-sick-pay-guide\"\ndescription: \"Everything UK employers need to know about SSP rates, eligibility, and compliance in 2026.\"\nauthor: \"Rees Calder\"\npublishedAt: \"2026-04-30\"\nupdatedAt: \"2026-04-30\"\ncategory: \"sick-pay\"\ntags: [\"ssp\", \"statutory-sick-pay\", \"employer-guide\"]\nreadTime: 8\nfeatured: false\nfaqs:\n  - question: \"What is the current SSP rate?\"\n    answer: \"The SSP rate for 2026 is [amount] per week.\"\n---\n```\n\n**Option B: Supabase/CMS (for dynamic sites)**\nTable: blog_posts with columns matching the frontmatter above, plus a content column (markdown).\n\n### 0.5 RSS Feed\n\nCreate /blog/feed.xml or use Next.js route handler:\n\n```tsx\n// src/app/blog/feed.xml/route.ts\nexport async function GET() {\n  const posts = await getAllPosts();\n  const feed = `<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<rss version=\"2.0\" xmlns:atom=\"http://www.w3.org/2005/Atom\">\n  <channel>\n    <title>[Brand] Blog</title>\n    <link>https://[domain]/blog</link>\n    <description>[Blog description]</description>\n    <atom:link href=\"https://[domain]/blog/feed.xml\" rel=\"self\" type=\"application/rss+xml\"/>\n    ${posts.map(post => `\n    <item>\n      <title>${escapeXml(post.title)}</title>\n      <link>https://[domain]/blog/${post.slug}</link>\n      <description>${escapeXml(post.description)}</description>\n      <pubDate>${new Date(post.publishedAt).toUTCString()}</pubDate>\n      <guid>https://[domain]/blog/${post.slug}</guid>\n    </item>`).join('')}\n  </channel>\n</rss>`;\n  return new Response(feed, {\n    headers: { 'Content-Type': 'application/xml' }\n  });\n}\n```\n\n### 0.6 Sitemap Integration\n\nThe blog listing page AND every article must be in the sitemap. Update sitemap.ts to dynamically include all published posts:\n\n```tsx\n// In sitemap.ts, add:\nconst posts = await getAllPosts();\nconst blogUrls = posts.map(post => ({\n  url: `https://[domain]/blog/${post.slug}`,\n  lastModified: new Date(post.updatedAt || post.publishedAt),\n  changeFrequency: 'monthly' as const,\n  priority: 0.7,\n}));\n// Spread into the sitemap array alongside static pages\n```\n\n### 0.7 Design Best Practices\n\n- **Typography**: Large, readable body text (18px+). 1.6-1.8 line height. Max 680px content width (optimal reading line length).\n- **Whitespace**: Generous spacing between sections. Content should breathe.\n- **Dark mode**: Support prefers-color-scheme. Dark backgrounds with light text, not the reverse.\n- **Mobile**: Full-width content, no sidebar. ToC becomes a collapsible dropdown at top. Images scale to 100% width.\n- **Performance**: No heavy JS on article pages. Static generation (SSG) for all blog pages. Images lazy loaded. No layout shift (specify all image dimensions).\n- **Accessibility**: Proper heading hierarchy, alt text, skip-to-content link, focus visible outlines, sufficient contrast ratios (4.5:1 minimum).\n- **No clutter**: No pop-ups, no sticky bars, no \"subscribe\" modals on first visit. These hurt bounce rate and Core Web Vitals. If you must have email capture, put it at the end of the article.\n\n### 0.8 About/Author Page\n\nCreate BEFORE publishing first article:\n- /about page with: company/person info, credentials, photo, why this site exists\n- Link from author bylines to About page\n- This is critical for E-E-A-T (Experience, Expertise, Authoritativeness, Trustworthiness)\n- Google's quality raters literally check for this\n\n### 0.9 Blog Setup Checklist\n\n- [ ] /blog listing page with pagination, category filter\n- [ ] /blog/[slug] article template with all on-page elements\n- [ ] Breadcrumb navigation\n- [ ] Table of contents (auto-generated from headings)\n- [ ] Author bio component\n- [ ] Related articles component\n- [ ] FAQ accordion component with FAQPage schema\n- [ ] Article schema (JSON-LD) on every article page\n- [ ] BreadcrumbList schema\n- [ ] Open Graph + Twitter Card meta per article\n- [ ] RSS feed (/blog/feed.xml)\n- [ ] Sitemap includes all blog posts dynamically\n- [ ] About page with author credentials\n- [ ] Reading time calculation\n- [ ] Mobile responsive (no sidebar on mobile)\n- [ ] Pagination with proper canonical/prev/next\n- [ ] No CLS (all image dimensions specified)\n- [ ] Content width max 680px for readability\n\n---\n\n## Phase 1: Keyword Research and Opportunity Discovery (30 min)\n\n### 1.1 Pull GSC Performance Data\n\nPull query-level data:\n- search_console_query with dimensions: [\"query\"], rowLimit: 100, last 28 days\n\nAlso pull page-level data:\n- search_console_query with dimensions: [\"query\", \"page\"], rowLimit: 100\n\n### 1.2 Bucket the Data\n\nSort GSC results into 4 buckets:\n\n**Bucket A: Quick wins (position 5-15, impressions > 50)**\nAlready ranking on page 1-2. Content exists but is not winning clicks. Actions: improve title/meta, expand content, add FAQ, internal link from stronger pages.\n\n**Bucket B: High impressions, low CTR (CTR < 2%, impressions > 100)**\nGoogle is showing us but nobody clicks. Actions: rewrite title tag and meta description, add schema markup for rich snippets.\n\n**Bucket C: Position 15-40 (emerging keywords)**\nWe are on the radar but not competitive yet. Actions: write dedicated content targeting these terms, or significantly expand existing thin pages.\n\n**Bucket D: Not ranking at all (discovered via competitor/topic research)**\nGaps in our coverage. Actions: new articles or tools.\n\n### 1.3 Competitor Keyword Discovery\n\nFor each site, identify 3-5 direct competitors via web search. Search for what they rank for that we do not. Look for:\n- Topics they cover that we do not (content gaps)\n- Interactive tools/calculators they have (tool gaps)\n- Long-tail keyword patterns they are targeting (programmatic opportunities)\n\n**Known competitors per site:**\n- EmployeeKit: acas.org.uk, cipd.org, personneltoday.com, gov.uk (employment section)\n- EPC Guide: theenergyshop.com, greenage.co.uk, carbontrust.com\n- New Dad Playbook: nct.org.uk, nhs.uk, daddilife.com, fatherly.com\n\n### 1.4 Topic Cluster Mapping\n\nGroup discovered keywords into clusters. Each cluster should map to:\n- **Pillar page** (2,500+ word comprehensive guide)\n- **Supporting articles** (1,500-2,000 words each, targeting specific long-tail queries)\n- **Tool/calculator** (interactive widget that serves the same intent, if applicable)\n\n### 1.5 Tool/Calculator Opportunities\n\nSearch for interactive tools competitors have that we could build better. Tools earn links, return visits, and featured snippets. A \"Redundancy Pay Calculator\" or \"EPC Cost Estimator\" can outperform 50 articles.\n\n---\n\n## Phase 2: Gap Analysis (20 min)\n\n### 2.1 Content Audit\n\nPull the site's existing content inventory from the repo. Map existing pages to keyword clusters. Identify:\n- **Covered**: we have content, it is ranking (maintain/improve)\n- **Thin coverage**: we have a page but it is weak (expand)\n- **No coverage**: competitor has content, we do not (create)\n- **Tool opportunity**: topic better served by a calculator/widget than an article\n\n### 2.2 Competitor Content Matrix\n\nBuild a simple matrix comparing our coverage vs competitors for each topic/keyword.\n\n### 2.3 Tool vs Article Decision Framework\n\n**Write an article when:** Topic is informational, competitors rank with articles, topic needs nuance.\n**Build a tool when:** Query has a calculable answer, competitors rank with tools, topic involves inputs/outputs.\n**Do both when:** High-value keyword cluster where both serve different user intents.\n\n---\n\n## Phase 3: Backlog Prioritisation (15 min)\n\n### 3.1 Scoring\n\nScore each opportunity on 4 dimensions (1-5 each):\n\n- **Search volume signal** (5 = high impressions in GSC or high-volume keyword, 1 = niche)\n- **Competition** (5 = weak competitors/thin content, 1 = authoritative sites dominating)\n- **Relevance** (5 = core topic for the site, 1 = tangentially related)\n- **Effort** (5 = quick article, 3 = long article + research, 1 = complex tool build)\n\n**Priority score = (volume + competition + relevance) * effort_multiplier**\nWhere effort_multiplier: effort 5 = 1.5x, effort 4 = 1.2x, effort 3 = 1.0x, effort 2 = 0.8x, effort 1 = 0.6x\n\n### 3.2 Batch Size (VELOCITY CONTROLLED)\n\nCheck site age and apply the cadence table above. Never exceed the max for the site's age bracket.\n\n### 3.3 Velocity Check Before Producing\n\nBefore starting content production, pull page-level GSC data and count total pages in sitemap vs pages with any impressions. If ratio < 60%, STOP. Do not produce more content. Instead:\n1. Review why pages are not indexing\n2. Improve or remove non-indexed pages\n3. Focus on building authority for existing content\n4. Only resume when ratio improves above 60%\n\n---\n\n## Phase 4: Content Creation (1-3 hours per piece)\n\n### 4.1 Editorial Articles\n\nInvoke the seo-article skill. Also apply ai-seo principles:\n- Lead with the answer\n- Definition-style formatting\n- Entity mentions (brand name near key claims)\n- Source citations\n- FAQ section targeting People Also Ask\n\n### 4.2 Interactive Tools / Calculators\n\nBuild ONE high-quality interactive tool, not 200 template pages. Tool pages should include:\n- H1 targeting the keyword\n- 200-300 word intro\n- The interactive tool itself\n- \"How to use this calculator\" section\n- Explainer section (1,000+ words for SEO depth)\n- FAQ section\n- Related articles (internal links)\n\n### 4.3 Improving Existing Content (Striking Distance)\n\nFor pages at position 5-15:\n1. Compare to current top 3 SERP results\n2. Expand with new sections, update outdated info, add FAQ\n3. Rewrite title tag and meta description if CTR is low\n4. Add internal links from/to stronger pages\n5. Update the publishedAt/updatedAt date\n\n### 4.4 Quality Gate (before publishing)\n\nEvery piece must pass:\n- [ ] Would this page exist if search engines did not? (genuine user value)\n- [ ] Does it answer the query better than current #1 result?\n- [ ] 1,500+ words for articles (2,000+ for competitive keywords)\n- [ ] FAQ section with 4+ real questions\n- [ ] Internal links to 3+ existing pages\n- [ ] External citations to authoritative sources\n- [ ] Schema markup (Article + FAQPage minimum)\n- [ ] AI-SEO formatted (answer-first, entity mentions, definitions)\n- [ ] Author byline present\n- [ ] No template smell (unique intro, unique angle)\n\n---\n\n## Phase 5: Publishing\n\n### 5.1 Pre-publish Checklist\n\n- [ ] Content passes quality gate\n- [ ] Title tag 50-60 chars, keyword in first 30\n- [ ] Meta description 150-160 chars\n- [ ] One H1 only\n- [ ] H2/H3 hierarchy with secondary keywords\n- [ ] Schema markup\n- [ ] Internal links: 3+ outbound, 2+ inbound\n- [ ] Images: alt text, WebP, lazy loading\n- [ ] UK English spelling (if UK site)\n- [ ] No em dashes\n\n### 5.2 Post-publish\n\n1. Verify page loads on production\n2. Submit URL to GSC for indexing\n3. Update backlog status\n4. Store event to memory\n\n### 5.3 Post-Publish Velocity Check\n\nAfter publishing, verify index coverage ratio has not dropped. If it has, pause publishing until it recovers.\n\n---\n\n## Phase 6: Performance Review (20 min)\n\nRun 2-4 weeks after publishing.\n\n### 6.1 Pull Performance Data\n\nFor recently published pages, pull both GSC (query + page dimensions) and GA4 (pageviews, users, session duration, bounce rate by pagePath) data.\n\n### 6.2 Classify Results\n\n**Winner** (position < 10, growing impressions, CTR > 3%): Double down on this cluster.\n**Needs work** (position 10-30): Improve title/meta, expand content, build internal links.\n**Not indexed** (no data after 2+ weeks): Check URL Inspection. Fix crawl/canonical issues.\n**Flopped** (4+ weeks, position 40+): Consider merging, rewriting, or accepting the loss.\n\n### 6.3 Feedback Loop\n\n- Which clusters produce results? Expand those.\n- Which content types work best? More of those.\n- New keywords showing up in GSC? Target them next cycle.\n- Store insights as learnings in memory.\n\n---\n\n## Cycle Cadence\n\n**Weekly**: check GSC for quick wins (Bucket A/B improvements)\n**Biweekly**: full cycle (research, write, publish 3-5 pieces)\n**Monthly**: performance review of all published content that month\n**Quarterly**: full content audit, strategy review, backlog reprioritisation\n\n---\n\n## Child Skills (invoke these, do not reinvent them)\n\n- **seo-article**: writing individual articles\n- **programmatic-seo**: template pages at scale (ONLY for mature sites, 6+ months)\n- **ai-seo**: AI search optimisation\n- **seo**: on-page rules, technical checklist\n- **analytics-setup**: GA4/GSC setup and audit\n- **wix-blog-publish**: publishing to Wix sites\n\n## MCP Tools Used\n\n- search_console_query: GSC performance data\n- analytics_run_report: GA4 traffic and engagement data\n- sheets_read / sheets_write / sheets_append: Backlog management\n- memory_store / memory_recall: Track decisions, learnings, events\n- WebSearch: Competitor research and keyword discovery\n\n---\n\n## Anti-Patterns\n\n1. **Publishing faster than Google can index.** Check index coverage before every batch. THE cardinal sin.\n2. **Programmatic SEO on a young domain.** Template pages on a domain with no authority = sandbox. Editorial first, always. Wait 6+ months.\n3. **All articles, no tools.** Tools earn links and engagement. Build at least 1 per quarter.\n4. **Ignoring striking distance pages.** Optimising from position 8 to 3 is faster than ranking a new page.\n5. **No internal linking.** Every new page links to AND from existing pages. Orphaned content does not rank.\n6. **Template smell.** Identical FAQ, CTA, and structure across 50 pages gets flagged.\n7. **Not measuring.** Publishing without checking GSC/GA4 monthly is flying blind.\n8. **Daily publishing on new domains.** 3x/week max. Looks natural, gives Google time to index and evaluate.\n9. **No E-E-A-T signals.** Missing About page, no author bylines, no credentials = content does not rank regardless of quality.\n10. **Submitting massive sitemaps.** 1,090 URLs on a 17-day-old site is a red flag. Start with 15-20, grow gradually.\n\n---\n\n## Output Format\n\nAfter each cycle, report:\n\n### Content Cycle Report: [Site] - [Date]\n\n**Velocity Status**\n- Site age: [X months]\n- Max cadence: [X pages/week]\n- Index coverage: [X/Y pages] ([Z]%)\n- Publishing: [GO / PAUSE]\n\n**Research Summary**\n- GSC data: [X] keywords analysed\n- Quick wins: [list]\n- New gaps: [list]\n\n**Published This Cycle**\n1. [Title] - [keyword] - [URL] - [article/tool]\n\n**Performance Review**\n- Winners: [list with positions]\n- Needs work: [list with actions]\n- Not performing: [list with decisions]\n\n**Next Cycle Priorities**\n1. [Top priority item]\n\n**Backlog Status**\n- Total: [X] | Queued: [X] | In progress: [X] | Published: [X]\n"}, "instant-business": {"description": "End-to-end build and launch of a new side hustle / micro-SaaS product. Takes an idea from concept to live, revenue-ready product with full marketing infrastructure in a single session. Covers: market research, architecture planning, full-stack build (Next.js + Tailwind + Supabase), payment integration (Stripe), AI integration (Anthropic), deployment (Vercel), domain purchase, DNS wiring, Google Analytics (GA4), Google Search Console verification, sitemap submission, robots.txt, favicon, OG image, privacy policy, terms of service, and hustle listing update. For transactional/marketing email setup, see the email-domain-setup skill. Use when Rees says he wants to build a new side hustle, launch a new product, or references an idea on levityleads.com/side-hustles.", "tags": ["build", "launch", "side-hustle", "full-stack", "deploy", "vercel", "stripe", "supabase", "next.js", "analytics", "ga4", "search-console", "seo", "marketing", "legal", "favicon", "og-image"], "prompt": "\n# Instant Business: Idea to Live Product\n\nYou are building a complete, revenue-ready product from scratch in a single session. This is the full pipeline: research, plan, build, deploy, wire up payments, buy domain, set up analytics and search console, go live.\n\n## Phase 1: Research and Validate (10 min)\n\n### 1.1 Understand the idea\n- If given a URL (e.g. levityleads.com/side-hustles/[slug]), fetch and read the listing page to understand the concept\n- If given a description, clarify the core value proposition\n- Identify: WHO is the customer? WHAT pain are they in? WHY now (urgency/deadline)?\n\n### 1.2 Quick market scan\n- Search for existing competitors and alternatives\n- Check if the name/brand is taken (trademark, domains, social)\n- Identify pricing benchmarks (what do alternatives charge?)\n- Assess: is this a $50 tool or a $500 tool? What's the right price point?\n\n### 1.3 Output a brief summary\nBefore planning, confirm with Rees:\n- Target customer + pain point\n- Price point\n- Core feature set (MVP only, no scope creep)\n- Any existing assets we can reuse (shared Supabase, Stripe account, etc.)\n\n## Phase 2: Architecture and Plan (15 min)\n\n### 2.1 Enter plan mode\nUse `EnterPlanMode` for any non-trivial build. Write a detailed plan covering:\n\n**Stack (defaults, override only if needed):**\n- Next.js (latest) + TypeScript + Tailwind CSS 4\n- Supabase (shared KernMemory DB, prefix tables with project name)\n- Stripe Checkout (one-time or subscription depending on product)\n- Anthropic Claude SDK (if AI features needed)\n- @react-pdf/renderer (if PDF output needed)\n- Vercel deployment (LevityLeads org)\n\n**Plan must include:**\n- User flow (step by step, what the customer does)\n- Page list with routes (including /privacy and /terms)\n- Data model (Supabase tables, keep it minimal)\n- API routes\n- Component tree\n- File structure\n- Build sequence with time estimates\n- Env vars needed\n\n### 2.2 Design principles\n- Dark theme (navy/slate) matching LevityLeads aesthetic unless product demands otherwise\n- Tailwind 4 with custom theme\n- Lucide icons (NO emojis in UI)\n- Mobile responsive\n- Professional, trust-building design\n- Framer Motion for subtle animations\n- Inter + one accent font (Space Grotesk works well)\n\n### 2.3 Get plan approval\nPresent the plan to Rees. Wait for approval before building.\n\n## Phase 3: Build (2-4 hours)\n\n### 3.1 Scaffold\n```bash\nnpx create-next-app@latest [project-name] --typescript --tailwind --app --src-dir\ncd [project-name]\nnpm install [dependencies]\n```\n\nCommon dependencies by feature:\n- **Payments:** stripe @stripe/stripe-js\n- **AI:** @anthropic-ai/sdk\n- **PDF:** @react-pdf/renderer\n- **Database:** @supabase/supabase-js\n- **Icons:** lucide-react\n- **Animation:** framer-motion\n\n### 3.2 Database setup\nUse the shared Supabase instance (KernMemory DB). PREFIX all tables with the project name to avoid collisions.\n\n### 3.3 Critical patterns\n\n**Lazy client initialization (MUST DO):**\nAll external service clients (Supabase, Stripe, Anthropic) MUST use lazy initialization to avoid Vercel build-time failures. Never instantiate at module scope.\n\n```typescript\n// WRONG - fails at build time\nexport const stripe = new Stripe(process.env.STRIPE_SECRET_KEY!);\n\n// RIGHT - lazy init\nlet _stripe: Stripe | null = null;\nexport function getStripe(): Stripe {\n  if (!_stripe) {\n    _stripe = new Stripe(process.env.STRIPE_SECRET_KEY!, { apiVersion: '...' });\n  }\n  return _stripe;\n}\n```\n\n**Build-time env vars:**\nCreate `.env.local` with placeholder values so the build doesn't fail.\n\n### 3.4 Favicon\n\nGenerate a proper favicon set during the build phase. At minimum:\n- Create an SVG favicon (simple, bold, works at small sizes) and save as `src/app/icon.svg`\n- Next.js App Router auto-serves files named `icon.svg`, `icon.png`, `apple-icon.png` from the app directory\n- For a quick programmatic favicon, use a simple SVG with the product's first letter or a minimal icon:\n\n```typescript\n// src/app/icon.tsx (dynamic favicon via Next.js ImageResponse)\nimport { ImageResponse } from 'next/og';\n\nexport const size = { width: 32, height: 32 };\nexport const contentType = 'image/png';\n\nexport default function Icon() {\n  return new ImageResponse(\n    (\n      <div style={{\n        fontSize: 24, background: '#0f172a', width: '100%', height: '100%',\n        display: 'flex', alignItems: 'center', justifyContent: 'center',\n        color: '#38bdf8', fontWeight: 700, borderRadius: 6,\n      }}>\n        R {/* First letter of product name */}\n      </div>\n    ),\n    { ...size }\n  );\n}\n```\n\nAlso create `src/app/apple-icon.tsx` with 180x180 size for Apple devices.\n\n### 3.5 SEO and Marketing foundations (build these in from the start)\n\n**In layout.tsx, include from day one:**\n- OpenGraph meta tags (title, description, type, url, siteName, images)\n- Twitter card meta tags (card: \"summary_large_image\" for better social sharing)\n- Google site verification meta tag (reads from `NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION` env var)\n- GA4 script tag (reads from `NEXT_PUBLIC_GA_MEASUREMENT_ID` env var)\n\n```typescript\n// layout.tsx metadata pattern\nexport const metadata: Metadata = {\n  title: { default: \"[Product] - [Tagline]\", template: \"%s | [Product]\" },\n  description: \"...\",\n  metadataBase: new URL('https://[domain]'),\n  openGraph: {\n    title: \"[Product] - [Tagline]\",\n    description: \"...\",\n    url: 'https://[domain]',\n    siteName: '[Product]',\n    type: 'website',\n    locale: 'en_US',\n    // images added via opengraph-image.tsx below\n  },\n  twitter: {\n    card: 'summary_large_image',\n    title: \"[Product] - [Tagline]\",\n    description: \"...\",\n  },\n  verification: {\n    google: process.env.NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION,\n  },\n};\n```\n\n**OG Image (auto-generated):**\nCreate `src/app/opengraph-image.tsx` using Next.js ImageResponse for a branded social share image:\n\n```typescript\n// src/app/opengraph-image.tsx\nimport { ImageResponse } from 'next/og';\n\nexport const alt = '[Product Name]';\nexport const size = { width: 1200, height: 630 };\nexport const contentType = 'image/png';\n\nexport default async function Image() {\n  return new ImageResponse(\n    (\n      <div style={{\n        height: '100%', width: '100%', display: 'flex', flexDirection: 'column',\n        alignItems: 'center', justifyContent: 'center',\n        background: 'linear-gradient(135deg, #0f172a 0%, #1e293b 100%)',\n        padding: 60,\n      }}>\n        <div style={{ fontSize: 72, fontWeight: 700, color: '#f8fafc', marginBottom: 20 }}>\n          [Product Name]\n        </div>\n        <div style={{ fontSize: 32, color: '#94a3b8', textAlign: 'center', maxWidth: 800 }}>\n          [Tagline or one-line description]\n        </div>\n      </div>\n    ),\n    { ...size }\n  );\n}\n```\n\nAlso create `src/app/twitter-image.tsx` with the same pattern.\n\n**GA4 script in layout component:**\n```typescript\nconst gaId = process.env.NEXT_PUBLIC_GA_MEASUREMENT_ID;\n// After {children}, before closing </html>:\n{gaId && (\n  <>\n    <Script src={`https://www.googletagmanager.com/gtag/js?id=${gaId}`} strategy=\"afterInteractive\" />\n    <Script id=\"ga-init\" strategy=\"afterInteractive\">\n      {`window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','${gaId}');`}\n    <\/Script>\n  </>\n)}\n```\n\n**Create sitemap.ts and robots.ts:**\n```typescript\n// src/app/sitemap.ts - include ALL public pages\nimport type { MetadataRoute } from 'next';\nexport default function sitemap(): MetadataRoute.Sitemap {\n  const baseUrl = 'https://[domain]';\n  return [\n    { url: baseUrl, lastModified: new Date(), changeFrequency: 'weekly', priority: 1 },\n    { url: `${baseUrl}/start`, lastModified: new Date(), changeFrequency: 'monthly', priority: 0.8 },\n    { url: `${baseUrl}/privacy`, lastModified: new Date(), changeFrequency: 'yearly', priority: 0.3 },\n    { url: `${baseUrl}/terms`, lastModified: new Date(), changeFrequency: 'yearly', priority: 0.3 },\n  ];\n}\n\n// src/app/robots.ts\nimport type { MetadataRoute } from 'next';\nexport default function robots(): MetadataRoute.Robots {\n  return {\n    rules: { userAgent: '*', allow: '/', disallow: ['/api/', '/results/'] },\n    sitemap: 'https://[domain]/sitemap.xml',\n  };\n}\n```\n\n### 3.6 Privacy Policy and Terms of Service\n\nEvery product that takes payment MUST have these. Create them as simple, clean pages matching the site's design.\n\n**Privacy Policy (`src/app/privacy/page.tsx`):**\nGenerate content covering:\n- What data is collected (form inputs, payment info, cookies/analytics)\n- How data is used (to deliver the product, improve service)\n- Third-party services (Stripe for payments, Supabase for storage, Google Analytics for tracking)\n- Data retention (how long data is kept)\n- User rights (access, deletion, correction)\n- Contact info (rees.calder@levityleads.com)\n- Company info (Levity Leads Ltd, 85 Great Portland Street, London W1W 7LT)\n- Include a \"Last updated: [date]\" at the top\n\n**Terms of Service (`src/app/terms/page.tsx`):**\nGenerate content covering:\n- Service description (what the product does)\n- Payment terms (one-time/subscription, refund policy)\n- Intellectual property (user owns their generated content, we own the platform)\n- Limitations of liability (the product is not professional/legal advice where relevant)\n- Governing law (England and Wales)\n- Company info same as privacy\n\n**Style:** Match the site theme. Use the same dark background, typography. Keep it readable. Include a back-to-home link. Add links to both pages in the site footer.\n\n**Important:** These are standard web product terms, not legal advice. They protect the business and set expectations. For anything high-stakes (healthcare, financial advice), flag to Rees that proper legal review may be needed.\n\n### 3.7 Build sequence\n1. Layout + globals + fonts + theme + SEO meta + GA4/verification placeholders\n2. Favicon (icon.tsx, apple-icon.tsx) + OG image (opengraph-image.tsx)\n3. Landing page (all sections, footer with privacy/terms links)\n4. Core user flow (wizard/form/onboarding)\n5. API routes (data storage, business logic)\n6. Payment integration (Stripe Checkout + webhook)\n7. AI/generation features (if applicable)\n8. Output/results page\n9. Privacy policy + Terms of service pages\n10. Sitemap + robots.txt\n11. Polish (responsive, animations, error states)\n\n### 3.8 Git\n```bash\ngit config user.email \"rees.calder@levityleads.com\"\ngit config user.name \"Rees Calder\"\n```\nPush to GitHub under LevityLeads org.\n\n## Phase 4: Deploy to Vercel (15 min)\n\n### 4.1 Create Vercel project + disable deployment protection\n### 4.2 Set environment variables via Vercel API\n### 4.3 Trigger production deployment\n### 4.4 Verify deployment loads\n\n## Phase 5: Wire Up Payments (15 min)\n\n### 5.1 Create Stripe product + price via API\n### 5.2 Create webhook endpoint pointing to https://[domain]/api/stripe/webhook\n### 5.3 Add Stripe Checkout branding\n```typescript\ncustom_text: {\n  submit: { message: '[Product Name] by Levity: [what happens after payment].' },\n},\npayment_intent_data: { statement_descriptor: '[PRODUCT_NAME]' }, // max 22 chars\n```\nNote: Stripe account business name can ONLY be changed in Dashboard, not via API.\n### 5.4 Set Stripe env vars in Vercel and redeploy\n\n## Phase 6: Domain (10 min)\n\n### 6.1 Check availability via Vercel registrar API\n```\nGET /v1/registrar/domains/{domain}/availability?teamId={team}\nGET /v1/registrar/domains/{domain}/price?teamId={team}\n```\nCheck multiple TLDs: .com, .co, .io, .ai, .dev\n\n### 6.2 Quick brand/trademark check\n### 6.3 Buy domain via Vercel\n```\nPOST /v1/registrar/domains/{domain}/buy?teamId={team}\n```\nContact info: Rees Calder, Levity Leads Ltd, 85 Great Portland Street, London W1W 7LT, GB\n\n### 6.4 Configure DNS (nameservers to ns1/ns2.vercel-dns.com)\n### 6.5 Add domain + www redirect to Vercel project\n### 6.6 Update NEXT_PUBLIC_APP_URL and Stripe webhook URL\n### 6.7 Verify domain resolves and site loads\n\n## Phase 7: Google Analytics GA4 Setup (10 min)\n\n### 7.1 Create GA4 property\n```\nmcp__kern-google__analytics_create_property({\n  account: \"levity\",\n  accountId: \"388907019\",\n  displayName: \"[Product Name]\",\n  url: \"https://[domain]\",\n  timezone: \"America/New_York\",\n  currency: \"USD\"\n})\n```\nReturns propertyId and measurementId (G-XXXXXXXXXX).\n\n### 7.2 Set GA4 env var in Vercel\n### 7.3 Trigger production redeploy\n### 7.4 Verify GA4 is firing\n```bash\ncurl -s https://[domain] | grep \"googletagmanager.com/gtag/js\"\n```\nGA4 dashboard shows \"No data received\" for 24-48 hours. Use GA4 Realtime to verify immediately.\n\n## Phase 8: Google Search Console Setup (10 min)\n\n### 8.1 Get verification token\n### 8.2 Place DNS TXT record + meta tag env var\n### 8.3 Add both site properties (sc-domain + URL-prefix)\n### 8.4 Verify DNS propagation with dig\n### 8.5 Trigger verification via search_console_verify_site\n### 8.6 Confirm both show siteOwner\n### 8.7 Submit sitemap\n\nIf MCP tool not available, call kern-google MCP directly via HTTP:\n```bash\ncurl -X POST \"https://kern-google-mcp-production.up.railway.app/mcp\" \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Accept: application/json, text/event-stream\" \\\n  -H \"Authorization: Bearer [MCP_API_KEY from Railway vars]\" \\\n  -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"tools/call\",\"params\":{\"name\":\"...\",\"arguments\":{...}}}'\n```\n\n## Phase 9: Email (if needed)\n\nIf the product sends transactional emails (receipts, notifications, delivery):\n- Use the `email-domain-setup` skill for full email infrastructure\n- This covers: sending domain DNS (SPF/DKIM/DMARC), Resend configuration, \"send as\" in Gmail\n- This is a SEPARATE skill because email setup applies beyond product launches\n\nIf no email needed for MVP, skip this phase entirely.\n\n## Phase 10: Update Hustle Listing (5 min)\n\nIf listed on levityleads.com: update `src/data/hustles.ts` with liveUrl and status.\n\n## Phase 11: Verify and Report (10 min)\n\n### 11.1 End-to-end user flow test\n### 11.2 Full checklist\n- [ ] Landing page loads, responsive, CTAs work\n- [ ] Favicon shows in browser tab (not default Next.js icon)\n- [ ] OG image renders (test: https://www.opengraph.xyz/[domain])\n- [ ] Privacy policy page accessible and linked from footer\n- [ ] Terms of service page accessible and linked from footer\n- [ ] Stripe Checkout shows correct product name, amount, branding\n- [ ] GA4 tag firing (check page source for gtag script)\n- [ ] GA4 Realtime showing visits\n- [ ] Search Console: both properties verified (siteOwner)\n- [ ] Sitemap submitted (0 errors), includes privacy + terms pages\n- [ ] robots.txt accessible and correct\n- [ ] DNS TXT verification record resolving\n- [ ] Core product feature works end-to-end\n\n### 11.3 Final report\n- Product URL, what it does, price, tech stack\n- GA4 property ID + measurement ID\n- Search Console status\n- What's working, what's left for post-MVP\n\n## Reference: Key IDs\n- Vercel Team: team_2RpYyFxJ1vogGmNalvrKafNv (levityleads-projects)\n- GA4 Account: 388907019 (Levity Leads)\n- Google account alias: \"levity\"\n- MCP server: kern-google-mcp-production.up.railway.app\n- Railway project: 8d7545d9-06fe-4e9d-a892-6a14862e7b41\n- Railway MCP service: e45b7533-ce84-45b0-86c1-77b19b5de935\n\n## Anti-patterns\n- DO NOT instantiate clients at module scope. Vercel build will fail.\n- DO NOT use old Vercel domains API (v4/domains/status). Sunset Nov 2025. Use v1/registrar/domains/...\n- DO NOT try to update Stripe account name via API. Dashboard only.\n- DO NOT forget to disable Vercel deployment protection or site returns 401.\n- DO NOT try to verify Search Console without the verify tool. sites.add does NOT trigger verification.\n- DO NOT trigger verification before DNS TXT propagates. Check with dig first.\n- DO NOT rely on MCP tool schema caching for newly deployed tools. Call directly via HTTP if needed.\n- DO NOT skip privacy/terms pages on products that take payment. Legal baseline.\n- DO NOT use default Next.js favicon. Always generate a branded one.\n- GA4 dashboard shows \"No data\" for 24-48h. Use Realtime to verify immediately.\n- When calling kern-google MCP via HTTP, MUST include Accept: application/json, text/event-stream header.\n- Buffer from @react-pdf/renderer needs: new Uint8Array(buffer) before NextResponse.\n"}, "smart-fix": {"description": "Triage and fix any issue by auto-routing to the right specialist: debugger for code errors, devops for deployment issues, database optimizer for query problems, performance engineer for slowness, legacy modernizer for outdated code.", "tags": ["dev", "ops", "debugging", "workflow"], "prompt": "Intelligently fix the issue by analysing it and routing to the appropriate specialist.\n\n## Step 1: Triage\nAnalyse the issue to determine category:\n- **Code bug** -- application errors, exceptions, wrong behaviour\n- **Deployment/infra** -- deploy failures, Railway/Vercel issues, CI failing\n- **Performance** -- slow responses, high memory, timeouts\n- **Database** -- slow queries, connection issues, data problems\n- **Legacy/tech debt** -- outdated patterns, deprecated APIs, messy code\n\n## Step 2: Route and Fix\n\n**Code bugs:** Deep debugging -- read error messages and stack traces, identify root cause, reproduce if possible, fix with minimal change. Show before/after.\n\n**Deployment/infra:** Check logs, recent deployments, env vars, health checks. On Railway: check build logs, deployment status. On Vercel: check function logs, build output.\n\n**Performance:** Profile the slow path. Check for N+1 queries, missing indexes, expensive loops, unoptimised assets, missing caching. Fix the bottleneck.\n\n**Database:** Analyse slow queries with EXPLAIN. Check indexes, connection pool, query patterns. Optimise or add indexes.\n\n**Legacy/debt:** Identify the specific pain point. Modernise incrementally -- don't rewrite everything. Provide migration path.\n\n## Step 3: Multi-Domain Issues\nFor issues spanning multiple categories, address in order:\n1. Fix the immediate symptom (get it working)\n2. Fix the root cause (prevent recurrence)\n3. Add monitoring/test to catch it next time\n\n## Output\n- Root cause identified\n- Fix applied (show exactly what changed)\n- Verification steps to confirm it's resolved\n- Prevention: what to add/change to avoid this again"}, "fractionaljobs-auto-apply": {"description": "Automated application submission for fractionaljobs.io listings. Uses Playwright to fill the Fillout form with candidate details, cover letter, and links. Includes personalized pitch page generation at reescalder.com/for/[slug]. Requires a discovered gig from the gig_applications Supabase table.", "tags": ["automation", "playwright", "gig-application", "fractionaljobs", "pitch-page"], "prompt": "# fractionaljobs.io Auto-Apply (with Pitch Page)\n\n## Application Flow\nfractionaljobs.io uses a Fillout form at `https://fractionaljobs.fillout.com/t/j3Z6fGFVHFus` with query params from the job listing page.\n\nEach job listing page has a \"Request Intro\" link containing the form URL with pre-filled params:\n- function, company, job_title, job_id, compensation, hours, how_to\n\n## Pitch Page Generation (do this BEFORE filling the form)\n\nAfter generating the cover letter but BEFORE filling the form:\n\n1. Generate a pitch_slug from the job title:\n   - Lowercase, replace spaces with hyphens, remove special chars\n   - e.g. \"Marketing Leader at An SMB Communications SaaS\" -> \"marketing-leader-at-an-smb-communications-saas\"\n\n2. Update the gig_applications row in Supabase with the pitch_slug AND cover_letter:\n   ```js\n   await fetch(`${SUPABASE_URL}/rest/v1/gig_applications?id=eq.{id}`, {\n     method: \"PATCH\",\n     headers: {\n       apikey: SUPABASE_SERVICE_ROLE_KEY,\n       Authorization: `Bearer ${SUPABASE_SERVICE_ROLE_KEY}`,\n       \"Content-Type\": \"application/json\",\n       Prefer: \"return=minimal\"\n     },\n     body: JSON.stringify({ pitch_slug: slugValue, cover_letter: generatedCoverLetter })\n   });\n   ```\n\n3. The pitch page at `https://reescalder.com/for/{pitch_slug}` will automatically render using the gig_applications data (cover letter, cv_flavour, company, role, etc.)\n\n4. Include the pitch page URL in the \"Other Links\" field:\n   `https://reescalder.com/for/{pitch_slug} | https://reescalder.com/cv/{flavour}`\n\n## Form Fields (Fillout)\n\n### Required:\n1. **Full Name** [ref varies] - textbox - \"Rees Calder\"\n2. **Email** [ref varies] - textbox - \"rees.calder@levityleads.com\"\n3. **LinkedIn URL** [ref varies] - textbox - \"https://linkedin.com/in/reescalder\"\n4. **Location** [ref varies] - textbox - \"Cape Tow
