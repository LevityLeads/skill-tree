d: t.updatedAt,\n    changeFrequency: 'monthly',\n    priority: 0.7,\n  }));\n}\n```\n\n## Anti-Patterns (Will Get You Penalised)\n\n- **Doorway pages**: Hundreds of near-identical pages with only city/keyword swapped\n- **Thin content**: Pages with less than 300 words of unique content\n- **No internal linking strategy**: Orphaned pages with no connections\n- **Missing canonical tags**: Duplicate content issues across variations\n- **Template sentences**: \"Welcome to our [city] page about [topic]\" repeated 500 times\n- **No human review**: Publishing thousands of pages without manual QA on a sample\n\n## Monitoring\n\n- Google Search Console: index coverage, crawl stats, performance by page group\n- Track which template variations rank vs which get ignored\n- Watch for \"Excluded\" pages in index coverage (sign of thin content detection)\n- Re-generate/improve pages that get impressions but no clicks (title/description issue)"}, "hippocampus": {"description": "Background memory organ for AI agents. Importance scoring, decay, semantic reinforcement. Based on Stanford Generative Agents paper.", "tags": ["ai", "memory", "architecture"], "prompt": "# Hippocampus Memory System\n\nBackground memory organ for AI agents. Encode, decay, reinforce memories automatically.\n\n## Based On\nStanford Generative Agents (Park et al. 2023)\n\n## Memory Tiers\n- Core (0.7+): Always retrieved, never decays below 0.5\n- Active (0.4-0.7): Retrieved in relevant contexts\n- Background (0.2-0.4): Retrieved only on direct query\n- Archive (<0.2): Rarely retrieved, candidate for pruning\n\n## Importance Scoring (0.0-1.0)\n- Recency bonus: +0.2 if < 1 hour old\n- Frequency bonus: +0.05 per access (capped at +0.3)\n- Explicit importance from content analysis\n\n## Decay Formula\n`importance \u00d7 (0.99 ^ days_since_access)`\n\n## Semantic Reinforcement\nOn encoding: find similar existing memories (cosine > 0.85), boost their importance by 0.05. Prevents duplicate storage, strengthens connected memories."}, "refactor-clean": {"description": "Structured refactoring workflow. Analyses code smells and SOLID violations, produces a prioritised plan with before/after comparisons, generates tests, and provides a step-by-step migration guide.", "tags": ["dev", "code-quality", "architecture"], "prompt": "Refactor the specified code to be cleaner, more maintainable, and correct.\n\n## Analysis\nIdentify issues:\n- **Code Smells:** Long methods (>20 lines), large classes, duplicate code, magic numbers, poor naming, tight coupling, dead code\n- **SOLID Violations:** Single responsibility, open/closed, Liskov, interface segregation, dependency inversion\n- **Performance:** O(n\u00b2) algorithms, unnecessary object creation, missing caching\n\n## Refactoring Strategy\n\n**Immediate (High Impact, Low Effort)**\n- Extract magic numbers to named constants\n- Improve variable/function names to be self-documenting\n- Remove dead code\n- Extract duplicate logic into shared functions\n\n**Method Extraction**\n- Break long methods into focused single-responsibility functions\n- Each function does one thing, named for what it does\n\n**Structure**\n- Split God classes into focused classes\n- Add interfaces/types for loose coupling\n- Apply dependency injection where appropriate\n\n## Implementation\nApply clean code principles:\n- Meaningful names (searchable, no abbreviations)\n- Functions do one thing\n- No unexpected side effects\n- Comprehensive error handling\n- TypeScript types/interfaces added\n\n## Tests\nGenerate tests for refactored code:\n- Unit tests for all public methods\n- Edge cases and error conditions\n- Verify behaviour is unchanged from before\n\n## Before/After\nShow:\n- What changed and why\n- Complexity reduction (before vs after)\n- Any breaking changes and how to handle them\n\n## Migration Guide (for breaking changes)\nStep-by-step instructions to update callers. Backward compatibility adapters if needed."}, "video-processing": {"description": "Process a video from Instagram, TikTok, YouTube, or any URL. Download, extract frames, transcribe audio, summarise content.", "tags": ["video", "transcription", "content"], "prompt": "# Video Processing\n\n## Steps\n1. **Download** with yt-dlp: `yt-dlp -o \"/tmp/video.mp4\" \"URL\"`\n2. **Extract key frames** for visual context:\n   ```bash\n   ffmpeg -i /tmp/video.mp4 -vf \"select='eq(n\\,0)+eq(n\\,75)+eq(n\\,150)+eq(n\\,225)',scale=720:-1\" -vsync vfr /tmp/frame_%d.jpg\n   ```\n3. **Extract audio** for transcription:\n   ```bash\n   ffmpeg -i /tmp/video.mp4 -vn -acodec pcm_s16le -ar 16000 /tmp/audio.wav\n   ```\n4. **Transcribe** via Groq Whisper API\n5. **Analyse frames** using Read tool (multimodal)\n6. **Combine** visual analysis + transcript for full summary\n\n## Output Format\n**Visual Summary** -- What's shown in the video\n**Transcript Summary** -- What's said\n**Key Takeaways** -- Main points, relevance to active projects\n**Action Items** -- Anything worth acting on\n\n## Cleanup\nRemove temp files after processing: `rm /tmp/video.mp4 /tmp/frame_*.jpg /tmp/audio.wav`"}, "bento-design": {"description": "Build modern bento grid layouts for landing pages, feature showcases, and dashboards. Covers grid sizing, visual hierarchy, spacing, and Tailwind CSS implementation.", "tags": ["frontend", "design", "ui"], "prompt": "# Bento Grid Design\n\nUse when building website sections, landing pages, feature showcases, or dashboards that need a modern, scannable grid layout.\n\n## When to Use\n\n\u2705 Use for: feature showcases (5-10 features), landing page heroes, dashboard overviews, portfolio pages, stats/metrics displays\n\u274c Don't use for: long-form content, simple lists, single-focus heroes, sequential content, fewer than 3 items\n\n## Three Core Principles\n\n1. **Strict Compartmentalization** -- each piece of content in its own clearly defined box\n2. **Size = Visual Hierarchy** -- most important content gets the largest box\n   - 1x1: supporting features, secondary info\n   - 2x1: mid-tier features, horizontal emphasis\n   - 1x2: vertical emphasis\n   - 2x2: hero feature, primary value prop\n   - 3x2 or full-width: key selling point\n3. **Uniform Spacing** -- gaps must be identical throughout\n   - Desktop: 16-24px (recommend gap-4)\n   - Tablet: 12-16px\n   - Mobile: 12px (gap-3)\n\n## Grid System\n\nUse 12-column base grid with Tailwind CSS Grid. Inspiration: bentogrids.com, Apple product pages, Linear.app, Vercel homepage."}, "mcp-builder": {"description": "Build a new MCP (Model Context Protocol) server to expose external APIs or services as tools for Claude. Covers tool naming, response design, error handling, schema validation, transport choice (stdio vs HTTP), and the test loop. Use when adding a new integration to Kern or extending kern-google-mcp.", "tags": ["mcp", "dev", "type1", "integration", "kern", "auto-added"], "prompt": "# MCP Builder (Type 1)\n\n**Type 1 skill.** Lives at `/app/.claude/skills/mcp-builder/SKILL.md`. Source: https://github.com/anthropics/skills/tree/main/skills/mcp-builder\n\n## When to Use\n\n- Adding a new tool category to `kern-google-mcp` (already exposes Gmail, Calendar, Sheets, Docs, Drive, Slides, Analytics, Search Console)\n- Building a brand new MCP server for a service Kern uses (Apollo, Instantly, SendGrid, Xero, Browserbase, etc.)\n- Refactoring an existing MCP server's tool surface\n\n## Kern Context\n\nExisting MCP servers in Kern:\n- `kern-google` (HTTP, hosted at kern-google-mcp-production.up.railway.app)\n- `railway` (community jason-tan-swe/railway-mcp via npx)\n- `supabase-memory` (node, in-repo)\n- `playwright` (npx)\n\nWhen building new servers for Kern, prefer:\n- TypeScript (Node) using @modelcontextprotocol/sdk\n- HTTP transport if hosted on Railway, stdio if running in-process\n- Workflow tools over raw API parroting (one tool per outcome, not per HTTP endpoint)\n- Names prefixed with the service: `apollo_search_people`, `instantly_create_campaign`\n\n## Key Phases (from SKILL.md)\n\n1. **Research**: API coverage vs workflow tools, naming, discoverability, error UX\n2. **Design**: tool list with descriptions, input schemas, output shapes\n3. **Build**: stub each tool, wire to API client, add validation\n4. **Evaluate**: write task prompts, see if Claude can solve them via the tools, iterate\n\n## Pair With\n\n- `mcp-builder` SKILL.md (full Anthropic methodology)\n- `deploy-checklist` for shipping the server to Railway\n- `prompt-optimize` for tool description tuning"}, "iframe-preview": {"description": "Auto-scaling iframe preview component. Scales to container width, before/after screenshot toggle, ResizeObserver for responsive updates.", "tags": ["frontend", "ui", "dev"], "prompt": "# iFrame Preview\n\nAuto-scaling iframe preview. Measures container offsetWidth, scales iframe down to fit.\n\n## Scaling Formula\n```js\nconst scale = containerWidth / 1440; // assuming 1440px design width\niframe.style.transform = `scale(${scale})`;\niframe.style.transformOrigin = 'top left';\niframe.style.width = '1440px';\niframe.style.height = `${containerHeight / scale}px`;\n```\n\n## Before/After Toggle\n1. Static screenshot (instant load)\n2. On toggle: show loading spinner\n3. After 2.2s: fade in live iframe\nGives illusion of \"loading\" the real site\n\n## Attributes\n```html\n<iframe\n  sandbox=\"allow-scripts allow-same-origin\"\n  style=\"pointer-events: none\"\n/>\n```\n- pointer-events: none prevents carousels/interactions inside iframe from being triggered by hover\n- sandbox prevents navigation away from page\n\n## Responsive\n- ResizeObserver on container\n- Recalculate scale on every resize"}, "doc-coauthoring": {"description": "Structured three-stage workflow for co-authoring documentation, proposals, technical specs, and decision docs. Guides through Context Gathering, Refinement and Structure, and Reader Testing. Use when Rees needs to write a PRD, RFC, client proposal, strategy doc, internal spec, or any substantial written artefact. Replaces the ad-hoc \"start writing and see what happens\" pattern.", "tags": ["writing", "type1", "documentation", "proposals", "specs", "workflow", "auto-added"], "prompt": "# Doc Co-Authoring (Type 1)\n\n**Type 1 skill.** Full content lives at `/app/.claude/skills/doc-coauthoring/SKILL.md` in the kern-os repo. Source: https://github.com/anthropics/skills/tree/main/skills/doc-coauthoring\n\n## When to Offer This Workflow\n\n**Triggers:**\n- \"write a doc\", \"draft a proposal\", \"create a spec\", \"write up\"\n- PRD, design doc, decision doc, RFC\n- Starting a substantial writing task (anything longer than an email)\n\n## The Three Stages\n\n1. **Context Gathering** -- pull all relevant context upfront. What's the doc for? Who reads it? What decision does it drive? Get this wrong and everything downstream is wasted.\n\n2. **Refinement & Structure** -- iterate on draft in focused passes. Don't edit everything at once. Headlines first, then argument flow, then sentence-level polish.\n\n3. **Reader Testing** -- verify the doc works for its actual reader. Does the skim-read convey the thesis? Does a stranger understand it? Is the call to action unambiguous?\n\n## Kern Adaptations\n\n- **Voice:** no em-dashes, no LinkedIn energy, sardonic where it fits, short sentences.\n- **Client-facing (Thingiverse/Levity):** lead with the thesis in the first 3 sentences. Assume the reader is skimming.\n- **Internal (spec/PRD):** pair with `create-prd` for structured output, then run doc-coauthoring for refinement.\n- **Pair with:** `internal-comms` (if the doc ships internally), `google-doc-creation` (if it lives in Drive), `brand-guidelines` (apply Levity/Thingiverse styling at the end).\n\n## Key Principle\n\nDon't rush through the stages. Each iteration should make meaningful improvements. Quality over speed. The goal is a document that actually works for readers, not one that exists."}, "google-api-gotchas": {"description": "Known gotchas and workarounds for Google APIs used via kern-google MCP (Gmail, Docs, Sheets) and SendGrid. Covers: Gmail subject encoding bugs, Google Docs replaceAllText paragraph boundary failures, SendGrid unsubscribe silent drops. Use when debugging silent failures in email sending, document editing, or newsletter delivery.", "tags": ["google", "api", "gmail", "debugging", "auto-added", "from-introspection"], "prompt": "# Google API Gotchas\n\nKnown issues with Google APIs and email services used in Kern. Each one caused real production failures.\n\n## Gmail MCP: Subject Line Encoding\n\n`mcp__kern-google__gmail_send` double-UTF-8-encodes non-ASCII characters in the subject field. Result: garbled text like \"\u00c3\u201a\u00c2\u00b7\" instead of \"\u00b7\" in the inbox.\n\n**Rule**: Keep email subject lines ASCII-only.\n- Replace middot (\u00b7) with pipe (|) or slash (/)\n- Avoid arrows, ellipsis, em dashes, or any non-ASCII punctuation\n- Body text is fine, only subjects are affected\n\n## Google Docs API: replaceAllText Paragraph Boundaries\n\n`replaceAllText` can match across ONE paragraph boundary (single \\n) but fails silently (returns `occurrencesChanged: 0`) when the pattern contains TWO or more \\n characters spanning multiple paragraph breaks.\n\n**Workaround**: Break multi-paragraph replacements into single-\\n chunks. Instead of replacing \"Header\\n\\nBody\\n\\nFooter\" in one call, do three separate replacements.\n\n**Detection**: Always check `occurrencesChanged` in the response. If it's 0 and you expected matches, your pattern probably spans too many paragraph boundaries.\n\n## SendGrid: Silent Unsubscribe Drops\n\nIf a recipient previously clicked \"unsubscribe\" on ANY email from your SendGrid subuser, ALL future emails to that address are silently dropped. Event type: `drop`, reason: `Unsubscribed Address`.\n\n**Symptoms**: Form notification emails (transactional) stop arriving with no error. The send API returns 202 (accepted) but the email never delivers.\n\n**Fix**: Check the SendGrid Global Suppressions list. Remove the address if transactional emails need to reach it. Or use a separate subuser for transactional vs marketing emails.\n\n**Prevention**: Never send marketing and transactional email from the same SendGrid subuser if recipients might unsubscribe from marketing.\n\n## Google Docs API: batchUpdate Request Limits\n\nWhen applying heavy formatting (50+ formatting requests), chunk into batches of 50 per batchUpdate call. Larger batches can timeout or fail silently.\n\n## Google Sheets: Batch Operations\n\nWhen writing large datasets, use sheets_batch_update rather than individual cell writes. The per-cell approach hits rate limits quickly.\n\n## Gmail MCP: Threading\n\n- `replyToMessageId` must be the Gmail hex ID (e.g. `19c51e229cb53b1b`), NOT the RFC Message-ID header\n- If threading fails, do NOT send unthreaded. Debug the ID mismatch first.\n- The Gmail API returns different ID formats depending on which endpoint you used to fetch the message"}, "nextjs-api": {"description": "Next.js App Router API route patterns. CRUD with NextResponse, middleware auth, Zod validation, CORS headers, rate limiting.", "tags": ["dev", "nextjs", "api"], "prompt": "# Next.js API Routes\n\nNext.js App Router API route patterns.\n\n## Basic Route\n```ts\n// app/api/example/route.ts\nimport { NextRequest, NextResponse } from 'next/server';\n\nexport async function GET(req: NextRequest) {\n  return NextResponse.json({ data: 'hello' });\n}\n```\n\n## API Key Auth Middleware\n```ts\nconst key = req.headers.get('x-api-key');\nif (key !== process.env.API_KEY) {\n  return NextResponse.json({ error: 'Unauthorized' }, { status: 401 });\n}\n```\n\n## Zod Validation\n```ts\nconst schema = z.object({ name: z.string().min(1) });\nconst body = await req.json();\nconst parsed = schema.safeParse(body);\nif (!parsed.success) return NextResponse.json({ error: parsed.error }, { status: 400 });\n```\n\n## Rules\n- Always validate input\n- Return consistent { data } or { error } shapes\n- Use proper HTTP status codes (200, 201, 400, 401, 404, 500)\n- Wrap handlers in try/catch"}, "github-cli": {"description": "Use the gh CLI for GitHub operations: issues, PRs, CI runs, API queries. Key commands and patterns.", "tags": ["dev", "github", "cli"], "prompt": "# GitHub CLI\n\nUse `gh` CLI for issues, PRs, CI runs. Never use curl to the GitHub API when gh is available.\n\n## Key Commands\n```bash\n# PRs\ngh pr list\ngh pr view 123\ngh pr checks 123\ngh pr create --title \"...\" --body \"...\"\n\n# CI / Actions\ngh run list\ngh run view 123\ngh run view --log-failed 123\n\n# Issues\ngh issue list\ngh issue view 123\ngh issue create\n\n# API (advanced queries)\ngh api repos/OWNER/REPO/pulls --jq '.[].title'\ngh api repos/OWNER/REPO/contents/path/to/file | jq -r '.content' | base64 -d\n```\n\n## Structured Output\n- Always use `--json` + `--jq` for scripting\n- Example: `gh pr list --json number,title,state --jq '.[] | select(.state==\"OPEN\")'`"}, "scramble-text": {"description": "Text reveal where random characters scramble then resolve to final text on scroll into view. 60fps via requestAnimationFrame. Pure React + TypeScript.", "tags": ["frontend", "ui", "animation"], "prompt": "# Scramble Text\n\nText reveal where random characters scramble then resolve to final text on scroll into view.\n\n## Algorithm\n1. IntersectionObserver triggers on scroll into view\n2. requestAnimationFrame loop at 60fps\n3. Progress 0 \u2192 1 over `duration` ms\n4. For each character: if progress > (charIndex / totalChars), resolve to final char\n5. Otherwise: show random scramble char from CHARS set\n6. Punctuation resolves immediately\n\n## Props\n```ts\n{\n  text: string,\n  className?: string,\n  duration?: number,       // default 1200ms\n  scrambleChars?: string,  // default '!@#$%^&*()_+-=[]{}|;:,.<>?'\n}\n```\n\n## Pure React + TypeScript\n- No external dependencies\n- useRef for animation frame and observer\n- Cancel animation frame on unmount"}, "scroll-video-hero": {"description": "Scroll-controlled cinematic video hero. KIE API image-to-video \u2192 ffmpeg compress \u2192 sticky scroll-scrubbed React component with Framer Motion.", "tags": ["frontend", "ui", "video", "animation"], "prompt": "# Scroll Video Hero\n\nTurn static hero image into scroll-controlled cinematic video background.\n\n## Pipeline\n1. KIE API: image-to-video (Veo 3 image-to-video endpoint)\n2. ffmpeg: compress to <3MB (CRF 28)\n3. React: sticky scroll-scrubbed component\n\n## Scrubbing\n```tsx\nconst { scrollYProgress } = useScroll({ target: containerRef });\nuseMotionValueEvent(scrollYProgress, 'change', (progress) => {\n  if (videoRef.current) {\n    videoRef.current.currentTime = progress * videoRef.current.duration;\n  }\n});\n```\n\n## Z-Layers (bottom to top)\n1. Static image (shows before video loads)\n2. Video (fades in when loaded)\n3. Gradient overlays (for text legibility)\n4. Text content\n\n## Video Element\n```html\n<video preload=\"auto\" playsInline muted style=\"pointer-events:none\">\n```\n\n## Container\n`position: sticky; top: 0; height: 100vh` inside a tall scroll wrapper"}, "tufte-report": {"description": "Create Tufte-inspired data reports and infographic dashboards as standalone HTML files. Uses EB Garamond for text, Monaspace Argon for numbers, Chart.js for interactive charts, and inline SVG sparklines. Produces publication-quality reports with 2-column narrative+data layouts, status dashboards, scroll animations, and responsive mobile support. Use when creating data reports, activity dashboards, infographics, analytics pages, or any document combining narrative text with interactive charts and tables.", "tags": ["data-viz", "reports", "frontend", "infographic", "auto-added"], "prompt": "# Tufte Report -- Data-Driven Infographic Skill\n\nCreate standalone HTML reports that combine editorial narrative with interactive data visualization in Edward Tufte's style: high information density, minimal chart junk, typography-first design.\n\n## Design Philosophy\n\n- **Data-ink ratio**: every pixel of ink should represent data, not decoration\n- **Small multiples**: repeat a design to show comparison, not animation\n- **Sparklines**: word-sized graphics that live inside prose\n- **Layering**: overview first, then detail on demand\n- **Integration**: text and graphics share the same visual space (sidenotes, not footnotes)\n\nThe report should feel like a well-edited magazine feature.\n\n## Onboarding -- Ask Before Building\n\n1. **What data sources do you have?** (CSV, JSON, SQLite, API, raw numbers)\n2. **What is the primary question this report should answer?** (one sentence -- becomes the title)\n3. **How many sections?** (cap at 8, push back if more requested)\n4. **Output format?** (standalone HTML or embedded component)\n5. **Time budget?** 1-2 sections ~200 LOC, 3-4 sections ~500 LOC, 5-8 sections ~1200 LOC\n\n## Scope Protection\n\n- **Max 8 sections**\n- **Max 2 chart types per section**\n- **Max 3 colors per chart** -- beyond that, use small multiples\n- **No 3D charts, no pie charts, no donut charts** -- violate Tufte principles\n- **No gratuitous animation** -- scroll-reveal is fine; spinning/bouncing is not\n- **Every chart must have a caption**\n\n## Architecture\n\n```\nreport.html (standalone, no build step)\n+-- Google Fonts CDN (EB Garamond)\n+-- jsDelivr CDN (Monaspace Argon woff2)\n+-- jsDelivr CDN (Chart.js 4.x UMD)\n+-- Inline <style> (design system CSS)\n+-- Inline HTML (semantic structure)\n+-- Inline <script> (data + Chart.js configs + sparklines + scroll-reveal)\n```\n\nNo build tools, no frameworks, no npm. One file, opens in any browser.\n\n## Report Structure\n\n1. Title + subtitle + data source tags (monospace, subtle)\n2. [Optional] Status dashboard (4-column KPI strip)\n3. Overview narrative with inline sparklines + TOC sidebar\n4. Summary cards (2-4 KPI tiles with sparklines)\n5. Sections (each: state-line -> chart+narrative aside -> table+narrative aside)\n6. [Optional] Decision register (threshold table with status colors)\n7. Footer (generation date, sources)\n\n### Section Pattern\n```\n<h2> with back-to-top link\n<p class=\"state-line\"> -- one italic sentence, the takeaway\n<div class=\"aside-container\"> -- chart on left, narrative on right\n<div class=\"aside-container\"> -- table on left, interpretation on right\n```\n\n## Dual-Font Strategy\n\n| Context | Font |\n|---------|------|\n| Body text, headers, captions | EB Garamond |\n| Numbers in tables | Monaspace Argon |\n| Big numbers in cards | Monaspace Argon |\n| Status indicators, percentages | Monaspace Argon |\n| Data source tags | Monaspace Argon |\n\n## Color Principles\n\nUse near-black for text, warm white for background. Chart colors must be semantically meaningful:\n- **Orange** (#c45a28): primary data, effort/work metrics\n- **Green** (#2a7a5a): growth, positive signals\n- **Purple** (#5a5aaa): social/communication\n- **Blue** (rgba(42,80,140)): secondary overlay\n- **Red** (#a02a2a): alerts, negative trends\n- **Amber** (#c89000): warnings\n- **Green** (#2a7a3a): healthy baselines\n\nNever more than 3 colors per chart. Use opacity variations for more.\n\n## Narrative Rules\n\n- **State-lines**: one sentence, max 20 words, states conclusion not topic\n- **Aside narratives**: 3-4 short paragraphs, bold keyword openers\n- **No filler**: every sentence should contain a number or a decision\n\n## Common Pitfalls\n\n1. Use Chart.js @4 not specific patch versions\n2. Set Chart.js defaults individually, never replace entire objects\n3. For legend circles: usePointStyle: false with boxWidth: 8, boxHeight: 8, borderRadius: 4\n4. Always separate consecutive charts with narrative or tables\n5. Wrap tables in .table-wrapper for mobile, add .hide-mobile to secondary columns\n6. Don't claim correlations without computing them\n\nSource: glebis/claude-skills (tufte-report)"}, "pinterest": {"description": "Search and browse Pinterest boards, convert thumbnail URLs to high-res images, send actual images via messaging.", "tags": ["social", "content", "media"], "prompt": "# Pinterest\n\nSearch and browse Pinterest, send actual images via Telegram/messaging.\n\n## High-Res URL Conversion\nPinterest thumbnails use `236x` in the URL. Replace with `originals` for full resolution:\n```\nhttps://i.pinimg.com/236x/ab/cd/ef.jpg\n\u2192 https://i.pinimg.com/originals/ab/cd/ef.jpg\n```\n\n## Rules\n- Always send images directly, not links (links require Pinterest login)\n- Use message action=send with media= parameter\n- OAuth required for API access -- use Pinterest API v5\n\n## API\n- Search: GET /v5/pins/search?query=...\n- Board pins: GET /v5/boards/{board_id}/pins\n- Auth: Bearer token in Authorization header"}, "matrix-text": {"description": "Typewriter text reveal with blinking cursor and optional glow on complete. Triggers on scroll into view. Pure React, no dependencies.", "tags": ["frontend", "ui", "animation"], "prompt": "# Matrix Text\n\nTypewriter text reveal with blinking cursor and optional glow on complete. Triggers on scroll into view.\n\n## Implementation\n- IntersectionObserver triggers animation when element enters viewport\n- Characters appear one at a time with setInterval\n- Punctuation (.,!?) resolves immediately (no delay)\n- Blinking cursor: CSS animation on ::after pseudo-element\n- Glow on complete: text-shadow CSS transition\n\n## Props\n```ts\n{\n  text: string,\n  className?: string,\n  speed?: number,      // ms per character (default 40ms)\n  glowOnComplete?: boolean,\n  threshold?: number,  // IntersectionObserver threshold (default 0.3)\n}\n```\n\n## Pure React\n- No external dependencies\n- useRef for observer, useEffect for cleanup\n- useState for displayedText and isComplete"}, "email-domain-setup": {"description": "Fully automated E2E email domain setup: Resend (sending) + ImprovMX (receiving) + Gmail Send As + signature. Zero manual steps.", "tags": ["email", "domain", "automation", "gmail", "resend", "improvmx", "dns"], "prompt": "# Email Domain Setup (Fully Automated E2E)\n\n## Prerequisites\n- Domain registered and DNS managed by Vercel (or accessible DNS provider)\n- Vercel API token ($VERCEL_TOKEN)\n- Resend API key (use the one for the project, or create a new domain on existing Resend account)\n- ImprovMX API key ($IMPROVMX_API_KEY) - Premium plan required for multiple domains\n- kern-google MCP server deployed with gmail_send_as_create, gmail_send_as_update tools\n- Google Workspace with service account delegation configured (GOOGLE_DELEGATION_SA_EMAIL env var)\n\n## Inputs Required\n- `domain` - the domain (e.g. regshield.co)\n- `brandName` - display name (e.g. RegShield)\n- `primaryEmail` - main send-as address (e.g. hello@regshield.co)\n- `forwardTo` - where to forward received emails (e.g. rees.calder@levityleads.com)\n- `aliases` - additional aliases beyond catch-all (e.g. [\"hello\", \"rees\", \"support\"])\n- `gmailAccount` - which Gmail account to add Send As to (e.g. \"levity\")\n- `vercelTeamId` - Vercel team ID for DNS management\n- `brandColor` - primary brand color for signature (default: #1e3a5f)\n- `tagline` - signature tagline (e.g. \"SEC Regulation S-P Compliance\")\n\n## Step 1: Add Domain to Resend\n\n```bash\ncurl -s -X POST \"https://api.resend.com/domains\" \\\n  -H \"Authorization: Bearer $RESEND_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"name\":\"DOMAIN\"}' | python3 -m json.tool\n```\n\nSave the domain ID and DNS records from the response. Records needed:\n- DKIM: TXT record `resend._domainkey` with the public key\n- Return-path MX: `send` subdomain pointing to `feedback-smtp.us-east-1.amazonses.com` (priority 10)\n- Return-path SPF: TXT on `send` subdomain: `v=spf1 include:amazonses.com ~all`\n\n## Step 2: Add DNS Records to Vercel\n\nAdd ALL of these via Vercel API (`POST /v4/domains/DOMAIN/records?teamId=TEAM_ID`):\n\n1. **DKIM** - TXT `resend._domainkey` \u2192 (key from Resend response)\n2. **Return-path MX** - MX `send` \u2192 `feedback-smtp.us-east-1.amazonses.com` (priority 10)\n3. **Return-path SPF** - TXT `send` \u2192 `v=spf1 include:amazonses.com ~all`\n4. **DMARC** - TXT `_dmarc` \u2192 `v=DMARC1; p=none; rua=mailto:FORWARD_TO`\n5. **ImprovMX MX 1** - MX root \u2192 `mx1.improvmx.com` (priority 10)\n6. **ImprovMX MX 2** - MX root \u2192 `mx2.improvmx.com` (priority 20)\n7. **Combined SPF** - TXT root \u2192 `v=spf1 include:spf.improvmx.com include:amazonses.com ~all`\n\nIMPORTANT: Only ONE root SPF TXT record. Combine ImprovMX and Resend includes in a single record.\n\n```bash\n# Example for each record:\ncurl -s -X POST \"https://api.vercel.com/v4/domains/DOMAIN/records?teamId=TEAM_ID\" \\\n  -H \"Authorization: Bearer $VERCEL_TOKEN\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"name\":\"\",\"type\":\"MX\",\"value\":\"mx1.improvmx.com.\",\"mxPriority\":10,\"ttl\":60}'\n```\n\n## Step 3: Add Domain to ImprovMX with Aliases\n\n```bash\n# Add domain\ncurl -s -X POST \"https://api.improvmx.com/v3/domains/\" \\\n  -u \"api:$IMPROVMX_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"domain\":\"DOMAIN\"}'\n\n# Add catch-all alias\ncurl -s -X POST \"https://api.improvmx.com/v3/domains/DOMAIN/aliases/\" \\\n  -u \"api:$IMPROVMX_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"alias\":\"*\",\"forward\":\"FORWARD_TO\"}'\n\n# Add specific aliases (hello, rees, support, etc.)\nfor alias in hello rees support; do\n  curl -s -X POST \"https://api.improvmx.com/v3/domains/DOMAIN/aliases/\" \\\n    -u \"api:$IMPROVMX_API_KEY\" \\\n    -H \"Content-Type: application/json\" \\\n    -d \"{\\\"alias\\\":\\\"$alias\\\",\\\"forward\\\":\\\"FORWARD_TO\\\"}\"\ndone\n```\n\n## Step 4: Verify DNS Propagation\n\n```bash\n# Check Resend domain verification\ncurl -s \"https://api.resend.com/domains/DOMAIN_ID\" \\\n  -H \"Authorization: Bearer $RESEND_API_KEY\"\n\n# Check ImprovMX DNS\ncurl -s \"https://api.improvmx.com/v3/domains/DOMAIN/check\" \\\n  -u \"api:$IMPROVMX_API_KEY\"\n\n# Direct DNS checks\ndig MX DOMAIN +short\ndig TXT DOMAIN +short\n```\n\nWait for both Resend and ImprovMX to show verified/active. Resend usually verifies within 1-2 minutes.\n\n## Step 5: Create Gmail Send As Alias\n\nUse the kern-google MCP tool:\n```\ngmail_send_as_create(\n  account: \"GMAIL_ACCOUNT\",\n  sendAsEmail: \"PRIMARY_EMAIL\",\n  displayName: \"BRAND_NAME\",\n  smtpPassword: \"RESEND_API_KEY\"  // Resend API key IS the SMTP password\n)\n```\n\nDefaults: smtpHost=smtp.resend.com, smtpPort=587, smtpUsername=resend, treatAsAlias=true\n\nThis uses service account impersonation (IAM Credentials signJwt API) for domain-wide delegation. No service account key file needed.\n\n## Step 6: Auto-Verify Gmail Send As\n\nThe verification email is sent to PRIMARY_EMAIL, which ImprovMX forwards to the Gmail inbox. The full flow is automated:\n\n```python\n# 1. Search for the confirmation email\ngmail_search(account: \"GMAIL_ACCOUNT\", query: \"in:anywhere (confirmation OR verify) DOMAIN newer_than:30m\")\n\n# 2. Read the email to extract the confirmation URL\ngmail_read(account: \"GMAIL_ACCOUNT\", messageId: \"MESSAGE_ID\")\n\n# 3. Extract URL matching pattern: https://mail.google.com/mail/f-[TOKEN]-hash\n\n# 4. POST to the confirmation URL (no auth needed!)\nimport urllib.request, urllib.parse\nurl = \"CONFIRMATION_URL\"\ndata = urllib.parse.urlencode({\"Confirm\": \"Confirm\"}).encode()\nreq = urllib.request.Request(url, data=data, method=\"POST\")\nresp = urllib.request.urlopen(req, timeout=10)\n# Response should contain \"Confirmation Success!\"\n\n# 5. Verify status\ngmail_send_as_list(account: \"GMAIL_ACCOUNT\")\n# Should show verificationStatus: \"accepted\"\n```\n\nKEY INSIGHT: The Google confirmation page has a hidden form. GET shows the page, POST with Confirm=Confirm submits it. Works without being logged into Google.\n\n## Step 7: Set Email Signature\n\nUse the kern-google MCP tool:\n```\ngmail_send_as_update(\n  account: \"GMAIL_ACCOUNT\",\n  sendAsEmail: \"PRIMARY_EMAIL\",\n  signature: \"HTML_SIGNATURE\"\n)\n```\n\n### Signature Template\n\nReplace BRAND_NAME, BRAND_COLOR, ACCENT_COLOR, TAGLINE, DOMAIN, PRIMARY_EMAIL:\n\n```html\n<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" style=\"font-family:Arial,Helvetica,sans-serif;margin-top:16px;\">\n<tr><td colspan=\"2\" style=\"padding-bottom:12px;\"><table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" width=\"200\"><tr><td style=\"height:2px;background-color:BRAND_COLOR;\" width=\"33%\"></td><td style=\"height:2px;background-color:ACCENT_COLOR;\" width=\"34%\"></td><td style=\"height:2px;background-color:BRAND_COLOR;\" width=\"33%\"></td></tr></table></td></tr>\n<tr>\n<td style=\"vertical-align:top;padding-right:14px;border-right:3px solid BRAND_COLOR;\" width=\"50\">\n<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\"><tr><td style=\"width:44px;height:44px;background-color:BRAND_COLOR;border-radius:8px;text-align:center;vertical-align:middle;color:#ffffff;font-size:20px;font-weight:bold;\">INITIALS</td></tr></table>\n</td>\n<td style=\"padding-left:14px;vertical-align:top;\">\n<div style=\"font-size:18px;font-weight:800;color:#0f172a;letter-spacing:-0.5px;line-height:1.2;\">BRAND_NAME</div>\n<div style=\"font-size:11px;color:#64748b;margin-top:3px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;\">TAGLINE</div>\n<div style=\"margin-top:10px;font-size:13px;\">\n<a href=\"https://DOMAIN\" style=\"color:ACCENT_COLOR;text-decoration:none;font-weight:600;\">DOMAIN</a>\n<span style=\"color:#cbd5e1;margin:0 8px;\">&#183;</span>\n<a href=\"mailto:PRIMARY_EMAIL\" style=\"color:#475569;text-decoration:none;\">PRIMARY_EMAIL</a>\n</div>\n</td>\n</tr>\n</table>\n```\n\nINITIALS = first letter of each word in brand name (e.g. \"RegShield\" -> \"RS\")\nBRAND_COLOR default = #1e3a5f (dark navy)\nACCENT_COLOR default = #2563eb (bright blue)\n\n## Anti-Patterns\n\n1. **NEVER create two root SPF TXT records.** Multiple SPF records on the same domain violates RFC 7208 and both get invalidated. Combine all includes into one record.\n2. **Don't use gmail.users.settings.sendAs.update (PUT) for signature-only changes.** Use PATCH instead - PUT requires the full resource including smtpMsa.\n3. **Don't try to GET the Gmail confirmation link to verify.** You must POST with form data `Confirm=Confirm`.\n4. **Don't assume Resend verification is instant.** Poll the domain status until all records show verified.\n5. **Gmail Send As API requires domain-wide delegation.** Regular OAuth tokens get \"Access restricted to service accounts\" error. Must use service account impersonation via IAM Credentials signJwt API.\n\n## Infrastructure Requirements\n\n- **ImprovMX**: Premium plan ($9/mo) for multiple domains. API key stored as IMPROVMX_API_KEY in Railway.\n- **Resend**: Free tier handles most needs. API key is also used as SMTP password for Gmail Send As.\n- **Google Cloud**: Service account with domain-wide delegation enabled. Scope: `https://www.googleapis.com/auth/gmail.settings.sharing`. User needs Service Account Token Creator role. Env var: GOOGLE_DELEGATION_SA_EMAIL.\n- **Vercel DNS**: All DNS records managed via Vercel API.\n\n## Completion Checklist\n\n- [ ] Resend domain verified (DKIM + SPF + return-path)\n- [ ] ImprovMX domain active (MX + SPF valid)\n- [ ] DMARC record set\n- [ ] ImprovMX aliases configured (catch-all + specific)\n- [ ] Gmail Send As created\n- [ ] Gmail Send As verified (verificationStatus: accepted)\n- [ ] Gmail signature set\n- [ ] Test: send email from Gmail using the new address\n- [ ] Test: receive email at the new address (check forwarding)"}, "vercel-deploy": {"description": "Deploy Next.js to Vercel via GitHub. Environment variables, vercel.json config, preview URLs per PR, serverless limits, custom domain setup.", "tags": ["dev", "deployment", "vercel"], "prompt": "# Vercel Deploy\n\nDeploy Next.js to Vercel via GitHub.\n\n## Setup\n1. Connect GitHub repo in Vercel dashboard (or via Vercel MCP)\n2. Set environment variables in dashboard (Production/Preview/Development)\n3. Every PR gets automatic preview URL\n\n## vercel.json\n```json\n{\n  \"buildCommand\": \"npm run build\",\n  \"outputDirectory\": \".next\",\n  \"redirects\": [\n    { \"source\": \"/old\", \"destination\": \"/new\", \"permanent\": true }\n  ],\n  \"headers\": [\n    { \"source\": \"/(.*)\", \"headers\": [{ \"key\": \"X-Frame-Options\", \"value\": \"DENY\" }] }\n  ],\n  \"regions\": [\"cdg1\"] // EU region\n}\n```\n\n## Serverless Limits\n- Hobby: 10s timeout, 50MB function size\n- Pro: 60s timeout (use for heavy operations)\n\n## Custom Domain\n- A record: `76.76.21.21`\n- CNAME: `cname.vercel-dns.com`\n\n## Git Identity (CRITICAL)\n```bash\ngit config user.email \"rees.calder@levityleads.com\"\ngit config user.name \"Rees Calder\"\n```\nVercel rejects commits from unknown authors."}, "html-pdf-export": {"description": "Build pixel-perfect PDF-exportable HTML. Rich web version for screen + hidden print-only section built for A4. window.print() to export. No libraries.", "tags": ["frontend", "pdf", "dev"], "prompt": "# HTML PDF Export\n\nBuild pixel-perfect PDF-exportable HTML. Pattern: rich web version for screen + separate hidden print-only section purpose-built for A4.\n\n## Core Pattern\n- Every .pp div = one A4 page\n- Use window.print() to export -- no libraries needed\n- `print-color-adjust: exact` on EVERY element with background colour\n- Font sizes in px (not rem/em -- print rendering differs)\n- Box shadows don't render in print -- remove or use borders instead\n\n## Print CSS\n```css\n@media print {\n  .web-only { display: none; }\n  .print-only { display: block; }\n  .pp {\n    width: 210mm;\n    height: 297mm;\n    page-break-after: always;\n    overflow: hidden;\n    print-color-adjust: exact;\n    -webkit-print-color-adjust: exact;\n  }\n}\n@media screen {\n  .print-only { display: none; }\n}\n```\n\n## Common Gotchas\n- Flexbox/Grid can behave differently in print -- test in Chrome print preview\n- Images must be fully loaded before printing\n- External fonts: use @font-face with local fallback"}, "proposal-page-layout": {"description": "Rules and checklist for building partner proposal HTML pages in the tg-content template family (petoi, xometry, extrudr proposals) so they export cleanly to PDF without borked page breaks. Use any time you build or edit a proposal in tg-content.", "tags": ["proposals", "pdf", "css", "tg-content", "frontend"], "prompt": "## Partner proposal page-break rules (tg-content template family)\n\nThese rules apply to any proposal in LevityLeads/tg-content/*_proposal/ that uses the .pp A4 page wrapper (petoi, xometry, extrudr, and any future ones modelled on them).\n\n### The core rule\n\n**One challenge-card per .pp wrapper.** Never pack multiple full-size challenge-cards into a single .pp page.\n\n### Why\n\n- `.pp` has `min-height: 297mm` and `overflow: hidden` (screen only)\n- `.body` padding (48px 56px) applies once at the top of each `.pp`\n- In print, the browser auto-paginates if content exceeds 297mm\n- The second card on an overflowing page lands flush against the paper edge with zero top padding, producing the \"no padding at top\" bug\n- `break-inside: avoid-page` on the card does NOT save you because `.body` padding still only applies at the top of the `.pp` container\n\n### The template\n\n```html\n<\!-- PAGE N: Option X -->\n<div class=\"pp\">\n  <div class=\"body\">\n    <div class=\"challenges\">\n      <div class=\"challenge-card\">\n        <\!-- challenge-top + challenge-body + data-hook -->\n      </div>\n    </div>\n  </div>\n</div>\n```\n\n### CSS defence-in-depth (add to every proposal)\n\n```css\n.challenge-card {\n  break-inside: avoid-page;\n  page-break-inside: avoid;\n}\n```\n\n### Content sizing guidance\n\n- A4 usable height after `.body` padding (48px top + 48px bottom at 96dpi \u2248 25mm) = ~265mm\n- A challenge card (challenge-top + 2-col challenge-body + data-hook): ~110-140mm\n- Two per page is always borderline. Default to one per page.\n- Cover page, intro page, close page can pack more because content is text-only and usually shorter\n\n### Checklist before shipping a proposal\n\n1. Each challenge-card lives in its own `.pp`\n2. `.challenge-card` CSS has `break-inside: avoid-page` + `page-break-inside: avoid`\n3. No em dashes anywhere in prose (CLAUDE.md permanent rule)\n4. Push to GitHub main, verify Vercel deploy reflects the change\n5. Open https://tg-content.vercel.app/[proposal-name]/ in browser, Cmd+P print preview\n6. Confirm every physical page starts with ~15mm top padding from paper edge\n7. Confirm no card splits mid-way\n8. Only then send PDF to partner\n\n### If a partner wants 4+ options\n\nPage count grows (cover + intro + N option pages + close = N+3 pages). That's fine. Don't try to cram to reduce page count. The extra pages are free and the padding matters more than brevity.\n\n### Patching an existing broken proposal\n\n1. Pull the file from GitHub (via urllib.request to raw.githubusercontent.com or Contents API)\n2. Identify `.pp` wrappers containing multiple `.challenge-card` elements\n3. For each extra card, close the `</div></div></div>` (challenges + body + pp) and open a new `<div class=\"pp\"><div class=\"body\"><div class=\"challenges\">` before it\n4. Verify card count matches pp count for option pages: `grep -c \"challenge-card\"` should equal number of options + 1 (one extra for the CSS selector)\n5. PUT back via Contents API with current SHA, short commit message\n6. Poll Vercel until marker visible in response body\n7. Confirm with user\n\n### Related\n\n- Proposal template origin: petoi_proposal was the first, xometry_proposal copied it, extrudr_proposal copied xometry\n- Repo: LevityLeads/tg-content\n- Deploy: Vercel auto-deploy from main to tg-content.vercel.app"}, "ig-carousel-scrape": {"description": "Auto-scrape every slide of an Instagram post (carousel, reel, or single image) when Rees pastes an IG URL. Do NOT rely on og:image alone \u2014 that only returns slide 1 and I have historically guessed the rest of a carousel wrong. Use the gallery-dl pipeline (authed cookies path) to pull all slides, then Read each image to summarise actual content.", "tags": ["instagram", "scraping", "content-review", "kern"], "prompt": "\n# IG Carousel Scrape\n\n## Trigger\nRees pastes an Instagram URL (instagram.com/p/*, /reel/*, /tv/*) and asks me to summarise, check, or evaluate it.\n\n## DO NOT\n- Rely on `meta[property=\"og:image\"]` \u2014 returns slide 1 only.\n- Guess content from sibling posts in the account. I have been wrong.\n- Walk the carousel with Playwright + logged-out context. IG auth-walls past slide 1.\n\n## DO\n\n### 1. Run the scrape\n```bash\n/app/scripts/ig-scrape.sh <instagram-url>\n```\n\nOutputs all slides to `/tmp/ig-scrape/{shortcode}/`. Uses cookies at `/app/.secrets/instagram-cookies.txt`.\n\n### 2. If cookies expired\nScript will print \"cookies expired / not exported correctly\". In that case:\n- Tell Rees clearly: \"IG cookies expired, please re-export via the extension in your browser.\"\n- Do NOT try to scrape with Playwright as a fallback (same auth wall).\n- Fallback: run `/app/scripts/ig-scrape-browserbase.mjs` if `BROWSERBASE_PROJECT_ID` + `BROWSERBASE_IG_CONTEXT_ID` are set.\n\n### 3. Read every slide\nFor each `.jpg` in the output dir, use the Read tool to view. I see the image natively (OCR included).\n\n### 4. Summarise honestly\n- If the carousel is low-value (engagement bait, generic advice, templated listicle): say so.\n- If the carousel has a concrete, reusable pattern worth saving: offer to save as a skill.\n- Never pretend I read slides I didn't. If scrape fails, say so.\n\n## Format\n- Summarise the spine of the post (first sentence).\n- Per-slide bullet if content is dense enough to warrant it.\n- Verdict: worth his time / skip / save as skill.\n\n## Common traps\n- `{shortcode}` template variable doesn't resolve on IG \u2014 use `{post_shortcode}` (already fixed in config).\n- gallery-dl returns exit 4 when IG redirects to login \u2014 that means auth failed.\n- If post is private and the cookied account doesn't follow the poster, scrape fails.\n"}, "cold-email-sequence": {"description": "Write a cold email outreach sequence for lead generation. Covers subject lines, body copy, follow-ups, and personalisation.", "tags": ["marketing", "outreach", "levity"], "prompt": "# Cold Email Sequence\n\n## Structure\n- **Email 1 (Day 0):** Hook + value prop + soft CTA\n- **Email 2 (Day 3):** Different angle, social proof\n- **Email 3 (Day 7):** Case study or specific result\n- **Email 4 (Day 14):** Breakup email (last chance framing)\n\n## Rules\n- Subject lines: 4-7 words, lowercase, no clickbait\n- Body: Under 100 words. No walls of text.\n- Personalisation: First name + one specific detail about their business\n- CTA: Soft ask (\"worth a quick chat?\" not \"book a demo now\")\n- Tone: Conversational, peer-to-peer, not salesy\n- No em dashes. No \"I hope this finds you well.\" No \"leverage\" or \"synergy.\"\n\n## Before Writing\n1. Who is the target? (role, industry, company size)\n2. What pain point are we addressing?\n3. What's the value prop in one sentence?\n4. What proof points do we have? (case studies, stats, testimonials)\n\n## Sending\n- Use Instantly for cold outreach (not SendGrid)\n- Verify email addresses before loading\n- Warm up sending domains for 2 weeks before campaigns\n- Max 50 emails/day per sending account"}, "email-gate": {"description": "Email capture modal that personalises the entire site. Extracts name from email, stores in React context + localStorage, logs to Google Sheets.", "tags": ["frontend", "ui", "marketing"], "prompt": "# Email Gate\n\nEmail capture modal that extracts visitor name from email, stores in React context + localStorage, personalises the entire site.\n\n## Key Behaviours\n- Show modal after 1.2s delay (not immediately)\n- Always provide a Skip option\n- Extract first name from email (e.g. john.doe@... \u2192 \"John\")\n- Store in React context + localStorage so it persists\n- Fire tracking as fire-and-forget (don't block UX)\n\n## API Route\n- POST to /api/email-gate\n- Log to Google Sheets via Sheets API\n- Return 200 immediately, process async\n\n## Personalisation\n- Context provider wraps the app\n- Components read name from context\n- \"Hey [Name]!\" style personalisation throughout"}, "github-repo-evaluate": {"description": "Evaluate a GitHub repository for relevance and quality. Use when Rees shares a GitHub URL and wants to know if it's worth using, forking, or learning from. Produces an honest verdict: skip, evaluate deeper, bookmark, or build our own.", "tags": ["github", "evaluation", "research", "tooling"], "prompt": "## GitHub Repo Evaluation\n\n### Input\n- `repo_url`: The GitHub repository URL to evaluate\n\n### Steps\n\n1. **Fetch repo metadata** via GitHub API:\n   ```bash\n   gh api repos/{owner}/{repo} --jq '{name, description, stars: .stargazers_count, forks: .forks_count, language, updated: .updated_at, license: .license.spdx_id, open_issues: .open_issues_count}'\n   ```\n\n2. **Read the README** for claimed features and usage:\n   ```bash\n   gh api repos/{owner}/{repo}/readme --jq '.content' | base64 -d\n   ```\n\n3. **Check code structure** (tree, key files, size):\n   ```bash\n   gh api repos/{owner}/{repo}/git/trees/HEAD?recursive=1 --jq '.tree[] | select(.type==\"blob\") | .path' | head -50\n   ```\n\n4. **Assess quality signals:**\n   - Stars/forks ratio (engagement)\n   - Last commit date (maintained?)\n   - Open issues count vs age (abandoned?)\n   - License (can we use it?)\n   - Code structure (clean or messy?)\n   - Dependencies (heavy or light?)\n   - README quality (clear docs or vaporware?)\n\n5. **Relevance check** against active Kern projects:\n   - Does this solve a current problem?\n   - Could it integrate with existing tools?\n   - Is it better than what we have/could build?\n\n6. **Verdict** (one of):\n   - **Skip**: Not relevant or low quality. Say why.\n   - **Evaluate deeper**: Promising but needs hands-on testing. Specify what to test.\n   - **Bookmark**: Good reference, not needed now. Tag for future project.\n   - **Build our own**: The concept is good but execution is poor. We can do better.\n   - **Use it**: Ready to integrate. Specify how.\n\n### Output Format\n```\n**[Repo Name]** \u2014 \u2b50 {stars} | \ud83c\udf74 {forks} | \ud83d\udcc5 Last updated {date}\n**What it does:** One sentence.\n**Quality:** Good/Mixed/Poor \u2014 brief explanation.\n**Relevance:** High/Medium/Low \u2014 to which project and why.\n**Verdict:** [Skip/Evaluate/Bookmark/Build/Use] \u2014 reasoning.\n```"}, "xero-invoice-check": {"description": "Check Xero for outstanding invoices, upcoming payments, and account status for Levity Leads.", "tags": ["finance", "xero", "levity"], "prompt": "# Xero Invoice Check\n\n## API Access\nUse the Xero API with $XERO_CLIENT_ID, $XERO_CLIENT_SECRET, and $XERO_REFRESH_TOKEN.\n\n## Check List\n1. **Outstanding invoices** -- Any invoices past due date?\n2. **Upcoming payments** -- Invoices due in the next 7 days\n3. **Recent payments received** -- Last 30 days\n4. **Account balance** -- Current bank balance if accessible\n\n## Output Format\n**Invoices Summary**\n- X outstanding (total: amount)\n- X overdue (total: amount)\n\n**Needs Attention**\n- Overdue items with client names and amounts\n\n**Upcoming (next 7 days)**\n- Invoice details and due dates\n\n**Recent Payments**\n- Last 5 payments received\n\n## Store to Memory\n- Store any notable findings as events (e.g. \"INV-0020 paid by CMS Surveyors\")"}, "wix-blog-publish": {"description": "Publish a blog post to a Wix site via the Wix Blog API. Handles draft creation, richContent formatting, and publishing. Use when writing and publishing content to CMS Surveyors (cmssurveyors.co.uk) or any Wix-hosted blog.", "tags": ["wix", "blog", "publishing", "cms-surveyors", "content"], "prompt": "# Wix Blog Publish\n\nPublish an article to a Wix-hosted blog via the REST API.\n\n## Prerequisites\n- Wix API key (IST token) with blog write permissions\n- Site ID for the target Wix site\n- Article content ready to publish\n\n## API Details\n\nAll calls use Node.js `https` module (curl not available in runtime).\n\n**Headers (all requests):**\n```\nAuthorization: <API_KEY>\nwix-site-id: <SITE_ID>\nContent-Type: application/json\n```\n\n**Endpoints:**\n- Query posts: `POST /blog/v3/posts/query` body: `{ paging: { limit: N }, fieldsets: [\"RICH_CONTENT\"] }`\n- Create draft: `POST /blog/v3/draft-posts` body: `{ draftPost: { title, richContent, language: \"en\", commentingEnabled: true }}`\n- Publish: `POST /blog/v3/draft-posts/{draftPostId}/publish`\n- Categories: `POST /blog/v3/categories/query`\n\n## richContent Format\n\nThe content body uses Wix's richContent node tree. Every node needs a unique ID (random 8-char alphanumeric).\n\n### PARAGRAPH\n```json\n{\n  \"type\": \"PARAGRAPH\", \"id\": \"abc12345\",\n  \"nodes\": [{\n    \"type\": \"TEXT\", \"id\": \"\", \"nodes\": [],\n    \"textData\": {\n      \"text\": \"Your paragraph text here.\",\n      \"decorations\": [{ \"type\": \"COLOR\", \"colorData\": { \"background\": \"transparent\", \"foreground\": \"rgb(0, 0, 0)\" }}]\n    }\n  }],\n  \"style\": {},\n  \"paragraphData\": { \"textStyle\": { \"textAlignment\": \"AUTO\" }}\n}\n```\n\n### HEADING (H2)\n```json\n{\n  \"type\": \"HEADING\", \"id\": \"def67890\",\n  \"nodes\": [{\n    \"type\": \"TEXT\", \"id\": \"\", \"nodes\": [],\n    \"textData\": {\n      \"text\": \"Your Heading Text\",\n      \"decorations\": [\n        { \"type\": \"BOLD\", \"fontWeightValue\": 700 },\n        { \"type\": \"COLOR\", \"colorData\": { \"background\": \"transparent\", \"foreground\": \"#084EBD\" }}\n      ]\n    }\n  }],\n  \"style\": {},\n  \"headingData\": { \"level\": 2, \"textStyle\": { \"textAlignment\": \"AUTO\" }}\n}\n```\nFor H3, change `level` to 3.\n\n### BULLETED_LIST\n```json\n{\n  \"type\": \"BULLETED_LIST\", \"id\": \"ghi11111\",\n  \"nodes\": [{\n    \"type\": \"LIST_ITEM\", \"id\": \"jkl22222\",\n    \"nodes\": [{\n      \"type\": \"PARAGRAPH\", \"id\": \"mno33333\",\n      \"nodes\": [TEXT_NODE],\n      \"style\": {},\n      \"paragraphData\": { \"textStyle\": { \"textAlignment\": \"AUTO\" }}\n    }]\n  }]\n}\n```\n\n### Empty line (spacer)\n```json\n{ \"type\": \"PARAGRAPH\", \"id\": \"pqr44444\", \"nodes\": [], \"style\": {}, \"paragraphData\": { \"textStyle\": { \"textAlignment\": \"AUTO\" }}}\n```\n\n### Bold text within paragraph\nAdd `{ \"type\": \"BOLD\", \"fontWeightValue\": 700 }` to the TEXT node's decorations array.\n\n## Publishing Flow\n\n1. Build richContent nodes array from article content\n2. POST to `/blog/v3/draft-posts` with the full draftPost body\n3. Extract `draftPost.id` from response\n4. POST to `/blog/v3/draft-posts/{id}/publish`\n5. Verify published post appears via `/blog/v3/posts/query`\n\n## Known CMS Surveyors Config\n- Site ID: `88035f6d-ec44-451d-b79d-091d75dbf5a7`\n- API key env var: `WIX_CMS_API_KEY`\n- Railway project: `8d7545d9-06fe-4e9d-a892-6a14862e7b41`\n- Heading color: `#084EBD` (blue, bold)\n- Body text color: `rgb(0, 0, 0)`\n\n## Style Guide (CMS Surveyors)\n- Long-form decision guides, 2,000-3,000 words, 8-12 min reads\n- Scotland-focused angles\n- UK English\n- No em dashes, no emojis\n- Cite authoritative sources (Home Energy Scotland, gov.scot, Ofgem, MCS)\n- Soft CTA at end, not salesy"}, "gmail-proxy": {"description": "Build Gmail/Calendar integration via a Railway REST proxy instead of implementing OAuth in the frontend. Express server handles token management.", "tags": ["dev", "google", "api"], "prompt": "# Gmail Proxy\n\nBuild Gmail/Calendar integration via a REST proxy (Railway) instead of implementing OAuth in frontend.\n\n## Architecture\n- Express server on Railway handles OAuth token management, CORS, API key auth\n- Tokens loaded from env vars (TOKENS_PERSONAL, TOKENS_WORK, etc.)\n- Frontend makes simple REST calls with API key header\n- Never expose tokens in frontend\n\n## Token Format\n```json\n{\"access_token\": \"...\", \"refresh_token\": \"...\", \"expiry_date\": 1234567890}\n```\n\n## Proxy Endpoints\n- GET /gmail/messages?account=personal&q=is:unread\n- POST /gmail/send?account=levity\n- GET /calendar/events?account=thingiverse\n\n## Auth\n- Frontend sends: `x-api-key: YOUR_KEY`\n- Proxy validates key, selects account tokens, calls Google APIs\n- Auto-refresh tokens when expiry_date < now + 5min"}, "google-doc-creation": {"description": "Create a formatted Google Doc with rich styling. Covers document creation, text insertion, and formatting via batchUpdate API.", "tags": ["google", "docs", "formatting"], "prompt": "# Google Doc Creation\n\n## Steps\n1. **Create doc** via Google API proxy:\n   ```bash\n   curl -s \"$GOOGLE_API_PROXY_URL/docs?account=levity\" \\\n     -H \"x-api-key: $GOOGLE_API_PROXY_KEY\" \\\n     -H \"Content-Type: application/json\" \\\n     -d '{\"title\": \"Document Title\"}'\n   ```\n2. **Insert text** via batchUpdate\n3. **Apply formatting** via batchUpdate\n\n## Formatting Rules (MANDATORY)\n- Font: Inter\n- HEADING_2 for section headers (blue #224D87)\n- HEADING_3 for sub-headers\n- Bold key phrases\n- Coloured callouts for verdicts/highlights\n- Subtle separator lines between sections\n- Plain text dumps look garbage. ALWAYS format.\n\n## Formatting Pattern\n1. Fetch doc text to get character positions\n2. Calculate start/end indices for each section\n3. Build formatting requests array\n4. Send in chunks of 50 requests per batchUpdate call\n\n## Common Account Mapping\n- Levity business: account=levity\n- Thingiverse: account=thingiverse\n- Personal: account=personal"}, "tube-summary": {"description": "Search YouTube, pick a video, extract subtitles with yt-dlp, summarise with key topics, timestamps, and key quotes.", "tags": ["content", "youtube", "research"], "prompt": "# YouTube Summary\n\nSearch YouTube \u2192 pick video \u2192 extract subtitles \u2192 summarise.\n\n## Subtitle Extraction\n```bash\n# Get available subtitles\nyt-dlp --list-subs \"https://youtube.com/watch?v=VIDEO_ID\"\n\n# Download subtitles (auto-generated if manual not available)\nyt-dlp --write-auto-sub --sub-lang en --skip-download -o \"/tmp/%(title)s\" \"URL\"\n```\n\n## Process Subtitles\n1. Parse .vtt or .srt file\n2. Remove timestamps, clean duplicates\n3. Chunk into ~500 word sections\n4. Summarise each chunk, then synthesise overall\n\n## Output Format\n**Summary** (2-3 sentences, the core thesis)\n\n**Key Topics**\n- Topic 1 (timestamp)\n- Topic 2 (timestamp)\n\n**Key Quotes**\n> \"...\"\n\n**Relevance to Active Projects**\n- How this connects to what Rees is working on\n\n## Notes\n- Auto-generated subtitles used if manual not available (still good quality)\n- For long videos (1h+): focus on chapters if available"}, "ship-website": {"description": "Deploy a website or landing page to Vercel. Covers repo setup, build config, domain, and deployment verification.", "tags": ["dev", "deployment"], "prompt": "# Ship Website\n\n## Steps\n1. **Verify repo exists** on GitHub (LevityLeads org). If not, create it.\n2. **Check tech stack** -- Next.js preferred. Confirm package.json has build script.\n3. **Verify Vercel project** -- Check if already connected. If not, create via Vercel MCP.\n4. **Environment variables** -- List required env vars. Set them in Vercel dashboard or via CLI.\n5. **Push to deploy** -- Push to main (or claude/* branch if auto-merge is set up).\n6. **Verify deployment** -- Check Vercel deployment status. Confirm live URL works.\n7. **Domain setup** -- If custom domain needed, configure in Vercel.\n\n## Checklist\n- [ ] Repo exists and is clean\n- [ ] Build passes locally (npm run build)\n- [ ] Lint passes (npm run lint)\n- [ ] Env vars set in Vercel\n- [ ] Deployment successful\n- [ ] Live URL accessible\n- [ ] Custom domain configured (if needed)\n\n## Common Issues\n- Build fails: check Node version, missing deps, TypeScript errors\n- 404 after deploy: check rewrites in vercel.json or next.config\n- Env var not found: Vercel env vars are case-sensitive and environment-specific (preview vs production)"}};

const SVG_NS = 'http://www.w3.org/2000/svg';
const canvas = document.getElementById('canvas');
const detailPanel = document.getElementById('detailPanel');
const panelBody = document.getElementById('panelBody');
const panelClose = document.getElementById('panelClose');
const searchInput = document.getElementById('searchInput');
const legendEl = document.getElementById('legend');

// Sizing -- significantly more spacious
const CENTER_RADIUS = 50;
const CAT_RADIUS = 28;
const SKILL_RADIUS = 9;
const RING1_DIST = 350;       // was 220
const RING2_BASE = 550;       // was 180 -- distance from CENTER (not from category)
const RING2_SPREAD = 0.75;    // radians per skill in fan

// Build node graph
const nodes = [];
const edges = [];
let totalSkills = 0;
const catNames = Object.keys(DATA.categories);
const catCount = catNames.length;
document.getElementById('catCount').textContent = catCount;

// Center node
const centerNode = {
  id: 'kern-os',
  type: 'center',
  label: 'Kern OS',
  x: 0,
  y: 0,
  r: CENTER_RADIUS,
  color: '#a855f7',
  category: null,
  expanded: true,
  children: []
};
nodes.push(centerNode);

// Category + skill nodes
catNames.forEach((catName, i) => {
  const cat = DATA.categories[catName];
  const angle = (2 * Math.PI * i) / catCount - Math.PI / 2;
  const cx = Math.cos(angle) * RING1_DIST;
  const cy = Math.sin(angle) * RING1_DIST;

  const catNode = {
    id: `cat-${catName}`,
    type: 'category',
    label: catName,
    x: cx,
    y: cy,
    r: CAT_RADIUS,
    color: cat.color,
    category: catName,
    expanded: true,
    children: [],
    angle: angle
  };
  nodes.push(catNode);
  centerNode.children.push(catNode.id);
  edges.push({ from: 'kern-os', to: catNode.id, color: cat.color });

  const skillCount = cat.skills.length;
  // Use full arc available to this category (2*PI / catCount) for spreading skills
  const availableArc = (2 * Math.PI / catCount) * 0.85;
  const fanAngle = Math.min(RING2_SPREAD * skillCount, availableArc);
  const startAngle = angle - fanAngle / 2;
  const angleStep = skillCount > 1 ? fanAngle / (skillCount - 1) : 0;
  // Ring distance from category center
  const ringDist = 250 + skillCount * 8;

  cat.skills.forEach((skill, j) => {
    const sAngle = startAngle + angleStep * j;
    const jitter = (Math.sin(j * 7.3 + i * 3.1) * 12);
    const sx = cx + Math.cos(sAngle) * (ringDist + jitter);
    const sy = cy + Math.sin(sAngle) * (ringDist + jitter);

    const skillNode = {
      id: `skill-${catName}-${skill.name}`,
      type: 'skill',
      label: skill.name,
      x: sx,
      y: sy,
      r: SKILL_RADIUS,
      color: cat.color,
      category: catName,
      data: skill,
      parentCat: catNode.id
    };
    nodes.push(skillNode);
    catNode.children.push(skillNode.id);
    edges.push({ from: catNode.id, to: skillNode.id, color: cat.color });
    totalSkills++;
  });
});

document.getElementById('skillCount').textContent = totalSkills;

// Node lookup
const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

const allTextElements = [];

function updateViewBox() {
  canvas.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
  zoom = 1800 / viewBox.w;
  updateTextVisibility();
}

function updateTextVisibility() {
  const z = zoom;
  allTextElements.forEach(item => {
    const { el, type, baseSize } = item;
    if (type === 'center') {
      // Always show center label, scale inversely
      const size = baseSize / z;
      el.setAttribute('font-size', size);
      el.style.opacity = '1';
    } else if (type === 'category') {
      // Always show category labels, scale inversely
      const size = baseSize / z;
      el.setAttribute('font-size', size);
      el.style.opacity = '1';
    } else if (type === 'skill') {
      // Skill labels: hide at far zoom, show at medium/close
      if (z < 0.6) {
        el.style.opacity = '0';
      } else if (z < 1.0) {
        const size = (baseSize * 0.85) / z;
        el.setAttribute('font-size', size);
        el.style.opacity = String((z - 0.6) / 0.4);
      } else {
        const size = baseSize / z;
        el.setAttribute('font-size', size);
        el.style.opacity = '1';
      }
    } else if (type === 'badge') {
      // Category badge count
      const size = baseSize / z;
      el.setAttribute('font-size', size);
    } else if (type === 'kern') {
      // K letter in center
      const size = baseSize / z;
      el.setAttribute('font-size', size);
    }
  });
}

// Draw edges

edges.forEach(e => {
  const fromN = nodeMap[e.from];

  const line = document.createElementNS(SVG_NS, 'line');
  line.setAttribute('x1', fromN.x);
  line.setAttribute('y1', fromN.y);
  line.setAttribute('x2', toN.x);
  line.setAttribute('y2', toN.y);
  line.setAttribute('stroke', e.color);
  line.setAttribute('stroke-opacity', '0.15');
  line.setAttribute('stroke-width', fromN.type === 'center' ? '1.5' : '1');
  line.setAttribute('data-from', e.from);
  line.setAttribute('data-to', e.to);
  edgeLayer.appendChild(line);
  edgeElements[`${e.from}--${e.to}`] = line;
});

// Draw nodes
const nodeElements = {};
nodes.forEach(n => {
  const g = document.createElementNS(SVG_NS, 'g');
  g.setAttribute('class', `node node-${n.type}`);
  g.setAttribute('data-id', n.id);
  g.style.cursor = 'pointer';

  // Glow circle (larger, blurred)
  const glow = document.createElementNS(SVG_NS, 'circle');

  glow.setAttribute('r', n.r * 1.8);
  glow.setAttribute('fill', n.color);
  glow.setAttribute('opacity', '0');
  glow.setAttribute('class', 'node-glow');
  g.appendChild(glow);

  // Pulse ring
  const pulse = document.createElementNS(SVG_NS, 'circle');
  pulse.setAttribute('cx', n.x);
  pulse.setAttribute('cy', n.y);
  pulse.setAttribute('r', n.r);
  pulse.setAttribute('fill', 'none');
  pulse.setAttribute('stroke', n.color);
  pulse.setAttribute('stroke-width', '1');
  pulse.setAttribute('opacity', '0');
  pulse.setAttribute('class', 'node-pulse');
  g.appendChild(pulse);

  // Main circle
  const circle = document.createElementNS(SVG_NS, 'circle');
  circle.setAttribute('cx', n.x);
  circle.setAttribute('cy', n.y);
  circle.setAttribute('r', n.r);
  circle.setAttribute('class', 'node-circle');

  if (n.type === 'center') {
    circle.setAttribute('fill', 'url(#center-gradient)');
    circle.setAttribute('filter', 'url(#glow-center)');
    // Create gradient for center
    const grad = document.createElementNS(SVG_NS, 'radialGradient');
    grad.setAttribute('id', 'center-gradient');
    const stop1 = document.createElementNS(SVG_NS, 'stop');
    stop1.setAttribute('offset', '0%');
    stop1.setAttribute('stop-color', '#c084fc');
    const stop2 = document.createElementNS(SVG_NS, 'stop');
    stop2.setAttribute('offset', '100%');
    stop2.setAttribute('stop-color', '#7c3aed');
    grad.appendChild(stop1);
    grad.appendChild(stop2);
    defs.appendChild(grad);
  } else if (n.type === 'category') {
    circle.setAttribute('fill', n.color);
    circle.setAttribute('filter', `url(#glow-${n.category.replace(/[^a-zA-Z0-9]/g, '')})`);
  } else {
    circle.setAttribute('fill', n.color);
    circle.setAttribute('fill-opacity', '0.7');
  }

  // Ring / border
  const ring = document.createElementNS(SVG_NS, 'circle');
  ring.setAttribute('cx', n.x);
  ring.setAttribute('cy', n.y);
  ring.setAttribute('r', n.r + 2);
  ring.setAttribute('fill', 'none');
  ring.setAttribute('stroke', n.color);
  ring.setAttribute('stroke-width', n.type === 'center' ? '2' : '1');
  ring.setAttribute('stroke-opacity', n.type === 'skill' ? '0.3' : '0.5');

  g.appendChild(ring);
  g.appendChild(circle);

  // Label
  const text = document.createElementNS(SVG_NS, 'text');
  const labelOffset = n.type === 'center' ? 26 : n.type === 'category' ? 22 : 18;
  text.setAttribute('x', n.x);
  text.setAttribute('y', n.y + n.r + labelOffset);

  // Register for semantic zoom
  allTextElements.push({ el: text, type: n.type, baseSize: baseFontSize });

  // Skill count badge for categories
  if (n.type === 'category' && n.children) {
    const badge = document.createElementNS(SVG_NS, 'text');
